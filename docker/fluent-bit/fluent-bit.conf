[SERVICE]
    Flush        1
    Daemon       Off
    Parsers_File /fluent-bit/etc/parsers.conf
    Log_Level    info

# ── Read Docker container stdout/stderr JSON logs ──────────────────────
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    Tag               docker.*
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

# ── Enrich with container name, image, etc. from Docker API ──────────────
[FILTER]
    Name                docker
    Match               docker.*
    Host                unix:///var/run/docker.sock

# ── Remap fields to ACS log format ───────────────────────────────────────
[FILTER]
    Name    lua
    Match   docker.*
    Code    function acs_format(tag, timestamp, record)
                if not record then return -1, timestamp, record end
                record.message = record.log
                record.log = nil
                record.service = record.container_name or record.container_id or "unknown"
                record.container_name = nil
                record.container_id = nil
                record.container_image = nil
                if record.stream == "stderr" then
                    record.level = "error"
                else
                    record.level = "info"
                end
                record.stream = nil
                return 1, timestamp, record
            end
    Call    acs_format

# ── Ship to ACS ──────────────────────────────────────────────────────────
[OUTPUT]
    Name        http
    Match       docker.*
    Host        steward_acs
    Port        4000
    URI         /api/logs/ingest
    Header      X-Log-Ingest-Key ${LOG_INGEST_KEY}
    Format      json
    Json_date_key    @timestamp
    Json_date_format iso8601
