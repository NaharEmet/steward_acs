x-syncthing-entrypoint: &syncthing_entrypoint
  - sh
  - -c
  - "chown 1000:1000 /var/syncthing/config /var/syncthing/vaults && exec /bin/syncthing"

x-syncthing-base: &syncthing_base
  image: syncthing/syncthing:latest
  user: root
  restart: unless-stopped
  expose:
    - "8384"
  entrypoint: *syncthing_entrypoint

services:
  caddy:
    image: caddy:2-alpine
    container_name: steward_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.multitenant:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
    environment:
      BASE_DOMAIN: "${BASE_DOMAIN:-stewardacs.xyz}"
      ACS_URL: "http://steward_acs:4001"
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-dev-jw5wgp2b.us.auth0.com}"
      AUTH0_AUDIENCE_URLENC: "${AUTH0_AUDIENCE_URLENC:-https%3A%2F%2Fprod.stewardacs.xyz%2Fmcp%2Fsse}"
    depends_on:
      steward_acs:
        condition: service_healthy

  steward_acs:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
      args:
        REPO_ADAPTER: sqlite
    image: naharemete/steward_acs:${ACS_IMAGE_TAG:-multitenant}
    container_name: steward_acs
    restart: unless-stopped
    expose:
      - "4001"
    environment:
      MIX_ENV: prod
      PORT: "4001"
      PHX_HOST: "${PHX_HOST:-prod.stewardacs.xyz}"
      MULTI_TENANT: "true"
      ACS_ORG_NAME: "${ACS_ORG_NAME:-default}"
      BASE_DOMAIN: "${BASE_DOMAIN:-stewardacs.xyz}"
      REPO_ADAPTER: sqlite
      DATABASE_PATH: /data/steward.sqlite
      ORGS_FILE: /data/orgs.yaml
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?Set SECRET_KEY_BASE}"
      MCP_API_KEY: "${MCP_API_KEY:?Set MCP_API_KEY}"
      MCP_QUERY_KEY_AUTH: "${MCP_QUERY_KEY_AUTH:-false}"
      OAUTH_BEARER_ENABLED: "${OAUTH_BEARER_ENABLED:-false}"
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
      AUTH0_AUDIENCE: "${AUTH0_AUDIENCE:-}"
      AUTH0_ISSUER: "${AUTH0_ISSUER:-}"
      AUTH0_MGMT_CLIENT_ID: "${AUTH0_MGMT_CLIENT_ID:-}"
      AUTH0_MGMT_CLIENT_SECRET: "${AUTH0_MGMT_CLIENT_SECRET:-}"
      AUTH0_CONNECTION: "${AUTH0_CONNECTION:-email}"
      MCP_PUBLIC_URL: "${MCP_PUBLIC_URL:-https://prod.stewardacs.xyz}"
      MCP_RESOURCE_URL: "${MCP_RESOURCE_URL:-https://prod.stewardacs.xyz/mcp/sse}"
      ACCOUNT_HOST: "${ACCOUNT_HOST:-stewardacs.xyz}"
      OIDC_BROWSER_ENABLED: "${OIDC_BROWSER_ENABLED:-true}"
      AUTH0_WEB_CLIENT_ID: "${AUTH0_WEB_CLIENT_ID:-}"
      AUTH0_WEB_CLIENT_SECRET: "${AUTH0_WEB_CLIENT_SECRET:-}"
      AUTH0_WEB_REDIRECT_URI: "${AUTH0_WEB_REDIRECT_URI:-https://stewardacs.xyz/auth/callback}"
      SELF_SERVICE_ORGS_ENABLED: "${SELF_SERVICE_ORGS_ENABLED:-true}"
      OLLAMA_URL: http://ollama:11434
      OBSIDIAN_VAULT_PATH: /vaults
      MEMORY_STORE: obsidian
      # Production observability (disabled when AXIOM_LOGS is empty).
      AXIOM_LOGS: "${AXIOM_LOGS:-}"
      AXIOM_DATASET: "${AXIOM_DATASET:-steward-acs}"
      AXIOM_DOMAIN: "${AXIOM_DOMAIN:-https://api.axiom.co}"
    volumes:
      - acs_data:/data
      - vaults:/vaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/mcp/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  syncthing_default:
    <<: *syncthing_base
    container_name: syncthing_default
    hostname: syncthing_default
    # Admin UI: loopback/SSH only. Device sync ports published for Obsidian clients.
    ports:
      - "127.0.0.1:8384:8384"
      - "22000:22000"
      - "21027:21027/udp"
    volumes:
      - syncthing_config_default:/var/syncthing/config
      - vaults:/var/syncthing/vaults
    environment:
      STGUIAPIKEY: ${SYNCTHING_DEFAULT_API_KEY:?Set SYNCTHING_DEFAULT_API_KEY}

  syncthing_prod:
    <<: *syncthing_base
    container_name: syncthing_prod
    hostname: syncthing_prod
    volumes:
      - syncthing_config_prod:/var/syncthing/config
      - vaults:/var/syncthing/vaults
    environment:
      STGUIAPIKEY: ${SYNCTHING_PROD_API_KEY:?Set SYNCTHING_PROD_API_KEY}

  syncthing_fsgbhutan:
    <<: *syncthing_base
    container_name: syncthing_fsgbhutan
    hostname: syncthing_fsgbhutan
    volumes:
      - syncthing_config_fsgbhutan:/var/syncthing/config
      - vaults:/var/syncthing/vaults
    environment:
      STGUIAPIKEY: ${SYNCTHING_FSGBHUTAN_API_KEY:?Set SYNCTHING_FSGBHUTAN_API_KEY}

  syncthing_safetyconnect:
    <<: *syncthing_base
    container_name: syncthing_safetyconnect
    hostname: syncthing_safetyconnect
    volumes:
      - syncthing_config_safetyconnect:/var/syncthing/config
      - vaults:/var/syncthing/vaults
    environment:
      STGUIAPIKEY: ${SYNCTHING_SAFETYCONNECT_API_KEY:?Set SYNCTHING_SAFETYCONNECT_API_KEY}

volumes:
  acs_data:
  caddy_data:
  vaults:
  ollama_data:
  syncthing_config_default:
  syncthing_config_prod:
  syncthing_config_fsgbhutan:
  syncthing_config_safetyconnect:
