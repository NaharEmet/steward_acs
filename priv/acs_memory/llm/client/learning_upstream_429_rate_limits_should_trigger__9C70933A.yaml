content: "In Anantha.LLM.Client, the do_chat_completion functions for nim/minimax/mimo handled {:error, :service_unavailable} and {:error, :timeout} by triggering FallbackRouter.model_fallback, but did NOT handle {:error, {:rate_limited, _, _}} which is what handle_response returns for HTTP 429 responses. This caused upstream rate limits to pass through as generic errors instead of triggering fallback. Fix: add rate_limited clause before other -> other in all 3 provider-specific do_chat_completion functions. Also downgrade Logger.error to Logger.warning for 429 since it's operational (not a code bug)."
