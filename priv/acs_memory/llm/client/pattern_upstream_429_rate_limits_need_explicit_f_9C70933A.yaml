content: |
  ## Upstream 429 Rate Limit Fallback Pattern
  
  When calling upstream LLM providers, HTTP 429 responses are returned as `{:error, {:rate_limited, msg, retry_after}}` from `handle_response/1`. These must be explicitly pattern-matched in `do_chat_completion` before the catch-all `other -> other` clause to trigger `FallbackRouter.model_fallback`.
  
  The three provider-specific `do_chat_completion` functions (nim/minimax/mimo) in `Anantha.LLM.Client` handle `:service_unavailable` and `:timeout` but were missing the rate_limited tuple pattern. Without the explicit clause, 429 errors silently fell through to `other -> other` (which returns the error to the caller) instead of triggering fallback to the next provider.
  
  **Pattern**: Always add `{:error, {:rate_limited, _, _}}` alongside `{:error, :service_unavailable}` and `{:error, :timeout}` for upstream rate limits.
  
  **Additional**: Use `Logger.warning` (not `Logger.error`) for 429 in `handle_response` — upstream rate limiting is operational, not a bug, and logging at error generates noise in error tracking.
  
  Files: `lib/anantha_os/llm/client.ex` (lines 228, 263, 299, 665)
