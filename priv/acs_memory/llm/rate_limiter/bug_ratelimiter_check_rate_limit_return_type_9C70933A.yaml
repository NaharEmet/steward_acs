content: |
  `Anantha.LLM.RateLimiter.check_rate_limit/1` returned `{:rate_limited, count}` tuple from `Agent.get_and_update` callbacks (lines 54, 74, 94) but the `@spec` declared `:ok | :rate_limited`. All callers in `Anantha.LLM.Client` pattern-matched on bare `:rate_limited` atom. When rate limited, this caused `CaseClauseError` propagating up to `Anantha.CRM.do_extract_from_event/2`.
  
  Fix: Changed 3 Agent callback return values from `{{:rate_limited, count}, valid_timestamps}` to `{:rate_limited, valid_timestamps}` — Agent.get_and_update returns the first element of the callback tuple, so the caller now gets bare `:rate_limited` atom as expected.
