content: |
  ## RateLimiter `Agent.get_and_update/3` Return Shape
  
  `Agent.get_and_update/3` takes a callback `fn state -> {return_value, new_state} end`. The **first element** of the callback's return tuple is what callers of `get_and_update` receive. The **second element** becomes the agent's new state.
  
  In `Anantha.LLM.RateLimiter.check_rate_limit/1`, the previous code returned `{{:rate_limited, count}, valid_timestamps}` — meaning callers got `{:rate_limited, count}` tuple. But the `@spec` declared `:ok | :rate_limited`, and all callers in `Anantha.LLM.Client` pattern-matched on bare `:rate_limited` atom. This caused `CaseClauseError` cascading through CRM extraction.
  
  **Fix**: Return bare `:rate_limited` (first element) so Agent.get_and_update returns `:rate_limited` to caller: `{:rate_limited, valid_timestamps}`. The `count` variable was never used by callers.
  
  Files: `lib/anantha_os/llm/rate_limiter.ex` (lines 54, 74, 94)
