content: Exqlite adapter cannot encode %DateTime{} structs when passed as raw SQL parameters to Ecto.Adapters.SQL.query/4. Always convert to ISO8601 string (DateTime.to_iso8601/1) before passing as raw parameter. The sync `log` function already avoids this by using SQLite's datetime('now') function instead of passing a DateTime parameter.
