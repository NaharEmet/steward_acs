content: |
  ## Principle
  Every mandatory completion step must be a standalone critical rule. Never embed a mandatory step inside a compound ordering instruction ("do X before Y").
  
  ## Why
  When an instruction says "ALWAYS do X before calling Y", agents process "the important thing is the order — do X first." If Y is also mandatory, the agent may do X and stop, treating X as the terminal action. This is especially bad in context-constrained environments where compression drops the second half.
  
  ## Fix Pattern
  WRONG: `ALWAYS save learnings BEFORE calling acs_release_work` — ordering constraint, release is implied
  RIGHT: Two separate rules:
    1. `ALWAYS release your task when done` — standalone mandate
    2. `ALWAYS save learnings BEFORE releasing` — ordering constraint on the mandate
  
  ## When to Apply
  Any instruction where a mandatory action appears only as a subordinate clause in a compound instruction. Audit critical rules for compound patterns like "do X before Y" or "do X when Y" — if Y is also mandatory, split them.
