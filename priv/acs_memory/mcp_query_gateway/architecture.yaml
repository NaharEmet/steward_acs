content: |
  The MCP Query Gateway separates concerns:
  1. **Elixir** manages key lifecycle (generate, revoke, list) via `Anantha.ApiKeys` context
  2. **Python** (uv project, port 4002) validates keys, resolves org_id, and provides semantic query tools
  3. DB is shared — Elixir writes to `api_keys` table, Python reads from it
  4. All query tools are semantic abstractions (get_rows, count_rows, aggregate, search), not raw SQL
  5. Org scoping is injected by the system from the auth context, never controlled by agent parameters
  
