content: |
  API keys for the MCP Query Gateway follow a hash-at-rest pattern:
  1. Raw key format: `sk_live_<48 URL-safe random chars>` (256 bits entropy)
  2. Only SHA-256 hex digest is stored in the `api_keys` table
  3. Last 8 chars stored as `key_prefix` for display/identification
  4. Context module: `Anantha.ApiKeys` with `validate_key/1` for auth
  5. Python MCP server will hash incoming tokens and match against the stored hash
  
