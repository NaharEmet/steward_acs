content: "QueryController.string_keys_to_atoms/1 must recursively convert all nested map keys to atoms. Filter conditions like %{\"subject\" => %{\"like\" => \"hubspot:deals:%\"}} have string keys at every nesting level. If only top-level keys are converted, nested operators (like, eq, gt, etc.) remain as strings, causing apply_field_conditions/2 to silently drop them (the catch-all {_, _} clause matches instead of the specific operator clauses). This makes SQL WHERE filters silently non-functional beyond org_id filtering."
