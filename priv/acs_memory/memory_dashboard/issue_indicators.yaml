content: |
  The memory dashboard LiveView surfaces 6 issue indicators for at-a-glance health assessment:
  1. Stuck classified messages (critical) — messages stuck in "classified" state >5min
  2. DLQ entries (critical if >10/hr, warning otherwise) — dead-letter queue entries  
  3. Pipeline worker stale (critical) — worker hasn't run in 2x interval
  4. Failed messages (warning) — any failed extraction count
  5. Unclassified messages (info) — messages the LLM couldn't classify
  6. Overdue pending items (warning) — promises past their due date
  
  This maps directly to the user's requirement to "see if there are issues at a glance."
  
