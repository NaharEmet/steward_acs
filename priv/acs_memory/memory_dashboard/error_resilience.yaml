content: "When building LiveViews that depend on GenServer-bound contexts (Stats, ExtractionWorker, DLQ, MessageQueue), wrap every data call in a `safe_fetch/3` helper that catches all exceptions and returns nil. This prevents a single failing data source from crashing the entire dashboard. Pattern: `defp safe_fetch(module, function, args), do: apply(module, function, args); rescue _ -> nil end`. Use `|| %{}` / `|| []` defaults for all assigns."
