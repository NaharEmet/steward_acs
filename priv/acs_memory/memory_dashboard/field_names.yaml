content: The `Anantha.Memory.PipelineCycle` schema uses short field names (`processed`, `failed`, `skipped`, `last_error`) rather than the prefixed forms (`messages_processed_count`, etc.) used by `Anantha.Core.Memory.PipelineState`. When rendering cycle data, always use `cycle.processed`, `cycle.failed`, `cycle.skipped`, `cycle.last_error`. The `Stats.recent_cycles/2` returns `%PipelineCycle{}` structs, not maps from pipeline_state.
