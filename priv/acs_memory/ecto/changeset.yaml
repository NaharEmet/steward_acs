content: "Ecto's `cast/3` raises `Ecto.CastError` when params have mixed atom and string keys. All keys must be consistently strings or atoms. In `create_source/2`, the `org_id` is always added as a string key: `Map.put(attrs, \"org_id\", org_id)`. Therefore, callers must pass all attrs with string keys to avoid the \"expected params to be a map with atoms or string keys\" error."
