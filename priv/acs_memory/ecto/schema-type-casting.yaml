content: |
  When using `from(row in "table_name")` in Ecto queries, all schema type information is lost. This means `:binary_id` columns like `org_id` won't be automatically cast from string UUID format to binary UUID format. Always use a proper Ecto schema (`from(row in SchemaName)`) when filtering by UUID columns to avoid type mismatch errors with PostgreSQL.
  
  The fix is to alias the schema with an explicit name to avoid conflicts with Elixir's built-in modules (e.g., `alias Anantha.Core.Record, as: StructuredRecord`) and use `count_with_org(StructuredRecord, org_id)` instead of `count_with_org_for_table("records", org_id)`.
  
