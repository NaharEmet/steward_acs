content: |
  When using `belongs_to :association, SomeModule, define_field: false`, Ecto does NOT auto-generate the foreign key field in the schema. You MUST explicitly declare it with `field :foreign_key_id, :binary_id` (or the appropriate type) and include it in the `cast/3` allowed list, otherwise the column cannot be populated via changesets.
  
  The project's established pattern is shown in `IngestionAuditLog`:
  ```elixir
  belongs_to :org, Anantha.Core.Org, type: :binary_id, define_field: false
  field :org_id, :binary_id  # <-- explicit
  ```
  
  Missing both the field declaration AND the cast list entry causes the value to be silently dropped by `cast/3`. `Ecto.Changeset.cast/3` ignores both non-schema fields AND fields not in the allowed list.
  
