content: "When `mix ecto.migrate` fails with `duplicate_column: parent_node_id already exists`, check for duplicate migrations. Two migrations with the same timestamp can both try to add the same column. The fix is to delete the duplicate migration file — the first migration already added the column, so the second fails. Always verify migration uniqueness when adding columns."
