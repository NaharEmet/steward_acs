content: Deal stage history pipeline is fully operational. create_initial/5 creates version 1 entries with nil from_* fields. record_transition/2 atomically closes previous active stage (sets exited_at + duration_seconds) and creates new entry with linked chain via previous_history_id. get_history/2 returns ordered by version ascending. get_active_stage/2 returns the one entry where exited_at IS NULL. Schema requires org_id, deal_id, deal_external_id, to_stage_id, entered_at, version as required fields.
