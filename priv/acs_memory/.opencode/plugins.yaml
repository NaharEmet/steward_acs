content: "Installing opencode plugins in a local project scope: use `opencode plugin <package-name>@latest` from the project root. The CLI automatically updates `.opencode/opencode.json` and installs the package. Note that `opencode plugin list` does not work as expected — it attempts to install a package named \"list\". Always verify the plugin array in opencode.json manually after installation."
