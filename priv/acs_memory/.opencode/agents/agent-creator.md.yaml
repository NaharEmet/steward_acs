content: |
  # webfetch Is Denied Globally in This Project
  
  In this project's `opencode.json`, `webfetch` is set to `deny` globally and no per-agent override is in place. Agents that need to fetch external URLs (e.g., `https://opencode.ai/config.json` to verify a field shape) **must delegate to the `researcher` sub-agent via the `task` tool** — researcher has `webfetch: allow` in its frontmatter.
  
  ## Implication for Authoring Agents
  
  When writing an Authority / Capabilities table for any new agent in this project:
  
  - ❌ Never claim `✅ webfetch` directly — that capability is not available.
  - ✅ Use the form: `✅ via \`task\` delegation to \`researcher\` (which has \`webfetch: allow\`)`
  - Add a Process note: "To fetch external URLs, delegate to `researcher` via the `task` tool. Do not call `webfetch` directly — it is denied in this project's `opencode.json`."
  
  ## Why This Matters
  
  Agents that claim `webfetch: allow` in their own authority row will silently fail when they try to use it. Documenting the correct delegation path up front prevents confusion and failed fetches mid-task.
  
  ## Verification
  
  Confirmed by reading `.opencode/opencode.json` permission block: no `webfetch` allow for any project agent. Researcher (`.opencode/agents/researcher.md`) has `webfetch: allow` in its frontmatter — the only path.
  
