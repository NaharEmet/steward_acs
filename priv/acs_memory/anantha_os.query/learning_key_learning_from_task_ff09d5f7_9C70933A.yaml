content: "When debugging \"cached plan must not change result type\" errors in Ecto, the fix is adding `prepare: :unnamed` to the query operation. This forces Postgres to plan the query fresh instead of using a stale named prepared statement. File the learning for future agents encountering Postgres cached plan errors."
