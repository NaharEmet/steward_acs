content: "Ollama v0.16.1 changed `ollama list` to use a TUI launcher, which crashes in containers with \"Error: run launcher menu: error running TUI: could not open a new TTY\". The official ollama image has perl but NOT curl/wget/nc/socat. Healthchecks must use perl's IO::Socket::INET to hit the HTTP API endpoint (`/api/tags`) instead of the CLI."
