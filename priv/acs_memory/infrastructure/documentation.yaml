content: |
  When deciding where information should live, use this decision matrix:
  - AGENTS.md: Critical for every session, startup knowledge, must-know rules
  - Guides (.opencode/guides/): Task-specific workflows, detailed patterns, reference material
  - Guidance packets: Dynamic context at task claim time, scope-specific
  - Memory system: Eternal truths, principles, invariants, learnings that persist across sessions
  - Skills: Specialized instructions for specific task types
  
  Never put detailed task-specific content in AGENTS.md — it bloats the startup context. Extract to guides with a summary + reference in AGENTS.md.
  
