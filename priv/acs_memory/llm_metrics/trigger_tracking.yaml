content: "The extraction pipeline (ExtractionWorker) now threads trigger_type: \"process\" and trigger_id: message.id through all child LLM calls (observation extraction, claim extraction, entity extraction, classifier). The orchestrator path already threaded trigger_type: \"user_message\" with message ID. Now ALL LLM calls have trigger context — either from user-facing flows or from background processes. The \"LLM Calls by Trigger\" dashboard section will populate with real data once the extraction worker processes messages."
