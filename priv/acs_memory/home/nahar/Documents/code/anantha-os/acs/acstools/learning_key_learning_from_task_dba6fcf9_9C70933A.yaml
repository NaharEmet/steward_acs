content: "Fixed two bugs in submit_task_feedback: 1) YAML tool definition and release_work feedback prompt were missing agent_id parameter — agents didn't pass it, handler defaulted to \"unknown\". 2) Schema declared @primary_key {:id, :binary_id, autogenerate: true} but migration created INTEGER PRIMARY KEY — caused Exqlite.Error datatype mismatch on INSERT. Fix was to remove the @primary_key declaration to match migration. Also found and fixed separate pre-existing issue: migration 20260619000002_add_cluster_to_tables.exs hadn't been run, causing 'no such column: a0.cluster' on all acs_tasks queries."
