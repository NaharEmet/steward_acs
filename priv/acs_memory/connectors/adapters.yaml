content: |
  Connector adapters must set both `"source"` (legacy) and `"source_type"` (canonical) keys in `raw_metadata`. The `Stats.message_counts_by_source/1` function uses `COALESCE(raw_metadata->>'source_type', raw_metadata->>'source')` to handle both new and legacy messages, and `normalize_source_keys/1` maps raw string values to canonical atoms matching `@source_icons` in `memory_dashboard_components.ex`.
  
  Key mapping:
  - `"gchat"` / `"google_chat"` → `:gchat`
  - `"email"` / `"gmail"` → `:email`
  - `"whatsapp"` → `:whatsapp`
  - `"messages"` / `"web"` / `"slack"` → `:messages`
  - `"hubspot"` → `:hubspot`
  - Everything else → `:messages` (catch-all)
  
  The canonical atom keys in `known_sources` must match `@source_icons` keys in `memory_dashboard_components.ex`.
  
