content: |
  Elixir guard clauses only accept a restricted set of built-in expressions (comparison, arithmetic, boolean, type-check functions). Calling a private function like `now()` inside a `when` guard clause causes a compilation error. Always pre-compute function results into a variable before using them in guards.
  
  Example fix pattern:
  ```elixir
  # BAD: function call in guard
  defp do_check(state) do
    case val do
      {x, cached} when cached > now() - @ttl -> :ok
    end
  end
  
  # GOOD: pre-compute threshold
  defp do_check(state) do
    threshold = now() - @ttl
    case val do
      {x, cached} when cached > threshold -> :ok
    end
  end
  ```
  
