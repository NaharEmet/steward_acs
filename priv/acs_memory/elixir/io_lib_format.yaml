content: "The `~x` format character in Erlang's `:io_lib.format` can cause `argument error` in some Erlang versions when used with the full `~w.pPadc` syntax (width + precision + pad + control). The `~b` format character is safe and uses the precision (the number after the dot) as the output BASE. So `~8.16.0b` means width=8, base=16 (hex), zero-padded. This is confirmed working in `deps/ranch/src/ranch_crc32c.erl` which uses `~.16b` for hex output."
