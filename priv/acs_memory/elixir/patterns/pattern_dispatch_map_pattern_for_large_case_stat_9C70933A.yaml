content: |
  ## Dispatch Map Pattern
  
  When a function has 10+ clause `case name do` dispatch, replace with a module attribute map for O(1) lookup:
  
  ```elixir
  # Before
  def call_tool(name, args) do
    case name do
      "tool_a" -> Handler.a(args)
      "tool_b" -> Handler.b(args)
      ...
      _ -> {:error, "Unknown tool: #{name}"}
    end
  end
  
  # After
  @dispatch %{
    "tool_a" => &Handler.a/1,
    "tool_b" => &Handler.b/1,
    ...
  }
  
  def call_tool(name, args) do
    case Map.fetch(@dispatch, name) do
      {:ok, handler} -> handler.(args)
      :error -> {:error, "Unknown tool: #{name}"}
    end
  end
  ```
  
  Benefits: O(1) vs O(n), cleaner, separate data from control flow.
  Gated tools (conditional enable) should use a separate map + cond fallback so the main dispatch stays pure.
