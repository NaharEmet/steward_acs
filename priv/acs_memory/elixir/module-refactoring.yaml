content: |
  When refactoring a large module into submodules (e.g., ExtractionWorker → ExtractionWorker.Classification, ExtractionWorker.Sanitization), you MUST add `defdelegate` directives in the main module to re-export public functions. Otherwise, external callers referencing `MainModule.function()` will get `UndefinedFunctionError`.
  
  Always check ALL external callers (including tests) for function references that depend on the refactored module's public API. A good practice is to grep `MainModule.` across the codebase to find every reference.
  
  Example pattern:
  ```elixir
  alias Anantha.Memory.ExtractionWorker.{Extraction, Classification, Sanitization}
  
  defdelegate claim_family_for_type(claim_type), to: Classification
  defdelegate build_classification_and_extraction(extraction_result, message), to: Classification
  defdelegate sanitize_direction(entities, memory_type, content, message_direction), to: Sanitization
  defdelegate direction_type(memory_type), to: Sanitization
  ```
  
