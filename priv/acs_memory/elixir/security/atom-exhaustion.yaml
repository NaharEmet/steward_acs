content: |
  Never use `String.to_atom/1` directly on user-supplied input. Atoms are never garbage collected in the BEAM VM, so an attacker can exhaust the atom table by sending many unique strings. Always use `String.to_existing_atom/1` when the atom is expected to already exist (e.g., known schema fields), or implement a safe `to_atom/1` helper that validates input first before creating new atoms. The recommended pattern:
  
  ```elixir
  defp to_atom(binary) when is_binary(binary) do
    String.to_existing_atom(binary)
  rescue
    ArgumentError -> String.to_atom(binary)
  end
  ```
  
  This pattern prefers existing atoms and only creates new ones as a last resort.
  
