content: |
  When a module optionally depends on an external Hex package (like JsonRemedy), use `Code.ensure_loaded?/1` at runtime to check availability before calling. This avoids a hard compile-time dependency:
  
      def decode!(json) when is_binary(json) do
        if Code.ensure_loaded?(JsonRemedy) && function_exported?(JsonRemedy, :repair, 1) do
          case JsonRemedy.repair(json) do
            {:ok, repaired} -> Jason.decode!(repaired)
            {:error, _} -> Jason.decode!(json)
          end
        else
          Jason.decode!(json)
        end
      end
  
  This pattern permits graceful fallback when the optional package is not installed.
  
