content: |
  `Task.async_stream/3` (without supervisor) creates **linked** tasks. When a task raises an exception inside `async_stream`, the EXIT signal propagates to the caller process, crashing it. This means:
  
  1. The `{:exit, reason}` clause in `Enum.reduce` after `Task.async_stream` is **dead code** — it is never reached because the exit signal crashes the caller before the reduce can handle the stream result.
  2. To safely handle errors inside `async_stream`, wrap the task body with `try/rescue`:
  
  ```elixir
  |> Task.async_stream(
    fn item ->
      try do
        result = some_fn(item)
        {:ok, result}
      rescue
        e ->
          Logger.warning("Error processing #{item}: #{inspect(e)}")
          {:error, e}
      end
    end,
    ...
  )
  ```
  
  The stream output for the rescued case will be `{:ok, {:error, e}}`, matching the reduce clause for `{:ok, {item, {:error, reason}}}`.
  
  If you need unlinked tasks, use `Task.Supervisor.async_stream_nolink/5` with a Task.Supervisor.
  
