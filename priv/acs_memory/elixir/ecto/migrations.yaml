content: "When a migration drops a table that has FOREIGN KEY constraints pointing to it from other tables (e.g., `claims.source_observation_id` → `observations.id`), the FK constraints must be dropped first using `drop constraint(:table, \"constraint_name\")` before `drop table(:referenced_table)`. PostgreSQL enforces FK references even when dropping tables — you cannot DROP TABLE if another table has a FK pointing to it. The error message is `ERROR 2BP01 (dependent_objects_still_exist)`. Always check `information_schema.table_constraints` for dependent FK constraints before dropping tables in migrations."
