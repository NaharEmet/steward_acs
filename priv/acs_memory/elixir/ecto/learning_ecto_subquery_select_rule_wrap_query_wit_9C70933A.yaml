content: |
  In Ecto, when a subquery has a `select` clause (especially a map select like `select: %{col: val}`), it cannot be used directly as a source in `from` with another `select`. Ecto raises `Ecto.Query.CompileError: only one select expression is allowed in query`.
  
  Fix: wrap the subquery with `subquery/1` from `Ecto.Query`:
  
  ```elixir
  sub = from s in base,
    group_by: s.entity_id,
    select: %{entity_id: s.entity_id, version_count: count(s.id)}
  
  Repo.one(
    from s in subquery(sub),    # ← must wrap with subquery()
      where: s.version_count == 1,
      select: count(s.entity_id)
  )
  ```
  
  `subquery/1` is available via `import Ecto.Query` (which is standard in Phoenix projects).
