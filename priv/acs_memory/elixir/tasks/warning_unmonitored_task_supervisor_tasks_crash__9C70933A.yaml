content: |
  Background tasks started with `Task.Supervisor.start_child/3` or `Task.start/1` crash silently if the task process dies. The parent supervisor has no visibility into task failures — no log, no crash, no restart. This makes debugging pipeline failures extremely difficult.
  
  **Always:**
  - Use `Task.Supervisor.async` + `Task.yield_many/2` to collect results and surface failures
  - Attach `Process.monitor/1` to detect task exits if using `start_child`
  - Log task results explicitly: `Logger.info("Task #{task_ref} completed: #{inspect(result)}")`
  - For batch processing (e.g., CRM batch pipeline), wrap each task in a try/rescue and report errors
  
