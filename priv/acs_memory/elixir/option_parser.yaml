content: "In Elixir 1.19, `OptionParser.parse!/2` with `strict:` option returns `{parsed, rest}` (2-tuple), not `{parsed, rest, invalid}` (3-tuple). This is because `parse!/2` raises on invalid switches, so the invalid list never needs to be returned. Pattern matching must use `{parsed, _}` instead of `{parsed, _, _}`."
