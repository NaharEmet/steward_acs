content: |
  When converting string keys to atoms in a module that only has the strings defined as module attributes (but not the corresponding atoms referenced elsewhere in the code), use `String.to_atom/1` rather than `String.to_existing_atom/1`. The atoms won't exist in the atom table until they're first created. `String.to_existing_atom/1` crashes with an ArgumentError in this case.
  
  This is safe when the input strings are controlled by your own system (e.g., from a system prompt or a fixed set of known keys), not from arbitrary untrusted user input. If the keys are from untrusted input, use a different approach like a map lookup or `String.to_existing_atom/1` with a fallback, since atoms are never garbage collected.
  
  See lib/anantha_os/meta_harness/evaluator.ex:277 as an example where `String.to_atom/1` is used safely with `@allowed_score_keys_strings` as the guard.
  
