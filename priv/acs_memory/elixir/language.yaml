content: |
  Elixir 1.19 raises `ArgumentError: invalid expression in match, && is not allowed in patterns` when `&&` is used in a match position within `if` conditions. Example of broken code:
  ```elixir
  if condition && var = expr do  # ERROR in Elixir 1.19
  ```
  Fix by using `with`:
  ```elixir
  with var when not is_nil(var) <- expr do
    ...
  else
    _ -> fallback
  end
  ```
  Or by nesting cases/conditions without `&&` in the match.
  
