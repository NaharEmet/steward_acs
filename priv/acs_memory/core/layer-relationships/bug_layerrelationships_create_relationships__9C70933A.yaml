content: |
  ## Bug: `LayerRelationships.create_relationships_batch` KeyError on `:metadata`
  
  ### Root Cause
  `layer_relationships.ex:103` used `spec.metadata || %{}` to access metadata from relationship specs. Callers pass plain maps that often lack a `:metadata` key. `map.key` raises `KeyError` on missing keys.
  
  ### Fix
  Changed to `Map.get(spec, :metadata, %{})` — safely defaults to `%{}` when key absent.
  
  ### Impact
  This bug silently broke `derived_from` relationships between claims and records. Claims were created successfully (stored_claims committed before relationship step), but the relationships step crashed, leaving orphan claims with no provenance link to their parent Record.
