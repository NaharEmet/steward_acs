content: |
  ## Bug Fix: Mixed-Key Map in IngestionSources.create_source/2
  
  `IngestionSources.create_source/2` used `Map.put(attrs, :org_id, org_id)` with an **atom** key `:org_id`, but callers pass attrs maps with **string** keys like `"source_type"`. Ecto's `cast/6` rejects mixed-key maps with `Ecto.CastError`: "expected params to be a map with atoms or string keys, got a map with mixed keys".
  
  ### Fix
  Changed `:org_id` to `"org_id"` (string key) to match the convention used by callers:
  ```elixir
  # lib/anantha_os/core/ingestion_sources.ex
  |> IngestionSource.changeset(Map.put(attrs, "org_id", org_id))
  ```
  
  Always use consistent key types (string or atom) in maps passed to Ecto changesets. Do not mix.
  
