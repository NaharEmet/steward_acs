content: "ReqLLM v1.11.0 (latest, May 01 2026) is an Elixir LLM library built on Req & Finch. Package name is `req_llm` on hex.pm. Supports 19 providers including Anthropic, OpenAI, Google, Groq, OpenRouter, xAI, Ollama/vLLM, etc. Has structured output via `generate_object/4` with NimbleOptions schemas. OpenAI-compatible providers are configured by using `provider: :openai` with a custom `base_url`. Requires Elixir ~> 1.15. Very actively maintained — 11 releases since Nov 2025, 520 stars, 151 forks."
