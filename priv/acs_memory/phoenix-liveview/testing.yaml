content: "When testing LiveView chart data via `data-chart-data` attributes, use `Floki.find(html, \"#selector\") |> Floki.attribute(\"data-chart-data\") |> List.first()` to extract attribute values. Floki returns `{tag, attrs, children}` tuples - NOT structs with `.attributes` accessor. Calling `.attributes` on a tuple causes a runtime error."
