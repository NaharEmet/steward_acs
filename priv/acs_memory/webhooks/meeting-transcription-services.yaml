content: |
  Sales Trail's webhook (called "Push API") sends call metadata as a flat JSON body with no event wrapper:
  
  Payload fields:
  - `userId`: UUID string identifying the user
  - `userName`: User's display name
  - `userEmail`: User's email
  - `userPhone`: User's phone number
  - `callId`: UUID string uniquely identifying the call
  - `source`: Recording source, e.g. "android"
  - `sourceDetail`: SIM type, e.g. "SIM"
  - `startTime`: ISO 8601 UTC timestamp
  - `duration`: Call duration in seconds (integer)
  - `answered`: Boolean - whether the call was answered
  - `inbound`: Boolean - whether the call was inbound
  - `number`: The other party's phone number
  - `formattedNumber`: Formatted version of the number
  - `createdAt`: ISO 8601 timestamp of when the record was created
  
  The transcript/recording is NOT included in the webhook body. To access recording:
  1. Dashboard URL: https://callanalytics.salestrail.io/recordings/{callId}
  2. Pull API: GET https://standalone-api.salestrail.io/export/calls/{callId}/recording (returns 302 redirect to blob storage URL)
  
  No authentication/signing header documented. Username/password can be set in Push API config but this is for the endpoint's own auth.
  
