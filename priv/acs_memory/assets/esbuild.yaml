content: |
  ## Problem
  When using esbuild in IIFE mode (Phoenix default), `import Chart from "chart.js"` does NOT work correctly. The default import is wrapped into a module namespace object, so `new Chart(...)` calls `new module_namespace_object(...)` instead of the Chart constructor, silently failing.
  
  ## Fix
  Use a named import instead:
  ```javascript
  import {Chart, registerables} from 'chart.js'
  Chart.register(...registerables)
  ```
  
  This resolves `chart_exports.Chart` directly — the actual constructor function.
  
  ## Why this happens
  esbuild's IIFE wrapper resolves `import x from 'y'` into a module namespace proxy object when the imported module uses ESM exports. Named imports like `{Chart}` bypass this wrapping because they destructure the actual export.
  
