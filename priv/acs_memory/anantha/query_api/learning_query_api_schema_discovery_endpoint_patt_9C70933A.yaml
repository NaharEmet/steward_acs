content: Schema discovery endpoint POST /api/query/describe accepts optional `dataset` param. Without dataset, lists all dataset schemas via DatasetRegistry.list_datasets/0 + DatasetRegistry.describe/1. With dataset, returns single schema. Uses existing analytics.query permission and same auth pattern as other query endpoints. Both ACS tools (list_datasets, describe_dataset) map to same endpoint.
