content: "When `mode: \"count\"` is passed to POST /api/query/execute, QueryEngine executes a COUNT(*) query instead of fetching rows. For Ecto schemas, uses Repo.aggregate/3. For raw SQL datasets (source_excerpts), uses raw COUNT(*) SQL with filters. Returns `{\"count\": N}`. Count mode skips query context storage (no drilldown needed) in the controller."
