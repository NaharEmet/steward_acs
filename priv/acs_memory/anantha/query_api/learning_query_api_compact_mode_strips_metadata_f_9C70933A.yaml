content: "When `compact: true` is passed to POST /api/query/execute, the response drops `columns`, `query_id`, `next_cursor`, and `metadata`, returning only `{\"rows\": [[...], ...]}`. Compact is handled in the controller layer (do_execute_query_inner), not in QueryEngine. The compact value is parsed as boolean from params (params[\"compact\"] == true or \"true\")."
