content: "When adding a new ACS MCP tool for query endpoints, three files need changes: 1) ant_analyst.yaml — define the tool with params, endpoint, method, roles; 2) anantha_query.ex — add a handler function that validates session, permissions, and forwards to the endpoint; 3) query_controller.ex — add the controller action with auth and rate limiting. The params from YAML flow as request body to the controller."
