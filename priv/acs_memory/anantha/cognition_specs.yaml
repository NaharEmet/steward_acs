content: "The cognition_list and cognition_get MCP tools query a server-side index that may be out of sync with the actual files on disk. After creating 287 spec files, cognition_list only returned 1 result. Always verify spec creation by counting files on disk with `ls acs/specs/anantha/**/*.yaml | wc -l` instead of relying on cognition_list."
