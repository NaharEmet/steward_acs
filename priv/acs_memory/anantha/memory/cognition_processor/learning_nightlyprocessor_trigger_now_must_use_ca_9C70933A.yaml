content: |
  `CognitionProcessor.trigger_now/0` was using `GenServer.call/2` which blocks the HTTP request for the entire duration of the pipeline (minutes for 402k claims + LLM synthesis). Changed to `GenServer.cast/2` so it returns immediately and processing happens in background. The `handle_cast(:trigger_now, state)` callback handles the actual work asynchronously.
  
  This is critical for any HTTP-triggered GenServer operations that do heavy processing — always use `cast` for fire-and-forget, never `call`.
