content: "The function Anantha.Core.Claims.list_claims/1 (single arity, org_id only) loads ALL claims for an organization into memory with no pagination. For orgs with 500k+ claims this causes DB pool connection timeouts. Always pass a `limit:` option via the two-arity version `list_claims(org_id, limit: N)` to restrict results. The default limit should be a reasonable value like 50."
