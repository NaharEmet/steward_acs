content: |
  ExtractionWorker has two trigger paths since task 0251e5d2 re-added the periodic timer:
  
  1. Event-driven (default path): InboundPipeline/Ingestion.Pipeline call trigger_org(org_id) when a new message arrives → immediate async extraction.
  2. Periodic timer (every `interval` ms, default 5 min): handle_info(:run_periodic) queries Message table for orgs with unprocessed messages, calls trigger_org/1 for each. Reschedules itself.
  
  The periodic timer was previously removed in commit 1aa11de8 when extraction was made purely event-driven. Re-adding it provides a safety net for missed triggers and keeps the dashboard stale indicator accurate (worker may be idle but is checking regularly).
  
  Timer is set via Process.send_after(self(), :run_periodic, interval) in init/1 and rescheduled in the handler.
