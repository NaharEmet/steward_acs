content: |
  The ExtractionWorker (lib/anantha/pipeline/extraction_worker.ex) runs ONLY on new message arrival — the old periodic timer was removed around lines 300-303. It does NOT poll or run on a schedule. Therefore a "Stale" status on the dashboard (last run > 10 min ago) is expected when no new data sources produce messages. This is NOT an error condition. To check if the worker is healthy, verify queue depth (0 means idle, not stuck).
  
  ---
  Improvements: None required. The entry is exemplary for a technical learning record.
  
