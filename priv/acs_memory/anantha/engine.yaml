content: "Engine cognition specs should track module purpose, invariants (derived from @moduledoc and function contracts), workflows (from main function signatures), failure_modes (from error tuple returns), and constraints. The engine/orchestrator modules have a clear delegation hierarchy pattern: Orchestrator delegates to PlannerIntegration, ToolCoordinator, IRConverter, WorkflowNaming, and MessageHandler — each of which has a focused responsibility."
