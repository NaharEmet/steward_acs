content: When creating cognition spec YAML files, derive purpose from @moduledoc text, invariants from database scoping guarantees, workflows from principal function flows, and failure_modes from function return clauses. Every spec requires at least 2 invariants, 2 workflows, and 2 failure_modes. Ensure colon-space is avoided in purpose strings or quoted to prevent YAML parsing errors.
