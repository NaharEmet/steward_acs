content: "In Erlang's `:io_lib.format`, the `~b` format character uses the precision value as the number base (radix), NOT as hex. For example, `~8.8.0b` means \"base 8 (octal), minimum 8 digits, pad with zeros.\" To print hex (base 16), use `~x` instead: `~8.8.0x` prints an 8-digit hex string with zero-padding. Using `~b` when intending hex will silently produce octal output like \"12625400732-66502-45045-127556-645721200762631\" instead of proper hex UUIDs like \"565601da-6d42-4a25-af6e-1a69040fc519\"."
