content: "To override a LiveView's layout (set via `use Phoenix.LiveView, layout: {Mod, :default}`), the layout must be set in the mount return tuple as `{:ok, socket, layout: {Mod, :atom}}`. Using `assign(socket, layout: ...)` does NOT work because LiveView's renderer reads `socket.private.live_layout`, not `socket.assigns.layout`. The mount return tuple is processed by the framework which correctly stores the layout in `socket.private.live_layout`."
