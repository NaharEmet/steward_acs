content: "Added discover_pipelines handler spanning router, controller, and CRM context. The Gradual Type Checker can't narrow nil from `case resolve_provider` pattern matching — need to isolate provider.fetch_pipelines calls in a separate private function (`do_fetch_pipelines/3`) or use explicit `if provider == nil` guard. `IngestionSources.get_source/2` scopes to org_id internally, no need for separate org_id check. `Pipelines.sync_pipelines/3` always returns `{:ok, {upserted, archived}}`, never `{:error, reason}`."
