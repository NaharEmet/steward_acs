content: |
  `org_create` in `ToolController` now fires `Task.start(fn -> CognitionProcessor.generate_for_org(org.id) end)` after org creation. This ensures new orgs automatically get syntheses generated from any existing claims. Safe no-op if no claims/clusters exist yet.
  
  Pattern: `Task.start(fn -> ... end)` is appropriate here because:
  - We don't need the result in the HTTP response
  - The processing can happen asynchronously
  - No need for `Task.Supervisor` since org creation is admin-initiated
