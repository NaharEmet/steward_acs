content: "`ToolController.resolve_params/2` accepts a Phoenix params map (string-keyed from JSON) and a list of required atoms. It extracts values using both `params[k]` and `params[Atom.to_string(k)]` so it works regardless of input key type. BUT it MUST return a **string-keyed** map because all callers use `args[\"org_id\"]` string-keyed access. Previously it returned `%{org_id: \"value\"}` while callers did `args[\"org_id\"]` → nil."
