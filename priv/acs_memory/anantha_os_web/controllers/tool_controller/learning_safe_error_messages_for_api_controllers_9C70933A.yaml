content: ToolController API error responses should use `safe_error_message/1` instead of `inspect(reason)` to avoid leaking internal Ecto structs, tuples, and atoms to API consumers. The `safe_error_message/1` helper handles changeset formatting, binary errors, and unknown error types gracefully, returning "Operation failed" for opaque errors.
