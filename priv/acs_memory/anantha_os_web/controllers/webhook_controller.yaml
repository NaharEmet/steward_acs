content: "The credential_hash authentication in WebhookController IS a form of HMAC-like Pre-Shared Key (PSK) authentication. The SHA-256(org_id:credential_id) hash serves as the shared secret between Go adapter and Elixir backend. The Go adapter knows this hash (computed from org_id and its own credential_id), includes it in the webhook payload, and Elixir verifies by lookup. This is already cryptographically equivalent to HMAC verification - no additional X-Signature header verification is needed."
