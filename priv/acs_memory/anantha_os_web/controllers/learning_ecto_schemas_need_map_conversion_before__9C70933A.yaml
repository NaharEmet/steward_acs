content: "Ecto schemas (e.g. %Actor{}, %IngestionSource{}, %Claim{}) do not implement Jason.Encoder by default. When returning them via json(conn, data), any map containing structs will crash at serialization time. Always convert Ecto structs to plain maps with explicit field selection before calling json(). The same applies to GenServer call returns that are maps vs. {:ok, map} tuples — always check the actual return format before pattern matching."
