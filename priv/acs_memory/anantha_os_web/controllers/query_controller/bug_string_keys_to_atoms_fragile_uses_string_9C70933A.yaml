content: |
  In `QueryController.string_keys_to_atoms/1` (line 995-1009), non-`$`-prefixed keys are converted using `String.to_existing_atom/1`. This raises ArgumentError if the atom hasn't been created yet in the VM.
  
  Common filter operator keys like :like, :eq, :in may or may not exist as atoms depending on what modules have been loaded.
  
  Should use `String.to_atom/1` (safe since keys come from the known Query Spec schema, not user-controlled), or use `String.to_existing_atom/1` with a rescue fallback.
  
  File: `lib/anantha_os_web/controllers/query_controller.ex`, lines 1000-1006.
