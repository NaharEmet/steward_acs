content: "The MeetingWebhookController handles dedicated webhook endpoints for meeting transcript providers (Fireflies.ai, Read.ai, Sales Trail). It maps providers to ingestion source types, verifies HMAC-SHA256 signatures (configurable via app env), and delegates to WebhookHandler.handle_async/3. Secrets are configured under `:anantha_os, :webhook_secrets` as either a map or keyword list with atom keys (`:fireflies`, `:read_ai`, `:sales_trail`). When no secret is configured, signature verification is skipped with a warning log. Providers without signatures (like Sales Trail) are skipped entirely using a nil header marker in the `@provider_signature_headers` map."
