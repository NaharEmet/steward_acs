content: When adding `batch_handle_updates` parameter `config`, need to propagate it from the caller AND add it to the function signature. Private functions with `\\ %{}` defaults that are always called with explicit args trigger compiler warnings - remove defaults. Use `_old_stage_info` prefix for unused destructured vars.
