content: "Phase 3 of adaptive synthesis grouping is complete: (1) HypothesisDedup module uses content_hash exact matching for dedup, simpler than SynthesisDedup's embedding approach; (2) apply_linear_decay() in CognitionProcessor uses SQL batch UPDATE with effective_score formula - requires 7-day grace period to avoid killing fresh syntheses; (3) contradiction detection now has 3 signals: LLM pressure (>0.5), LLM contradictions_detected flag, and polarity divergence (sentiment in metadata); (4) hypothesis dedup integrated so generated hyps reinforce existing ones instead of duplicating; (5) linear decay marks stale at effective_score < 0.1 and count is returned from transition_synthesis_states. Key caveat: :crypto.hash takes (alg, data) arg order - pipe breaks it."
