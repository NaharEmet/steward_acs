content: |
  JsonRemedy.repair/1 returns `{:ok, decoded_map}` where decoded_map is an already-parsed Elixir term (map, list, string, etc.). It does NOT return a JSON string. This means code that tries to call `Jason.decode/1` on the result of `JsonRemedy.repair/1` will crash because you can't JSON-decode a map.
  
  When JsonRemedy fails to parse input (e.g., "not json"), it returns `{:ok, ""}` (empty string), not `{:error, _}`. The only time it returns `{:error, _}` is when it processes the input through all layers and validation still fails (e.g., for strings with literal unescaped newlines).
  
  Use `case` instead of `with` for handling the JsonRemedy result, since the return value is already decoded. Check for empty string to detect truly invalid input.
