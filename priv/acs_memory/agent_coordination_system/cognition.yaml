content: The loader_test.exs fixtures (create_test_entry helper) use strings like `"Primary workflow"` (16 chars) for workflows, but validation requires ≥20 chars. These tests were broken before any recent changes — they fail identically on the unmodified code. Entry_test.exs passes clean (23/23). Eight loader tests fail pre-existing.
