content: |
  When cleaning up ACS error traces:
  
  1. **ACS traces** (service=acs): Fixable in ACS codebase — e.g., nil params crash in Bridge.health_check, ToolRegistry GenServer crashes
  2. **Anantha-side traces** (service=anantha_os): Bugs in Anantha OS codebase — e.g., CRM HubSpot auth failures, QueryController cached plan errors. ACS merely relays these errors.
  3. **Transient network errors**: TransportError(:closed), HTTP timeouts — already handled gracefully by Bridge, no code fix needed
  4. **Downstream crash exits**: Bandit::Pipeline exits from GenServer.call — these are effects, not root causes. The crashed server (e.g., ToolRegistry) restarts via supervision.
  
  Cleanup process:
  - Ack known non-issues (transient, Anantha-side, expected 404s)
  - For real ACS crashes: create task, investigate root cause, fix code
  - For stale error task records from previous sessions: resolve traces, leave tasks unless they represent current work
