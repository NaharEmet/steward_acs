content: |
  Three ACS dashboard LiveViews (Tools, ToolRequests, MemoryLive) were missing catch-all handle_info(_msg, socket) clauses. Since they subscribe to AcsWeb.PubSub topic "acs", any unhandled broadcast message caused FunctionClauseError GenServer crashes.
  
  Files fixed:
  1. tools.ex (AcsWeb.AcsLive.Tools) - added catch-all
  2. tool_requests.ex (AcsWeb.AcsLive.ToolRequests) - added catch-all
  3. memory_live.ex (AcsWeb.AcsLive.MemoryLive) - added catch-all
  
  Commit: 2ca61f58
  
