content: |
  The `submit_task_feedback` MCP tool YAML definition was missing `agent_id` as a parameter, causing agents to not pass it and the handler to default to `"unknown"`. Always ensure tool YAML definitions include `agent_id` as a required param for any tool that needs to identify the calling agent. Also ensure `release_work`'s feedback prompt includes `agent_id` in its suggested params so agents see it.
  
  Files to check when adding agent_id to a tool:
  1. YAML definition (`acs.yaml`) — add param
  2. Handler function — extract from args with `|| "unknown"` fallback
  3. release_work feedback prompt (`core_handlers.ex`) — include in suggested params
  
