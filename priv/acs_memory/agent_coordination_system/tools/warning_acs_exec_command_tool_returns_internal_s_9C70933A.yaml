content: |
  The `acs_exec_command` MCP tool is returning Internal Server Error (500) when called, which prevents agents from running compile checks (`mix compile`) and other shell commands during their workflow. This blocks the standard "compile → verify → test" loop.
  
  **Workaround:** Agents cannot rely on acs_exec_command for compilation verification. Run mix commands manually or use alternative verification approaches.
  
  **Root cause:** Unknown — needs investigation of the DiagnosticHandlers module.
