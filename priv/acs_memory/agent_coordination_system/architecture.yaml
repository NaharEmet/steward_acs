content: |
  ACS (`apps/agent_coordination_system/`) is a full standalone OTP Application with `mod: {Acs.Application, []}` in its mix.exs. It has its own Phoenix endpoint (port 4001), own SQLite database (`Acs.Repo`), own supervision tree (`Acs.Supervisor`), and own lifecycle. Mix starts it automatically when running `mix phx.server` because the root `mix.exs` declares it as a path dependency.
  
  **CRITICAL**: Never add ACS children (`Acs.Repo`, `Acs.Memory.Auditor`, `Acs.Acs.Cache`, etc.) to `Anantha.Application`'s children list. The two apps share the same BEAM VM but maintain completely separate supervision trees. Adding ACS children to Anantha's tree causes config mismatches, duplicate processes, and startup failures.
  
  See `.opencode/guides/acs-architecture.md` for full documentation.
  
