content: |
  Effective ACS task management at scale (100+ tasks) requires a multi-phase approach:
  1. **Audit all tasks first** — list all tasks, categorize by type (error vs feature/bug)
  2. **Check traces** — use acs_list_error_traces for actual active errors vs stale entries
  3. **Prioritize by impact** — fix active error traces first, then stale ones, then features
  4. **Delegate exploration** — use parallel explore agents for root cause analysis
  5. **Delegate implementation** — use coder agents for bug fixes (one per bug)
  6. **Delegate verification** — use separate agents for testing
  7. **Release stale error tasks** — set to 'done' when no active traces remain for 7+ days
  
  This pattern handled 5 parallel bug fixes with no collisions and full context separation.
