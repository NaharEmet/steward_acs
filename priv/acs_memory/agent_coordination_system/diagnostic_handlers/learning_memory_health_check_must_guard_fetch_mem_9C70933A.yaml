content: |
  memory_health_check/1 in diagnostic_handlers.ex calls extension_module().fetch_memory_stats(org_id) and immediately calls Map.get on the result. When the Anantha API returns a non-map (e.g., a list, error tuple, or nil), this raises BadMapError. The rescue block catches the error but the GenServer still crashes.
  
  Fix pattern: Add an is_map guard immediately after the fetch. If the response is not a map, return a degraded health response with an error message instead of crashing. Extract the Map.get-heavy logic into a separate do_memory_health_check/3 helper.
