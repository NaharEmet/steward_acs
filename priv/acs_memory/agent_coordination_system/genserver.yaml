content: When a GenServer performs periodic work (like error analysis every 60s), unexpected errors in the work function will crash the GenServer. Even though supervisors restart it, the in-memory state is lost. Wrap the main body of periodic work functions in try/rescue blocks so that unexpected errors are logged (Logger.error with stacktrace) but the function returns state unchanged, keeping the GenServer alive.
