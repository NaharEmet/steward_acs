content: "In Elixir, guard clauses cannot use the Access syntax (e.g., `when result[\"valid\"] == true`) because it relies on a remote function call (`Access.get/2`). Use pattern matching instead: `when %{\"valid\" => true} = result` or match directly in the function head with `{:ok, %{\"valid\" => true} = result}`."
