content: "When code review finds minor issues (no critical/major), create a small follow-up task with all fixes batched. Common minor fixes: (1) add Logger.warning on fallback paths, (2) extract try/rescue into named helper for clarity, (3) simplify nested case with Keyword.fetch!, (4) cache get_env as compile_env attributes. Each fix is 1-4 lines, low risk."
