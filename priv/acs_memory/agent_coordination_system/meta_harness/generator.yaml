content: "In `Acs.MetaHarness.Generator.format_baseline_section/2`, the `baseline[\"error_snapshot\"]` value from JSON baseline file may not be a list — it could be nil, a string, or a map. Using `(snapshot || [])` only guards against nil, not other non-enumerable types. Always use `(if is_list(snapshot), do: snapshot, else: [])` before Enum operations on JSON-decoded data to prevent `Protocol.UndefinedError` at runtime."
