content: "GenServers that perform periodic work with external side effects (DB queries, file I/O, API calls) MUST wrap their work in try/rescue to prevent crashes from propagating through `:timer.tc` and terminating the GenServer. The `Acs.MetaHarness.Scheduler.run_analysis_cycle/0` calls `Acs.MetaHarness.Generator.generate/0` which can raise `Protocol.UndefinedError` (Enum on non-list), `File.Error` (missing directory), or `Ecto.QueryError` (missing tables). Wrap in try/rescue, log the error + stacktrace, and return a safe error map so the GenServer stays alive and reschedules."
