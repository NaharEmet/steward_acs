content: "ACS MetaHarness zero-data root cause: OperationLogger passes DateTime struct as raw SQL parameter to Ecto.Adapters.SQL.query/4. The Exqlite adapter cannot encode DateTime structs in raw queries. Fix: convert DateTime.utc_now() to ISO 8601 string via DateTime.to_iso8601() before storing in the entry map. Also added consecutive failure tracking with ERROR logging at threshold of 3 failures."
