content: |
  Acs.MetaHarness.Generator.generate() lives in a separate OTP app (apps/agent_coordination_system) and is not compiled as part of the root anantha_os app. To trigger generation:
  
  1. Run from apps/agent_coordination_system directory: `mix run -e 'Acs.MetaHarness.Generator.generate()'`
  2. The `acs_exec_command` MCP tool has a 5s timeout that's too short for mix run (~9s startup)
  3. Use the `bash` tool directly instead of `acs_exec_command` to avoid the 5s timeout
  4. Reports are written to apps/agent_coordination_system/metaanalysis/ as report_*.md and plan_*.md
