content: "In Dockerized ACS deployments, the `acs/acstools/` directory containing tool YAML definitions is mounted as a Docker volume (`./acs:/app/acs`). This means tool YAML files can be updated by either: (1) writing files directly via `write_file` MCP tool + `refresh_tools`, (2) using the `write_tool` MCP tool which wraps both operations, or (3) editing files on the Docker host and restarting the container. Handler code (Elixir modules) require a release rebuild. For dynamic tool logic without rebuild, use the `endpoint` pattern where tools proxy to an HTTP microservice via `Acs.MCP.Bridge`. The Dockerfile.acs builds a debian-slim release image, and docker-compose.acs.yml includes ACS + Postgres + nginx with TLS termination and rate limiting (10r/s MCP, 30r/s API)."
