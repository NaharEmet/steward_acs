content: The mode and compact params are passed from ACS YAML tool definition through anantha_query.ex handler to the HTTP API. anantha_query.ex uses add_if_present/3 helper to conditionally add nil-able params to the request body. The YAML defines mode as string param and compact as boolean param on the execute_query tool.
