content: |
  Exqlite.Error datatype mismatch (SQLITE_MISMATCH) at INSERT occurs when Ecto schema declares `@primary_key {:id, :binary_id, autogenerate: true}` but the table migration was created without explicit `primary_key:` option, resulting in `INTEGER PRIMARY KEY AUTOINCREMENT`. Ecto generates a UUID string but SQLite expects integer in that column.
  
  Fix: Either (a) add `migration_primary_key` config to repo, or (b) remove the `@primary_key` declaration from the schema to use default integer PK matching the migration. Since `task_completion_feedback` has no downstream consumers expecting UUID ids, option (b) is simpler.
  
  When creating a new Ecto schema for an existing SQLite table, always verify `@primary_key` type matches the actual migration DDL.
  
