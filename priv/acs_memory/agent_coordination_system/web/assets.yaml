content: When configuring esbuild for the ACS nested umbrella app (apps/agent_coordination_system), the NODE_PATH in config/config.exs must account for the extra nesting depth. From apps/agent_coordination_system/config/config.exs, the project root deps directory is at ../../../deps (config → agent_coordination_system → apps → root → deps), NOT ../../deps. The main app's config at the root level uses ../deps because its __DIR__ is config/ at the project root level.
