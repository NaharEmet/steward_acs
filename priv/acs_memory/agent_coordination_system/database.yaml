content: |
  When using `DateTime.utc_now()` in Ecto schemas with `:utc_datetime` type (no microseconds), you MUST call `DateTime.truncate(dt, :second)` before inserting. The `:utc_datetime` type in Ecto rejects values with microsecond precision, raising `ArgumentError: :utc_datetime expects microseconds to be empty`.
  
  This applies to:
  - `timestamps(type: :utc_datetime)` fields (`inserted_at`, `updated_at`)
  - Schema fields defined as `:utc_datetime`
  
  Fields using `:utc_datetime_usec` accept microseconds and do not need truncation.
