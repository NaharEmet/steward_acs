content: "ACS test patterns used for multi-developer features: (1) Developer auth tests use `Application.put_env(:steward_acs, :auth_strategies, [Acs.Mcp.Plugs.Strategies.Developer])` to override strategies. (2) Cluster tests override `:cluster_name` app env. (3) Cluster handlers test commands like `ls -la /tmp` and use explicit output capture assertions. (4) LogRepo tests define `@valid_attrs` maps with `Ecto.UUID.generate`. (5) SQLite limitation: ALTER TABLE + CREATE INDEX in same DDL transaction causes \"database disk image is malformed\" — use `@disable_ddl_transaction true`."
