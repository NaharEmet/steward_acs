content: |
  When implementing Port-based command execution via `spawn_executable`, three guards are essential:
  
  1. **Validate cwd before Port.open** — Check `is_binary(cwd) and File.dir?(cwd)` to avoid crashes from invalid working directories.
  2. **Coerce args type** — Ensure `args` is a list (`if is_list(args["args"]), do: args["args"], else: []`) since Port.open raises on non-list args.
  3. **Wrap Port.open in try/rescue** — Port can raise `ArgumentError` (bad path) or `ErlangError` (OS kill, OOM). Rescue both and return structured error tuples instead of crashing the calling process.
  
  Also check `System.find_executable(command)` before attempting to open the port. This pattern prevents port-related crashes from propagating up the call chain.
