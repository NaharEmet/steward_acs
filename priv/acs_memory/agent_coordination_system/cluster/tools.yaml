content: "The exec_command MCP tool uses `Port.open({:spawn_executable, executable_path}, args: arg_list)` not `Port.open({:spawn, command_string})`. The `:spawn` form creates a shell and is vulnerable to shell injection. `:spawn_executable` executes the binary directly with arguments as a list, which is injection-safe. The tool also implements: command allowlist (configurable via :allowed_commands), path allowlist (:allowed_paths), shell metacharacter rejection on arguments, file size limits, and configurable timeouts."
