content: "Guidance.generate/2 returns a :maintenance_instructions key in both :claim and :full tier packets. This instructs agents on how to flag outdated memories (set_memory_status) and cognition specs (cognition_propose) while working. The value is a constant module attribute string. Any new guidance packet additions should follow the same pattern: add a @module_attribute constant and include it in both tier maps."
