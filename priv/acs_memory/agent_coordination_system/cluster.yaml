content: LLM agents connect to remote ACS instances via MCP over HTTPS. Each remote ACS has a developer API key and a configured cluster name. OpenCode config connects to the remote ACS endpoint instead of localhost. The remote ACS provides all standard MCP tools plus cluster-specific tools (read_file, write_file, read_dir, write_tool). Agents authenticate using the developer key assigned to the cluster. Reverse proxy (nginx/caddy) handles TLS termination and rate limiting. Multiple clusters (dev, staging, prod) can be configured in OpenCode's MCP servers list, each with its own endpoint URL and API key. Cluster label isolation ensures tasks, locks, and logs from different clusters never interfere.
