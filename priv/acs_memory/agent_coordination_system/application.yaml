content: |
  ## The ACS is a standalone Phoenix app, not a library
  
  The `apps/agent_coordination_system/` project is a **standalone Phoenix application** with its own `AcsWeb.Endpoint` (port 4001), supervision tree (`Acs.Application`), and OTP Application module (`mod: {Acs.Application, []}` in its mix.exs).
  
  **DO NOT** add ACS children (`Acs.Repo`, `Acs.Memory.Auditor`, etc.) to `Anantha.Application`'s supervision tree. The ACS app starts its own supervision tree via Mix's dependency application loading.
  
  ## How it works
  
  1. Root `mix.exs` lists `{:steward_acs, path: "apps/agent_coordination_system"}` as a dependency
  2. ACS `mix.exs` defines `application/0` with `mod: {Acs.Application, []}`
  3. When `mix phx.server` runs from root, Mix starts BOTH applications:
     - `:anantha_os` → `Anantha.Application.start/2` (port 4000)
     - `:steward_acs` → `Acs.Application.start/2` (port 4001)
  4. They run in the same BEAM VM but as separate supervision trees
  
  ## Why `Process.whereis` returned nil
  
  Using `mix eval` or `mix run -e` from the root project does NOT start dependency applications. Only `mix phx.server` (or `mix run --no-halt`) starts the full OTP application tree, including path dependencies with their own Application modules.
  
  ## Two deployment modes
  
  - **Single container**: `mix phx.server` from root starts both apps in one BEAM (current default)
  - **Two containers**: ACS runs standalone on port 4001, root on port 4000, communicating via HTTP
  
  ## Config isolation
  
  The ACS has its own `config_path` in its `mix.exs` pointing to `apps/agent_coordination_system/config/config.exs`. Do NOT add ACS-specific config (AcsWeb.Endpoint, Acs.Repo SQLite, etc.) to root config files unless strictly necessary. The shared `_build/` directory can cause compile-time/runtime config mismatches if configs overlap.
  
