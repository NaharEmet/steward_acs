content: |
  Creating a named ETS table using `if :ets.info(table) == :undefined, do: :ets.new(...)` has a TOCTOU race condition. When multiple concurrent processes check `:ets.info` simultaneously, both see `:undefined` and both attempt `:ets.new`. The second call crashes with `ArgumentError`.
  
  **Safe pattern:** Use `try/rescue` around `:ets.new`:
  ```elixir
  case :ets.info(:my_table, :name) do
    :undefined ->
      try do
        :ets.new(:my_table, [:set, :public, :named_table])
      rescue
        ArgumentError -> :ok
      end
    _ ->
      :ok
  end
  ```
  
  Also, ETS tables used for rate limiting must delete expired entries to prevent unbounded growth. Use `:ets.select_delete/2` before `:ets.select/2` to clean old entries.
  
