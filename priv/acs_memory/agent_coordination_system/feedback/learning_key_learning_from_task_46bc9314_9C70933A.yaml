content: HubSpot pipeline discovery requires `crm.schemas.pipelines.read` scope, not just object read scopes. Even if deals/contacts/companies are readable, pipeline discovery can 403 if this scope is missing. Pipeline discovery failure is an early signal that helps detect missing scopes before sync. When syncing 9+ object types, batch in groups of 3 using acs_crm_sync_object_type — all 9 completed successfully server-side with no timeout issues. Analyst agent setup with `mix analyst_agent.setup` only works cleanly when the target directory doesn't already exist — if it exists, it copies in place and doesn't update org_id/API key properly, requiring manual edit of opencode.json.
