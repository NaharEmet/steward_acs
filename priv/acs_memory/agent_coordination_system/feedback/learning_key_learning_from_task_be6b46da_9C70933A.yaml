content: "CRM sync optimization: parallelize object types via Task.async_stream (max_concurrency 3, configurable), wire rate limiter preventively before requests AND reactively on 429, skip engagement objects on initial sync. Rate limiter key must be global per (org_id, source_type), not per object type — HubSpot API limit is per API key. Optional core_object_types/0 callback in Provider behaviour for initial sync filtering."
