content: "HubSpot engagement types (notes, calls, emails, meetings, tasks) require `hs_createdate` not `createdate` for search API date filtering. The search API returns 400 for `createdate` filters on these types. Fixed in `lib/anantha_os/crm/sync_engine/hub_spot.ex:55`. Also: pipeline discovery failed with 403 because tickets scope is missing from this API key - this is normal for limited-scope keys. The sync engine's `sync_object_type` always sets `since` for first syncs (5-month lookback), forcing search API usage - no way to bypass via config because `update_cursor` and `update_metadata` always set `synced_at` to current UTC time."
