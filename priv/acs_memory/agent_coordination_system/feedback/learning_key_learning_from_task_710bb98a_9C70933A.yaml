content: "NavInit.on_mount runs before LiveView mount/3, making it the ideal place to set shared assigns for layout consumption. The OrgSwitcherComponent uses fallback logic: if available_orgs is nil, it calls Core.list_orgs() itself. Setting current_org_id/current_org_name from session in on_mount provides org context to the global layout without touching individual global LiveViews."
