content: |
  Key learnings from Safety Connect org setup:
  
  1. **Bootstrap chicken-egg**: MCP org_setup tools call Phoenix API (port 4000) and need ANANTHA_API_KEY in .env to authenticate. On a fresh system, the system org exists but has no API key. Generate a bootstrap admin key via `mix run -e "IO.puts(Anantha.ApiKeys.generate_key(Anantha.Constants.system_org_id(), "bootstrap", "admin"))"` and export it as ANANTHA_API_KEY before MCP tools will work.
  
  2. **Pre-seeding sync state for date-filtered syncs**: To sync only the past N months, pre-seed the sync state's `synced_at` to N days ago before triggering sync. This makes the SyncEngine use a date-range search filter for first sync. The search date property differs by type: contacts use `lastmodifieddate`, others use `hs_lastmodifieddate`.
  
  3. **Direct curl fallback**: When MCP tools return HTTP 401 (auth failure), you can call the Phoenix API directly with curl: POST /api/tools/{org_create,source_register,crm_sync_object_type} with the bootstrap key in Authorization header.
  
  4. **Deals with 0 records**: Sync resulted in 0 deals because HubSpot deals had hs_lastmodifieddate from March 2026, which falls outside the 30-day search window. This is expected behavior — no deals were modified in the past month.
