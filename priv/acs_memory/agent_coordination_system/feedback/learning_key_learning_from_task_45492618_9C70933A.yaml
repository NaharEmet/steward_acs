content: "Fixed Acs.LLM mimo provider :invalid_json_response by enabling JSON mode (supports_json_mode: true) and adding &lt;thinking&gt; tag stripping in extract_json_content/1. The mimo v2.5 reasoning model wraps thinking in &lt;thinking&gt; tags and needs JSON mode to return parseable output. The fallback chain after mimo is minimax (currently rate-limited 429) then nim (not configured in ACS)."
