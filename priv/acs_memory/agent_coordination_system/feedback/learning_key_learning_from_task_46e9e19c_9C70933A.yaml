content: "Bridge.ex has two dispatch paths: YAML-defined (active, via Bridge.call_tool) and handler-defined (disabled, gated behind config flag). When adding session auth, I chose to add ETS session support to the Bridge path because it's the active path. The session ETS table is shared with AnanthaQuery handler module. Protocol.ex injects _auth_role and _auth_org_id into tool call arguments for routing context. The ant_authenticate YAML tool doesn't require api_key in params (the auth endpoint doesn't use api_authenticated pipeline)."
