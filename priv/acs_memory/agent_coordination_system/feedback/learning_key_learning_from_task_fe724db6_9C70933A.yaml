content: 1. Org setup tools need to go through HTTP to Anantha Phoenix (cross-BEAM), not direct module calls. OrgSetupHandlers and CRMHandlers both use Req POST with ANANTHA_API_KEY Bearer auth. 2. SyncState synced_at blocks first-sync detection - must use Map.drop to remove key, setting to nil doesn't persist through Ecto. 3. Batch processing pipeline (process_crm_records_batch) has unhandled exceptions that are caught by rescue in sync_engine - root cause unknown, needs investigation of sub-steps (IngestionCRMRecord.new, CrmEntitySnapshots, events, clusters, claims). 4. Background Task.Supervisor tasks crash silently - no monitoring.
