content: "Safety Connect org setup: HubSpot API key pat-na2-... had scope for 9/11 CRM object types. Tickets and line_items returned 403. Pipeline discovery (GET /crm/v3/pipelines/{type}) returned 403 — Pipelines API has different scope requirements than CRM objects (needs crm.objects.goals.read or similar). Search API for engagement objects (notes/calls/emails/meetings/tasks) with createdate filter returned 400 — these object types may not support `createdate` as a search filter property. Probe with GET /crm/v3/objects/{type}?limit=1 is the fastest scope check."
