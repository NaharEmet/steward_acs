content: |
  Analyzed all agent task feedback and found 6 recurring issue categories. Best placement for each:
  - Ecto :map nil/synced_at gotchas → phoenix-guide.md + memory
  - Silent Task.Supervisor crashes → elixir-guide.md + memory
  - Cross-BEAM tool architecture → already in acs-architecture.md, memory added for auto-injection
  - MIMO rate limit config sprawl → code comment at source + memory
  - acs_exec_command broken → memory (warning)
  - Org setup pre-flight → crm-ingestion.md + memory
  
  Key principle: guides for deep reading, memories for auto-injection via guidance packets.
