content: "ToolRegistry at Acs.MCP.ToolRegistry has get_tool/1. To inspect tools at runtime from umbrella root, run mix from the app dir (apps/agent_coordination_system). The `mix run` command doesn't support --app flag. Use `Application.ensure_all_started(:steward_acs)` after --no-start to boot the ACS app. Cognition loader tests have pre-existing fixture validation failures (strings too short, tmp file path issues) unrelated to tool changes."
