content: "HubSpot private app tokens (pat-*) cannot access crm/v3/pipelines API — they return 403. Pipeline discovery requires OAuth with settings.users.teams.read scope. The pipeline-provenanced claim extraction (Phase 4) is resilient: even without pipeline discovery, raw pipeline/dealstage IDs flow into claim metadata via extract_pipeline_context/1 from the raw API payload. But entity IDs and pipeline label resolution (pipeline_name) depend on successful pipeline discovery."
