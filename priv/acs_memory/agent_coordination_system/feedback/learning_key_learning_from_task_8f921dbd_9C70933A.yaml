content: mix precommit runs deps.unlock --unused, format, then test. The test suite has 2322 tests with 1 pre-existing failure in Anantha.CRM.JoinConfigTest - test expects source_fields without "company" field, but both @default_joins and default.yaml include "company". This was introduced by commit 4a7a59a8 which added "company" but didn't update the test. Compile has ~46 warnings (unused vars/aliases) but no compile errors.
