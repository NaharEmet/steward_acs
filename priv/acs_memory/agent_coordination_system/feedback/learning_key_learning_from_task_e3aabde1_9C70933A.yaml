content: "elixirc_paths: [\"lib\"] recursively compiles ALL .ex files under lib/, including vendored deps from submodules (lib/foo/deps/**/*.ex). When path dependencies live under lib/, their source gets compiled twice and their vendored build artifacts cause cryptic errors (e.g., credo looking for .credo.exs, makeup looking for JS files). Fix: use explicit per-directory paths instead of \"lib\" catch-all. Pass individual .ex files for root-level modules — Mix.Utils.extract_files accepts both files and dirs."
