content: "RateLimiter.check_rate_limit/1 returns {:rate_limited, count} from Agent.get_and_update but @spec says :rate_limited. When fixing Agent.get_and_update callbacks, the first element of the callback tuple is the return value — if count is unused, return bare atom. Check @spec vs actual return values for all Agent-based functions that use get_and_update."
