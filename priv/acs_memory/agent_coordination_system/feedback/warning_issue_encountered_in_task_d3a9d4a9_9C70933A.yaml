content: "HubSpot search API for engagement types (notes, calls, emails, meetings, tasks) uses `hs_createdate` not `createdate`. The existing code at `hub_spot.ex:54-55` used `createdate` which caused 400 errors. Had to diagnose and fix this before sync could complete. Also, `acs_crm_sync_object_type` doesn't allow passing custom `since` parameter because the server-side `sync_object_type` always overwrites it with auto-computed timestamps."
