content: |
  The task handover dispatch system has been fully removed. Key changes:
  
  1. **Removed sleeping agent dispatch** from ACS state machine — agents no longer sleep waiting for tasks
  2. **Removed hand-off mode** — agents no longer dispatch tasks to sleeping agents
  3. **self-claim is now the default** — all agents use `claim: true` on `acs_create_work`
  4. **User-directed delegation is the exception** — creating tasks for others only when user explicitly directs, omitting `claim: true`
  5. **Deprecated commands**: `dispatch.md`, `sleep.md`, `pending.md` — all marked with `disable-model-invocation: true`
  6. **Updated 6 agent files** to use `claim: true` in their registration patterns
  7. **Removed `acs_sleep`/`acs_wake`** from agent-workflow.md tool reference
  
  The rule is now simple: you create it, you claim it. Always.
