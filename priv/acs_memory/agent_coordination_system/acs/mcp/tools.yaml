content: |
  Elixir's `and` is a strict boolean operator — it requires the left side to be literally `true` or `false`. When you write `args[\"key\"] and is_list(args[\"key\"])`, and `args[\"key\"]` is `nil` (because the key doesn't exist), this raises `BadBooleanError`. Always use `&&` instead, which accepts any truthy/falsy value and short-circuits. This applies to all guard/predicate patterns where you're checking for the presence of an optional value before testing its type.
  
  Bad: `if (x = map[\"key\"]) and is_list(x) do` → raises BadBooleanError when `map[\"key\"]` is nil
  Good: `if (x = map[\"key\"]) && is_list(x) do` → safely short-circuits on nil
