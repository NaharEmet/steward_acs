content: "`get_present_status/0` at `Acs.Acs.get_present_status` accesses agent status fields with dot notation (s.current_task_id) which raises `KeyError` when the ETS status map lacks that key. This happens when agents register with minimal `%{purpose: \"active\"}` map (from tools.ex:482). Fix: use `Map.get(s, :current_task_id)` for all optional fields (`:current_task_id`, `:application`, `:component`). The `:agent_id` key is always present because `get_all_agent_statuses/0` adds it from the ETS tuple key, but safer to use `Map.get` consistently."
