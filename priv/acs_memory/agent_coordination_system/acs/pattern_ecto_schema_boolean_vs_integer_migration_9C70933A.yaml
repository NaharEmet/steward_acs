content: "When an Ecto migration defines a column as `:boolean` but the schema defines it as `:integer` (or vice versa), SQLite/Exqlite may throw a `datatype mismatch` error during insert. Always ensure the schema field type matches the migration column type exactly. If the migration uses `:boolean`, the schema must use `:boolean` and the application should pass `true`/`false` (not `1`/`0`)."
