content: |
  When a function has two sequential DB operations where the second depends on the first succeeding, use `with` to short-circuit on the first failure:
  
  ```elixir
  # BAD: first result discarded, always falls through
  case Indexer.update_status(...) do
    {:ok, _} -> :ok
    {:error, e} -> {:error, e}
  end
  # execution continues here regardless
  
  # GOOD: short-circuits on failure
  with {:ok, _} <- Indexer.update_status(...) do
    Repo.update_all(...)
  end
  ```
  
  Also: `Ecto.Repo.update_all/3` does NOT return `{:error, e}` tuples — it raises exceptions on failure. The correct approach is to either use `try/rescue` or match on `{count, nil}` return tuples. The `{:error, e} -> {:error, e}` catch-all clauses in `case Repo.update_all(...)` are unreachable and should be removed in favor of rescue blocks.
  
