content: |
  When a GenServer has long-running async work (e.g., file sync) that blocks event processing via a boolean flag (e.g., `in_sync`), always add a `pending` flag so that events arriving during the work window are not silently dropped. On completion, check the pending flag and immediately re-trigger the work.
  
  This pattern applies broadly to any GenServer with debounced/scheduled work where new events could arrive while processing:
  
  1. Set `pending: false` in init state
  2. When an event arrives while busy, set `pending: true` instead of dropping
  3. When work starts, reset `pending: false`
  4. When work completes, if `pending`, self-send the trigger message immediately
  
