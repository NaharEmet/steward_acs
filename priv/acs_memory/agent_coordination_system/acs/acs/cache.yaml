content: |
  In the ACS Cache module (`Acs.Acs.Cache`), every public function must call `ensure_table/1` on its target table before performing an ETS operation (`:ets.insert`, `:ets.tab2list`, `:ets.delete`, etc.). Missing this guard causes crashes at startup if a function is called before `ensure_tables/0` has run.
  
  All functions follow this pattern except `get_all_agent_statuses/0` which was missing the guard. The function name is `ensure_table/1` (not `ensure_table_safe`).
  
