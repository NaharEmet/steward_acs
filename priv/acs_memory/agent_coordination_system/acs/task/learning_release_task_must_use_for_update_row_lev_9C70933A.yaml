content: "release_task in Acs module previously used Repo.get() within a transaction without row-level locking. This created a check-then-act race where two concurrent releases could both see the task as owned by their agent. Fix: use Repo.get!(AcsTask, task_id, lock: \"FOR UPDATE\") to acquire an exclusive row lock before checking ownership, ensuring no other transaction can concurrently modify the row."
