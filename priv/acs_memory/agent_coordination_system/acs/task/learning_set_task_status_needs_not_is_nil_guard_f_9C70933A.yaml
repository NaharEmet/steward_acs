content: "set_task_status pattern-matched `%AcsTask{locked_by_agent: locked_by} when locked_by != agent_id` which matched when locked_by_agent was nil (since nil != any non-nil agent_id). This caused already-released tasks to return :not_owner when set_task_status was called. Fix: add `not is_nil(locked_by)` guard so the clause only matches when there IS an owner that doesn't match."
