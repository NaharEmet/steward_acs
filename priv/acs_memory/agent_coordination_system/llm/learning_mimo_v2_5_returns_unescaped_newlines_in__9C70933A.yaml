content: |
  MiMo v2.5 (mimo-v2.5) returns valid-looking JSON but with unescaped newlines in string values (especially the `reasoning` field). This causes `Jason.decode/1` to fail.
  
  Two fixes applied:
  1. **Prompt tweak** — Instruct MiMo to use single-line values only (no multi-line strings)
  2. **Code sanitization** — Added `escape_newlines_in_strings/1` as fallback in `try_extract_json/1`. This walks JSON char-by-char tracking string context via quote toggling, replacing literal newlines inside strings with `\\n`.
  
  The sanitization is a fallback — the prompt fix is the primary defense, but the code fallback catches any cases where the model ignores instructions.
