content: "JSON requires ALL control characters (0x00-0x1F) to be escaped inside string values. LLM providers like MiMo and NIM embed `\r`, `\t`, and other control chars in reasoning strings, producing invalid JSON. The `escape_newlines_in_strings/1` function must have a clause BEFORE the catch-all that intercepts control chars (c < 0x20, c != 0x0a) inside strings and escapes them as `\\uXXXX`. Pattern matching order matters — the specific clause must precede the generic `<<c::utf8>>` catch-all."
