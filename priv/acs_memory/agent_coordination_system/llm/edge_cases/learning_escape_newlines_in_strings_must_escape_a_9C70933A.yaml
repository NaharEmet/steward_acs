content: "`escape_newlines_in_strings/1` must handle ALL control chars (0x00-0x1F) inside JSON strings, not just `\n` (0x0a). MiMo/NIM models embed `\r`, `\t`, `\b` etc. in reasoning strings within JSON. A dedicated clause with guard `when c < 0x20 and c != 0x0a` before the catch-all escapes them as `\uXXXX`. The `in_string` param must be `true` literal pattern to only escape inside strings. This clause MUST precede the generic catch-all in pattern matching order."
