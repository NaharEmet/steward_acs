content: "Memory evaluation prompt migrated from inline string in llm.ex to dedicated DotPrompt .prompt file. Pattern: create `prompts/*.prompt` with `init do...end` block declaring params (@memory_entry: str, @existing_memories: str), `mode: json`, `response do...end` block for JSON contract, `{response_contract}` placeholder in body. Call with DotPrompt.render/3 in Elixir code. Fallback preserves old inline string for resilience."
