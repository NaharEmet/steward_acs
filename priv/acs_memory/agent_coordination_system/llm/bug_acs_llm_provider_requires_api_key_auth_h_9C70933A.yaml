content: |
  The `do_call_provider/2` function in `Acs.LLM` sends HTTP requests to LLM providers via Req.post. After a shared lib refactor, the Authorization header (Bearer {api_key}) was dropped from the call. All external LLM API providers require an API key in the Authorization header.
  
  Three things must be present for a working call:
  1. API key lookup via `Application.get_env` or `System.get_env` with early return `{:error, :missing_api_key}` if not found
  2. `headers: [{"Authorization", "Bearer #{api_key}"}]` on the Req.post call
  3. `receive_timeout: 30_000` on the Req.post call (default is 5s which is too short for LLM responses)
  
  Additionally, the request body must include `temperature: 0.0` for deterministic output, and the MiMo provider needs `%{thinking: %{type: "disabled"}}` when `config[:suppress_thinking]` is true.
