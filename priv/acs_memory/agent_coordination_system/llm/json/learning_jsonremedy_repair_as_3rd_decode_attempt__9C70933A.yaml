content: "`Acs.LLM.try_extract_json/1` now has three decode attempts: (1) raw `Jason.decode`, (2) `escape_newlines_in_strings` + `Jason.decode`, (3) `try_json_remedy` + `Jason.decode`. Uses `apply(JsonRemedy, :repair, [json_string])` to avoid compile-time warnings about optional dependency. The `try_json_remedy/1` function uses `Code.ensure_loaded?/1` and `function_exported?/2` guards and returns `:fallback` if json_remedy is unavailable."
