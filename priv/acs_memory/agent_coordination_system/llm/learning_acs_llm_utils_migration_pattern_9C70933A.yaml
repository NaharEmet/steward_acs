content: |
  ## Migration: ACS → LLMUtils.ResponseParser
  
  When replacing manual `Acs.LLM` JSON parsing with `LLMUtils.ResponseParser`:
  
  1. **ACS already had `:llm_utils` dependency** — just wasn't using `ResponseParser`
  2. **Migration steps**:
     - Replace `alias LLMUtils.JsonExtractor` + `alias LLMUtils.JsonAdapter` with `alias LLMUtils.ResponseParser`
     - Strip thinking tags before passing to `ResponseParser.parse/1` (still ACS-specific)
     - Return `{:ok, map} | :error` from `extract_json_content/1`
     - Remove custom `escape_newlines_in_strings/1` — `ResponseParser` handles this via `SyntaxNormalization`
     - Tests: Simplify assertions to match `{:ok, decoded}` return type
  3. **Benefits**: 88 lines removed from `llm.ex`, 27 from test, all edge cases handled by `ContentCleaning`, `MultipleJsonDetector`, `SyntaxNormalization`, `JsonRemedy`
  
  ## Fixing Dead Stubs in Main App
  
  When `Anantha.LLM.*` modules alias `Anantha.LLM.JsonExtractor` or `Anantha.LLM.JsonAdapter`:
  
  1. These were stub files with only comments — no actual module definitions
  2. Fix order: **change aliases first, then delete stub files** (to avoid compile errors)
   3. `Anantha.LLM.Client` — replace `alias Anantha.LLM.JsonExtractor` with `alias LLMUtils.JsonExtractor`
   4. `Anantha.LLM.ResponseParser` — make a delegation layer to `LLMUtils.ResponseParser`, keep only project-specific functions like `ant_ir?/1`
  5. Delete stub files last
  
  ## Key Observation
  
  `LLMUtils.ResponseParser` references `JsonRemedy.repair/1` — this resolves at runtime via Hex dependency `:json_remedy ~> 0.2` (listed in both root `mix.exs` and `lib/anantha_json/mix.exs`)
