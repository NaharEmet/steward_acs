content: |
  `Acs.LLM.try_extract_json/1` and `Acs.LLM.extract_json_content/1` now use `AnanthaJson.ResponseParser.parse/1` instead of the manual 3-attempt cascade (Jason.decode → escape_newlines_in_strings → JsonAdapter.decode). The `escape_newlines_in_strings/1` function and all its private helper clauses were removed since `JsonRemedy` (used internally by ResponseParser) handles unescaped newlines in JSON strings automatically.
  
  Key behaviors preserved:
  - `<thinking>...</thinking>` tag stripping (ACS-specific, done before calling ResponseParser)
  - Markdown code fence extraction (handled by JsonRemedy ContentCleaning Layer 1)
  - Text-before-JSON extraction (handled by MultipleJsonDetector preprocessing)
  - Unescaped newlines/control chars (handled by JsonRemedy syntax normalization)
  - Return shape: `try_extract_json` returns `{:ok, map} | :error`, `extract_json_content` returns `{:ok, map} | :error`
