content: "MiMo v2.5 has \"deep thinking\" enabled by default, which wraps JSON output in thinking context even with response_format: {type: \"json_object\"}. To disable thinking, add `suppress_thinking: true` to the provider config and pass `thinking: %{type: \"disabled\"}` in the request body. Use `config[:suppress_thinking]` (access syntax) rather than `config.suppress_thinking` because not all providers have this field."
