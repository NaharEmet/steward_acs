content: |
  ## Root Cause: `find_balanced/4` base case returns `""` on end-of-input
  
  When `find_balanced/4` reaches end-of-input (empty rest), it returns `""` instead of the accumulated `acc` string. This discards correctly parsed content, leading to double-closing-braces `}}` when fallback extraction layers reprocess incomplete results.
  
  ## Fix Applied
  
  Changed base case from `""` to `acc`:
  
  ```elixir
  # Before
  defp find_balanced(_, _, _, _), do: ""
  
  # After  
  defp find_balanced(_, _, _, acc), do: acc
  ```
  
  ## Secondary Issue: Redundant `extract_balanced_json` calls
  
  `extract_json_content/1` had no fast-path for already-valid JSON. It always ran `extract_from_markdown_blocks` (which calls `extract_balanced_json`) and then might call it again redundantly. Fixed by adding a fast-path that tries `Jason.decode` first, returning immediately if valid JSON.
  
  ## Key Pattern
  
  Any extraction function with a recursive structure should preserve accumulated content on end-of-input rather than returning empty. The accumulator already contains valid parsed material.
