content: "`extract_balanced_json/1` in `Acs.LLM` had a double closing brace bug. `find_balanced/4` already includes closing `}` in its return when count==1. But `extract_balanced_json` wrapped it with another `}`, producing `}}` at end. Fix: use `\"{\" <> find_balanced(...)` instead of `\"{#{find_balanced(...)}}\"`."
