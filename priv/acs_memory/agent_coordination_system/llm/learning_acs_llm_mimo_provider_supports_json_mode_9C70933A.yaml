content: |
  MiMo v2.5 (Xiaomi model) supports `response_format: {"type": "json_object"}` via the OpenAI-compatible API. The Acs.LLM module must set `supports_json_mode: true` for the mimo provider, otherwise the API won't send the json_object constraint, and the model returns free-form text that can't be parsed as JSON, causing `:invalid_json_response` errors.
  
  The main app (`Anantha.LLM.Providers.Mimo`) already has `supports_json_mode: true` correctly. The ACS copy had `false` — this was a bug.
  
  Also: the NIM API key env var in ACS .env must be `NIM_API_KEY` (not `NVIDIA_NIM_API_KEY`) to match what the code checks via `System.get_env("NIM_API_KEY")`.
