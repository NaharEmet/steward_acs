content: "When LLM responses fail extraction, values like reasoning_content can be nil. Always add nil guard clauses to extraction functions: `defp extract_json_content(nil), do: \"\"`, `defp try_extract_json(nil), do: :error`, `defp try_reasoning_content(nil), do: {:error, :empty_response}`. Without these, FunctionClauseError crashes occur because the existing clauses match only on binaries via `when is_binary(content)`."
