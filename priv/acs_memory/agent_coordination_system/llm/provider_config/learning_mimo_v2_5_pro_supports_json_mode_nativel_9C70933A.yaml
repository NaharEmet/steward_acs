content: "MiMo-V2.5-Pro (via Xiaomimimo API at token-plan-sgp.xiaomimimo.com) natively supports JSON mode structured outputs via response_format: {type: \"json_object\"} in OpenAI-compatible format. All major API providers hosting MiMo-V2.5-Pro support this. Setting supports_json_mode: false was incorrect — model DOES support it. The earlier :invalid_json_response error was likely caused by other factors (thinking param conflict, prompt format, or model version), not JSON mode incompatibility."
