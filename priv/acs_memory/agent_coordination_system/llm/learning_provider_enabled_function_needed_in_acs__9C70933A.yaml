content: "When refactoring `Acs.LLM` module, the `provider_enabled?/1` private function is critical. It checks the `:enabled_llm_providers` application env whitelist — empty list means all providers enabled. This function must be preserved during refactoring. It is called from both `try_providers/5` and `get_enabled_providers/0`."
