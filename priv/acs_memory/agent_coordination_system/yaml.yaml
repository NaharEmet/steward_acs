content: "The YAML quoting functions encode_scalar/1 (memory/loader.ex) and encode_yaml_inline_value/1 (cognition/loader.ex) must handle all YAML special characters to prevent parsing errors. Characters like backtick (`), [, ], {, } can be misinterpreted by YAML parsers when unquoted. Additionally, standalone pipe (|) must be quoted separately from colon checks because it introduces a YAML block scalar."
