content: |
  When auditing ACS error traces, use these criteria to determine if an error task is stale:
  - No active traces in last 7+ days → stale, can be closed
  - Count = 1 (initial occurrence) with no recurrence → likely one-off
  - If trace is from HubSpot CRM and no HubSpot API key configured → not a code bug
  - If trace is LLM timeout with no provider configured → expected dev behavior
  - Always cross-reference with acs_list_error_traces (not just acs_list_tasks) to see current activity
  - Set error tasks to 'done' when they're stale, don't create work items for them
