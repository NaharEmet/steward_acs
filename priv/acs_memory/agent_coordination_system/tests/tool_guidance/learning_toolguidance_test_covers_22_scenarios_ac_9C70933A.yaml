content: "The ToolGuidance module test (tool_guidance_test.exs) covers 22 test cases across 8 describe blocks: for_scope/1 basics, known_scopes/0, all_scopes_guidance/0, Guidance.generate/1 merge behavior with tool scopes, nil scope handling, unique content per scope, tier option in generate/2, and non-matching scope nil returns. Tests must be run from the apps/agent_coordination_system directory (not umbrella root) because Acs.DataCase lives in that app's test/support."
