content: Expected operational conditions like "all LLM providers failed" (rate limiting/unavailability) and "max retries exceeded" should use Logger.warning instead of Logger.error. Logger.error should be reserved for actual code bugs and unexpected failures. This prevents noise in error tracking systems.
