content: |
  When running tests for an umbrella app that depends on a shared path dep (`:anantha_json`), run `mix test test/path` from within the app directory (e.g. `apps/agent_coordination_system/`), not from the root. Running from root causes the root app to also compile the shared lib's local deps (jason, json_remedy) causing dozens of \"redefining module\" warnings. Running from within the app directory uses the umbrella's shared dependency tree cleanly.
  
  Path: `cd apps/agent_coordination_system && mix test test/acs/llm_test.exs`
