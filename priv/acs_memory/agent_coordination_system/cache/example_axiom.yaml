id: axiom_cache_release_ordering
kind: axiom
status: proposed
title: Cache release ordering
scope_path: agent_coordination_system/cache/release
summary: Agent state must be cleared before task cache deletion.
content: |
  When releasing tasks, clear agent ownership before
  deleting task cache entries to avoid stale assignment races.
importance: 5
tags:
  - cache
  - concurrency
triggers:
  - task release
  - cache invalidation
failure_modes:
  - stale ownership
  - duplicate assignment
