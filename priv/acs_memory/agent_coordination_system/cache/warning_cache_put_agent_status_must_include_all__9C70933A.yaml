content: |
  The `Cache.put_agent_status/2` function stores agent status maps directly in ETS without merging defaults. Any code path that calls it directly (bypassing `Acs.Acs.put_agent_status/2`) must include `:current_task_id`, `:application`, and `:component` keys — otherwise `get_present_status/0` crashes with `KeyError` when accessing missing keys.
  
  The `Acs.Acs.put_agent_status/2` function safely merges defaults via `Map.merge/2`, but tools.ex:482 was calling `Cache.put_agent_status` directly with only `%{purpose: "active"}`, causing the crash.
  
  **Rule**: Always use `Acs.Acs.put_agent_status/2` (which merges defaults) instead of `Cache.put_agent_status` directly unless you explicitly need to bypass defaults and understand the full schema contract.
