content: |
  Agents now auto-register in ETS agent status on any tool call containing `agent_id`. This ensures agents doing lightweight work (reading files, searching) appear in `get_present_status` without needing to create ACS tasks. 
  
  The Cache GenServer runs a periodic sweeper every 30s that removes agents with `updated_at` older than 60s — both from ETS and DB. This cleans up stale/disconnected agents automatically.
  
  **Key functions added:**
  - `Acs.Acs.Cache.touch_agent_status/1` — Lightweight ETS-only `updated_at` bump (no DB write). Returns `:ok` if found, `{:ok, nil}` if not found.
  - `Acs.Acs.Cache.put_agent_status/2` now auto-adds `updated_at` timestamp.
  - `Acs.Acs.Cache` now has `alias Acs.Repo` and `import Ecto.Query, only: [from: 2]`.
  - `Acs.MCP.Tools.call_tool/2` auto-registers agents via `Cache.get_agent_status` → new agent: `Cache.put_agent_status`, existing: `Cache.touch_agent_status`.
  
  **Sweeper behavior:**
  - Agents without `updated_at` are treated as stale (swept immediately).
  - Sweep runs in a `Repo.transaction` for safe DB deletion.
  - Reschedules itself every 30s via `Process.send_after`.
