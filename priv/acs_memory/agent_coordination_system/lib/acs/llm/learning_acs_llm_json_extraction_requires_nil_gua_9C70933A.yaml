content: |
  `Acs.LLM` must handle nil values from reasoning model responses (content or reasoning_content can be nil when JSON key exists with null value). Three nil guard clauses required: `extract_json_content(nil)`, `try_extract_json(nil)`, and `try_reasoning_content(nil)`.
  
  For reasoning models (mimo-v2.5) that mix thinking text with JSON output, `extract_json_content/1` uses a 4-stage cascading fallback:
  1. Strip `<thinking>...</thinking>` tags
  2. Extract from markdown code fences ```json ... ```
  3. Extract balanced `{...}` braces via brace counting
  4. Last resort: regex search for `"recommendation"` or `"quality_score"` keys in a JSON-like block
  
  This prevents crashes and improves resilience against non-standard LLM response formats.
