content: |
  extract_balanced_json/1 wrapped find_balanced/4 result in `{}` interpolation, but find_balanced ALREADY returns content including the closing `}`. This produced `}}` at end of extracted JSON, causing ALL `:invalid_json_response` errors across both MiMo and NIM providers.
  
  Fix: `[_, rest] -> "{" <> find_balanced(rest, 1, false, "")` instead of `[_, rest] -> "{#{find_balanced(rest, 1, false, "")}}"`.
  
  All previous fixes (in_string tracking, control char escaping, newline escaping, thinking suppression) were correct but couldn't work because the extracted string was always corrupted by the extra brace.
