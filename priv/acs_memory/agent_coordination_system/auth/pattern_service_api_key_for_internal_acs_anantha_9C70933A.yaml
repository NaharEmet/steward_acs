content: |
  ACS tools authenticate to Anantha OS using a static `:service_api_key` config (`"dev-service-key"` in dev) instead of DB-backed API keys. This avoids the chicken-and-egg problem where ACS needs an API key to call Anantha, but only Anantha can generate one.
  
  Both apps share the same config key:
  - Anantha OS: `config :anantha_os, :service_api_key, "dev-service-key"` in `config/dev.exs`
  - ACS: `Application.get_env(:steward_acs, :service_api_key, "dev-service-key")`
  
  The `EnsureApiKey` plug checks the service key first (no DB lookup, full admin permissions), then falls back to DB-backed key validation. This means:
  - Service key → `key_id: "service"`, `org_id: system_org_id()`, permissions: `["admin"]`
  - DB key → normal lookup with `Anantha.ApiKeys.validate_key/1`
