content: |
  Acs.Repo uses `Application.compile_env(:steward_acs, :repo_adapter, Ecto.Adapters.SQLite3)` which evaluates at compile time. Setting `DATABASE_URL` in runtime.exs does NOT override this because the module already compiled with SQLite3. To switch adapters, either:
  1. Set the config at compile time via MIX_ENV=prod (which uses prod.exs with Postgres)
  2. Change `compile_env` to `get_env` in the Repo module
  
