content: |
  The ACS MCP system now implements progressive tool disclosure for tool levels. `list_tools_mcp/2` accepts an optional `requested_level` parameter (default 1), and the `tools/list` MCP endpoint extracts the `level` parameter from request params. The handle_call for `{:list_tools_mcp, agent_role, requested_level}` uses `filter_by_level(requested_level)` instead of the previously hardcoded `filter_by_level(2)`. 
  
  Key changes:
  - `ToolRegistry.list_tools_mcp/1` → `list_tools_mcp/2` with `requested_level \\ 1`
  - `Protocol` `tools/list` handler: `_params` → `params`, extracts `params["level"] || 1`
  - `Guidance` `@tool_reference` updated to describe the 3 progressive levels clearly
  - The `help` tool description in `acs.yaml` already accurately describes the default behavior as "only shows level 1"
  - No YAML changes needed — the level descriptors in acs.yaml were already correct
  
