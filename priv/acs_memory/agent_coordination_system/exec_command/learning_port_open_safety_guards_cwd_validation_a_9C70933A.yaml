content: |
  Three safety guards added to Acs.MCP.Tools.ClusterHandlers.exec_command/1 after code review:
  
  1. **cwd validation** (CRITICAL): Before Port.open, check `File.dir?(cwd)`. Non-existent cwd causes linked port to crash the calling process.
  
  2. **args type check** (MAJOR): Before Port.open, coerce non-list args to empty list with `if is_list(args["args"]), do: args["args"], else: []`. Non-list args crash Port.open.
  
  3. **Port crash isolation** (MAJOR): Wrap Port.open and collect_output in try/rescue for ArgumentError and ErlangError. Prevents linked port failures (OOM, invalid executable, OS kill) from taking down the handler process.
  
  These complement the earlier fix: replacing nested receive with recursive collect_output + safe_close.
