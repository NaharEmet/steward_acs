content: |
  The do_exec/4 function in Acs.MCP.Tools.ClusterHandlers used nested receive blocks that assumed data always arrives before exit_status from a port. When a command exits without stdout (or exits extremely fast), exit_status arrives first and goes unmatched, causing a timeout that calls Port.close on an already-closed port → ArgumentError crash.
  
  Fix: Replace nested receive with recursive collect_output/3 that matches both {:data, data} and {:exit_status, status} at same level. Use safe_close/1 wrapper that rescues ArgumentError on Port.close. This handles all port message orderings and prevents ToolRegistry crash.
