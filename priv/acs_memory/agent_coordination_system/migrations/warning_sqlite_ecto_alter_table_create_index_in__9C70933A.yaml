content: |
  SQLite3 (via ecto_sqlite3) can corrupt the database when ALTER TABLE ADD COLUMN and CREATE INDEX are executed in the same migration. The error manifests as "database disk image is malformed" on the CREATE INDEX statement. This is because SQLite's DDL transaction handling for mixed alter+create operations is fragile.
  
  **Solution:** Use `@disable_ddl_transaction true` in the migration module, or split the operations into separate migrations. The `@disable_ddl_transaction` annotation causes each DDL statement to be executed in its own transaction, avoiding the corruption.
  
  Also ensure WAL/SHM files are cleaned when recreating the database — stale WAL files from interrupted migrations can cause persistent "malformed" errors even after deleting the main .sqlite file.
  
