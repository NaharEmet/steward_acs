content: When using Ecto.Adapters.SQL.query/4 (not changesets), DateTime structs passed as query parameters may fail to encode in Exqlite. Always convert DateTime structs to ISO 8601 strings (DateTime.to_iso8601/1) before passing as raw SQL parameters. When using datetime('now') inside SQL directly, no conversion needed.
