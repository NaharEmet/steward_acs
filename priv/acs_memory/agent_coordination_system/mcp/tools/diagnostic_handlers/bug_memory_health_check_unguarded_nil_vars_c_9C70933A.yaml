content: |
  `memory_health_check/1` in diagnostic_handlers.ex calls `do_memory_health_check/3` which extracts fields from `stats_response` (a map already guarded by `is_map`). Two fields — `pending_items_summary` and `memory_totals_by_org` — were NOT guarded with `|| %{}` default. When the extension module returns an empty map `\#{ }\%` (which IS a valid map passing the is_map guard), `Map.get(empty_map, key)` returns nil, then downstream `Map.get(nil, :records, 0)` raises **BadMapError** which crashes the ToolRegistry GenServer.
  
  **Fix**: Add `|| %{}` defaults to `pending_summary` and `memory_totals` in `do_memory_health_check/3` (lines 232-233).
