content: |
  The `Acs.MCP.Tools.call_tool/2` function previously used a massive `case name do` with 50+ clauses. Replaced with module attribute `@dispatch` map of string-to-function references and `Map.fetch/2` lookup. Gated tools (anantha_*) use a separate `@gated_tools` map with conditional enable check via `call_gated_tool/2`. Tools needing a fixed first arg (write_tool, org_*) use thin wrapper functions like `defp call_write_tool(args), do: DynamicTools.call_tool("write_tool", args)`.
  
  This is:
  - More declarative: tool routing is data, not code
  - Faster: O(1) map lookup vs O(n) sequential case matching
  - Easier to extend: just add a new map entry
  
