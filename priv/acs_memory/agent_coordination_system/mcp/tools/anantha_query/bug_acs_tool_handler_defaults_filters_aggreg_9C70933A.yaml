content: |
  In `anantha_query.ex` lines 107-109, the execute_query tool body construction defaults filters and aggregates to empty lists:
  
  ```elixir
  filters: args["filters"] || [],   # Should be %{}
  aggregates: args["aggregates"] || [],  # Should be %{}
  ```
  
  The controller's `apply_filter_clauses` filters by `is_map(conditions)` — empty list falls through catch-all. The controller's `string_keys_to_atoms([])` returns `[]` which also hits the same catch-all.
  
  Fix: Default to `%{}` for both.
  
  File: `apps/agent_coordination_system/lib/acs/mcp/tools/anantha_query.ex`, line 107-109.
