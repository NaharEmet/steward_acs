content: "Port-based command execution needs recursive collect_output instead of nested receive. Root cause: exit_status can arrive before data (or without data). Pattern: recursive receive matching BOTH {:data, data} and {:exit_status, status}, accumulating data in acc across calls. Add safe_close/1 wrapping Port.close in try/rescue ArgumentError for port-already-closed case. Always guard cwd with File.dir?/1 and coerce args to list with is_list guard."
