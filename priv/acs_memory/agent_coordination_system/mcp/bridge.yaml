content: |
  The `ant_analyst.yaml` tool definition file in `acs/acstools/` had `base_url: http://host.docker.internal:4000` which only resolves inside Docker containers. Outside Docker, this causes `Req.TransportError{reason: :nxdomain}`. The fix is to use `http://localhost:4000` which works in both Docker (with host networking) and bare-metal development environments.
  
  Additionally, the Bridge module (`Acs.MCP.Bridge`) did not forward authentication headers when making HTTP requests to external APIs. The fix adds a `build_headers/1` function that extracts `api_key` from MCP tool arguments and forwards it as `Authorization: Bearer <key>`. The `ant_analyst.yaml` tools now include an `api_key` parameter so agents can pass their Anantha API key.
  
