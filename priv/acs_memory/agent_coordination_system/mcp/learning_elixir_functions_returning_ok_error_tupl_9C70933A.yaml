content: |
  Many functions in ACS (Req.request, Repo.query, Repo.get, File.write, Ecto.Adapters.SQL.query) already return `{:ok, result}` or `{:error, reason}` tuples. Wrapping them in `try/rescue` is redundant — the case pattern already handles both success and failure paths. Only wrap in try/rescue when the function can genuinely raise (Port.start, cleanup code). Use `Repo.get` instead of `Repo.get!` + rescue `Ecto.NoResultsError` — handle nil with pattern matching. Use `File.write/2` and `File.mkdir_p/1` (which return ok/error tuples) instead of `File.write!/2` and `File.mkdir_p!/1` (which raise on error).
  
