content: |
  When using `:ets.select/2` with match patterns that filter on map field values (not the ETS key), the function can return multiple results if multiple entries share the same field values. This is because ETS `:set` tables are keyed by the first tuple element (usually a UUID), not by the queried fields. Code must handle `[]`, single-match `[{key, value}]`, AND multi-match `[...]` cases explicitly to avoid `CaseClauseError`. The correct pattern is:
  
  ```elixir
  case match_result do
    [] -> # handle no match
    matches when is_list(matches) -> # handle one or more matches
  end
  ```
  
  When handling duplicates, use `Enum.max_by/2` on `last_seen_at` to pick the freshest entry, and clean up stale duplicates with `List.keydelete/3` and `:ets.delete/2`.
  
