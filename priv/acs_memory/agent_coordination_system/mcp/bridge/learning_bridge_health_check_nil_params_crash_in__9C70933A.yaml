content: |
  `Acs.MCP.Bridge.request_with_opts/1` passes `opts[:params]` to `Req.get/3` and `Req.delete/3`. When no `:params` key is in opts (e.g. when called from `health_check/1`), this evaluates to `nil`, causing Req's `put_params/2` to crash with `Protocol.UndefinedError: protocol Enumerable not implemented for Atom`.
  
  Fix: guard `params` before passing to Req — conditionally include `params:` only when non-nil.
