content: "Anantha-specific MCP tools (anantha_search_memory, anantha_get_synthesis, etc.) and AnanthaQuery module are gated behind a config flag: config :steward_acs, :anantha_tools_enabled, true. Default is false. The dispatch in tools.ex checks anantha_tools_enabled?/0 before calling AnanthaQuery handlers, returning {:error, \"Anantha tools not enabled\"} when disabled."
