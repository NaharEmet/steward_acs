content: |
  `ToolRegistry.call_tool/2` uses `GenServer.call(__MODULE__, {:call_tool, name, args}, :infinity)` instead of the default 5000ms timeout.
  
  **Rationale**: The GenServer blocks synchronously during tool execution anyway — callers naturally queue. Each tool manages its own timeout internally (e.g., `exec_command` reads timeout from args). Using `:infinity` prevents false timeouts for long-running MCP tools while letting the tool implementation handle its own timeout/cleanup.
  
  **Pattern**: Other GenServer calls in ToolRegistry with custom timeouts: `refresh/0` uses 30_000ms. This extends the same principle to `call_tool/2`.
