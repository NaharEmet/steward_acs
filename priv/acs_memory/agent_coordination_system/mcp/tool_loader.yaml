content: |
  The MCP ToolRegistry reads YAML tool definitions from the path returned by `Acs.MCP.ToolLoader.tools_path()`. At runtime, this defaults to `_build/acs/acstools/` (resolved via `Application.app_dir(:steward_acs)`), NOT the source directory `acs/acstools/`. 
  
  The Application config `config :steward_acs, Acs.MCP.ToolLoader, tools_path: ...` may not be loaded when running the MCP server standalone. To ensure YAML files are found, either:
  
  1. Copy YAML files to `_build/acs/acstools/`, OR
  2. Set `MCP_TOOLS_PATH` env var to the source path, OR
  3. Ensure the app config is properly loaded
  
  When adding new .yaml files to `acs/acstools/`, they must also be copied to `_build/acs/acstools/` for the MCP server to pick them up.
  
