content: The Developer auth strategy (Acs.MCP.Plugs.Strategies.Developer) returns `org_id` set to the cluster name. This is intentional — the AuthStrategy behaviour defines `{role, org_id}` return, and for developer-authenticated requests, `org_id` holds the cluster label. The MCP auth plug sets `conn.assigns.agent_cluster = result.org_id`. This means `agent_cluster` and `agent_org_id` have the same value for developer-authenticated requests (the cluster name).
