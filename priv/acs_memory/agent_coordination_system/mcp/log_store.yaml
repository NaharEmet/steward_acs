content: "When adding informational notes to empty query results, always check the **already-parsed/normalized values** rather than raw input. In `get_logs`, we initially checked `opts[:level]` (raw string) instead of `level_filter` (parsed atom), which caused incorrect branch matching for atom inputs like `:error`. Similarly, the hint text incorrectly claimed recognized levels \"default to :info\" when only truly unknown strings would trigger that default. Always verify what each branch of a conditional actually means against the actual parsing logic."
