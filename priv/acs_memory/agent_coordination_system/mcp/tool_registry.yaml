content: When a tool's implementation calls ToolRegistry.list_tools() or ToolRegistry.list_categories() (both GenServer.call to the same process), and that tool is dispatched through ToolRegistry.call_tool/2 (another GenServer.call), it creates a deadlock. The GenServer can't respond to the nested call because it's still processing the original call. The fix is to handle such tools directly in execute_tool/3 using the state parameter instead of calling back to the GenServer. Following the existing pattern used by mcp_list_categories and mcp_list_tools, which already execute inline using state data.
