content: "When a sweeper and an agent can both try to release the same task, use `Repo.transaction/1` with `Repo.get!(AcsTask, task.id, lock: \"FOR UPDATE\")` to prevent race conditions. The `FOR UPDATE` lock ensures only one process reads and writes the task row atomically. Use `Repo.rollback(:skip)` to gracefully handle the case where another process already released the task, rather than retrying or throwing an error."
