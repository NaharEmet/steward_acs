content: "Running mix commands from the root project fails due to 5s GenServer.call timeout at protocol.ex:96 (full app compilation + startup >5s). Workaround: run commands from `apps/agent_coordination_system/` sub-directory. Only that app loads, which is fast enough (<5s). Use: `cd apps/agent_coordination_system && mix run -e 'Module.function()'` instead of `mix acs.module.task` from root."
