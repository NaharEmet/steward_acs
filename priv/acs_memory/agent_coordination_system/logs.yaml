content: "ACS LogStore writes logs to two backends: ETS (synchronous, O(1) monotonic IDs for fast recent queries) and DB (fire-and-forget via Task.start with try/rescue/catch). ETS retains the existing 5K cap + 5-min TTL. DB uses `log_entries` table with JSONB metadata and separate retention policies: non-error logs deleted after 24h, error logs after 30d. The RetentionSweeper GenServer runs hourly. This ensures fast recent log queries while providing persistent log storage that survives restarts."
