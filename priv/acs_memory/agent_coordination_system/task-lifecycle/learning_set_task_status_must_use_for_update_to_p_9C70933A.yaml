content: "In `set_task_status/3`, the task read inside the transaction used `Repo.get(AcsTask, task_id)` without `lock: \"FOR UPDATE\"`. This allowed two concurrent transactions to read the same stale `locked_by_agent` value, causing sporadic `:not_owner` errors when release_task (which does use FOR UPDATE) modified the row concurrently. Changed to `Repo.get(AcsTask, task_id, lock: \"FOR UPDATE\")`."
