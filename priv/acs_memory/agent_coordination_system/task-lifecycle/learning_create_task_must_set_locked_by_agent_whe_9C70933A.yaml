content: "When `create_task` receives `status: \"claimed\"` (from `create_work(claim: true)`), it must also set `locked_by_agent` to the `agent_id`. Previously the status was \"claimed\" but `locked_by_agent` was nil, causing `release_task` to return `{:ok, nil}` and the sweeper to race with the owner on release."
