content: "In `release_task/2`, when the task's `locked_by_agent` is nil, return `{:error, :task_not_claimed}` instead of `{:ok, nil}`. The `{:ok, nil}` was matched as success by `core_handlers.ex` (`{:ok, _task}` pattern), causing agents to believe the task was released when it wasn't."
