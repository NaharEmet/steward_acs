content: |
  The Memory Auditor interval is configured via `AUDITOR_INTERVAL` env var (default 30000ms = 30s). It requires three config files to be consistent:
  
  1. `.env.example` — Template in KEY=VALUE Dotenvy format (not Config syntax)
  2. `.env` — Actual env file with the correct value
  3. `config/runtime.exs` — Must wire `System.get_env("AUDITOR_INTERVAL")` into `Application.get_env(:steward_acs, :auditor_interval)` using `String.to_integer/1` conversion
  
  The value was previously 300000ms (5 min). Current correct value is 30000ms (30s). The old `.env.example` line used Config syntax (`config :steward_acs, :auditor_interval, 300_000`) instead of KEY=VALUE format (`AUDITOR_INTERVAL=30000`), which Dotenvy ignores at runtime — meaning the env var never actually flowed to Application config.
