content: Logger backends configured in config files (like `config/config.exs`) are NOT automatically registered with Elixir's Logger. They must be explicitly registered at application startup via `Logger.add_backend(MyApp.LogBackend)` in the `Application.start/2` callback. Without this call, the backend module exists but never receives log events. Always add this registration before the supervision tree starts.
