content: |
  ACS and Anantha are separate OTP Applications running in the same BEAM VM but with separate supervision trees. MCP Tool handlers in ACS (e.g., OrgSetupHandlers, CRMHandlers) **cannot** call Anantha modules directly via function calls — they must go through HTTP (Req POST with ANANTHA_API_KEY Bearer auth).
  
  **Key constraints:**
  - ACS handlers use `Req.post!` to call Anantha's REST endpoints at `ANANTHA_URL`
  - Anantha API key auth: `Authorization: Bearer #{api_key}` header
  - The API key must belong to an existing org — creating a key then deleting the org makes it invalid
  - This applies to ALL tools that need to interact with Anantha data: org setup, CRM sync, API key generation
  
