content: |
  ## Decision: Org Setup MCP Tools
  
  Created 6 MCP tools (org_setup category, Level 2) for clean org lifecycle management:
  
  **Files:**
  - `apps/agent_coordination_system/lib/acs/mcp/tools/org_setup_handlers.ex` — handler module
  - `apps/agent_coordination_system/lib/acs/mcp/tools/tools.ex` — dispatch cases
  - `acs/acstools/org_setup.yaml` — YAML definitions
  
  **Tools:**
  1. `org_create(name, timezone?)` — create org
  2. `org_delete(org_id)` — delete org (cascade)
  3. `org_get(org_id)` — get org details
  4. `source_register(org_id, source_type, secrets_json)` — register ingestion source
  5. `source_delete(org_id, source_id)` — delete source
  6. `api_key_generate(org_id, name?, role?)` — generate API key
  
  **Design choice:** Level 2 (not always visible) to avoid cluttering agent tool listing. Agents discover via `acs_list_tools(category: "org_setup")`.
  
  **Pattern:** Follows existing CRMHandlers pattern — handler dispatch via YAML `handler:` field, ToolRegistry routes to module directly.
  
  Commit: `3e155dc8`
  
