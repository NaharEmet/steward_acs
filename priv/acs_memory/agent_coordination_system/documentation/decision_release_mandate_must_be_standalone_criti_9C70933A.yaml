content: |
  ## Problem
  Agents miss calling `acs_release_work` because the instruction "ALWAYS save learnings BEFORE calling acs_release_work" is phrased as an ordering rule (save THEN release), not a standalone mandate to release. The agent reads "order matters" not "release is mandatory."
  
  ## Root Cause
  The critical rule constrained the **order** of save-vs-release but assumed the agent already knew to release. When context-constrained, agents drop the second half of compound instructions. "Save BEFORE release" → agent saves → considers task complete → never releases.
  
  ## Fix Applied
  1. **Split into two critical rules**: "ALWAYS release your task when done" (mandate) + "ALWAYS save learnings BEFORE releasing" (ordering)
  2. **Quick Reference comment**: Added `⚠️ MANDATORY:` prefix to release step
  3. **Important Rules**: Moved "Release when done" to position 2 (was buried in middle)
  4. **agent-workflow.md Releasing Work section**: Added `⚠️ Mandatory step` banner
  5. **Session Completion Protocol Step 4**: Added `⚠️ Never skip this step` with explanation
  6. **Key Rules Summary**: Moved release from #5 to #1
  
  ## Principle
  Mandatory completion steps must be standalone critical rules, not compound ordering constraints. If an instruction says "do X before Y", agents will do X and stop. Every mandatory step needs its own rule.
