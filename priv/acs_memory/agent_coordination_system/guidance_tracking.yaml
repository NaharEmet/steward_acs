content: "When adding guidance rating fields to feedback prompts in acs_release_work, the params section must include all 4 guidance fields: guidance_useful (boolean), guidance_items_helpful (array placeholder), guidance_items_confusing (array placeholder), and guidance_missing (string). The message should also be updated to explicitly ask agents to rate the guidance."
