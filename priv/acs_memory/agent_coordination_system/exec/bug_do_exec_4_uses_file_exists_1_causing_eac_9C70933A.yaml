content: |
  ## Bug: do_exec/4 crashes with :eaccess when PATH contains non-executable files
  
  ### Symptom
  `Port.open({:spawn_executable, ...})` crashes with `:eacces` when a non-executable file appears in PATH before the real executable.
  
  ### Root Cause
  `Acs.MCP.Tools.ClusterHandlers.do_exec/4` used `File.exists?/1` to search PATH for the command executable. `File.exists?/1` returns `true` for non-executable files. When asdf has a non-executable shim at `~/.asdf/plugins/elixir/shims/mix` (permissions 664, no `x` bit) appearing in PATH before the real executable at `~/.asdf/shims/mix` (755), Erlang's `:erlang.open_port({:spawn_executable, ...})` requires execute permission on the file and raises `:eacces`.
  
  ### Fix
  Changed `Enum.find(&File.exists?/1)` to `Enum.find(&File.executable?/1)` in `do_exec/4`, at `apps/agent_coordination_system/lib/acs/mcp/tools/cluster_handlers.ex`.
  
  `File.executable?/1` checks that the file exists AND has execute permission, preventing the crash.
  
  ### Consequence
  A single call to `exec_command` for `mix compile` caused `ToolRegistry` GenServer to crash. All subsequent MCP tool calls (search_memories, claim_work, etc.) timed out until `ToolRegistry` auto-restarted via its supervision tree.
