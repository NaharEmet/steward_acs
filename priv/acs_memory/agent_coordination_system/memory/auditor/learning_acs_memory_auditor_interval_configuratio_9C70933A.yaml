content: |
  Acs.Memory.Auditor has two configurable constants:
  
  1. `@default_audit_interval` (default: 300_000ms = 5 min, changed to 30_000ms = 30s) — controls how often the auditor polls for proposed memories to evaluate
  2. `@cooling_off_seconds` (default: 300s = 5 min, changed to 30s) — minimum age before a proposed memory is eligible for audit
  
  The interval can also be overridden via application config: `Application.get_env(:steward_acs, :auditor_interval)`. Not currently set in any config file.
  
  The auditor is started as a child in the ACS supervision tree at `Acs.Application.start/2`. It uses `Process.send_after(self(), :audit, interval)` for periodic scheduling.
