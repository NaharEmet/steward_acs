content: YAML memory files use IDs without `_9C70933A` hash suffix. SQLite database memories use IDs WITH `_9C70933A` suffix. This means the same slug in both stores creates DIFFERENT memory entries. Template noise in YAML files (test_data.yaml, placeholder.yaml, etc.) does NOT automatically propagate to SQLite on reimport — the pipeline creates new SQLite entries with hashed IDs.
