content: |
  ## ACS Knowledge Memory Cleanup Report
  
  **Cleanup Date**: 2026-06-21
  **Previous Cleanup**: June 20 by another agent (rejected ~80+ template noise memories)
  
  ### Stale Memories Processed (6 total)
  1. `observation_records_to_claims_1_1_ratio_is_expected_behavior` → APPROVED (architectural invariant)
  2. `observation_org_id_audit_passed_all_tables_clean` → REJECTED (dated Jan 2024 audit snapshot)
  3. `learning_embedding_available_auto_starts_ollama_v_...` → REJECTED (duplicate of better version)
  4. `learning_extractionworker_is_event_driven_not_per_...` → REJECTED (superseded — periodic timer restored)
  5. `learning_disabled_llm_providers_config_approach_...` → APPROVED (valid config pattern)
  6. `pattern_llm_metrics_consolidate_at_request_layer_not_adapt` → REJECTED (can't verify accuracy)
  
  ### Template/Noise Rejected
  - `bug_rejected_placeholder_bug_get_all_agent_statuses_la...` (was APPROVED) → REJECTED (placeholder test data)
  - `observation_guidance_rated_as_useful_9C70933A` (test scope) → REJECTED
  
  ### Value Memories Approved
  - `pattern_runtime_exs_env_var_guard_pattern_for_no_...` → APPROVED (env guard pattern)
  - `pattern_rate_limit_config_consolidation_pattern_...` → APPROVED (rate limit consolidation)
  
  ### Test Scope Check
  Only 2 approved test-scope memories found — both are useful testing patterns. No action needed.
  
  ### YAML Files Not Modified
  Template/noise entries in YAML files (test_data.yaml, placeholder.yaml, tmp.yaml, .opencode.yaml, assets.yaml, scripts.yaml, priv.yaml, metaanalysis.yaml) remain as YAML seed data but are NOT in the active SQLite DB, so they have no runtime impact. These YAML files could be cleaned separately if desired.
  
  ### Key Finding: Hashing-Determined ID Mismatch
  IDs in YAML files lack `_9C70933A` hash suffix. IDs in SQLite DB include it. This means:
  - YAML entries with same slug as SQLite entries are treated as DIFFERENT memories
  - Template noise in YAML files does NOT propagate to SQLite on reimport
  - Memory pipeline creates new SQLite entries (with hash suffix) rather than matching YAML IDs
  
