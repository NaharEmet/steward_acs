content: "The `create_ticket_from_memory` tool follows a three-step pattern: (1) update the memory's kind to \"bug\" in the SQLite index via `update_kind/2`, (2) re-save the memory via `Loader.save()` to persist the kind change to the YAML file, and (3) create an ACS task from the memory content. This pattern mirrors `set_memory_status` and `create_task_from_error_trace`. The implementation requires changes across four files: indexer.ex (new `update_kind` function), tools.ex (tool_def, handler, action_summary, implementation), acs.yaml (tool definition), and guidance.ex (tool reference listing)."
