content: |
  The Acs::Memory::Auditor had `@max_concurrency 3` and `@max_retries 5`, which meant 3 concurrent workers each retrying up to 5 times with exponential backoff. This created a cascade that easily exhausted NIM's 40 requests-per-minute rate limit, especially when MiniMax was also failing (forcing all traffic to NIM).
  
  When both providers are failing and one is rate-limited, each retry attempt generates MORE rate limit errors, creating a positive feedback loop. With `@max_concurrency 3` and `@max_retries 5`, each memory could get retried 5 times over ~112s, blocking other memories from being processed.
  
  Resolution: reduce `@max_concurrency` to 2 and `@max_retries` to 3 (max 22s wait per memory). Also immediately mark rate-limited NIM errors as \"providers unavailable\" to skip retries entirely.
  
