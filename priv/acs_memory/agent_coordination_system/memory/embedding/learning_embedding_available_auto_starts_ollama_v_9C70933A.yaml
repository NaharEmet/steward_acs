content: |
  `Acs.Memory.Embedding.available?/0` now auto-starts Ollama when it's not running:
  
  1. Calls `check_ollama/0` (pings `/api/tags` with 2s timeouts + retry:false)
  2. If down, uses `:persistent_term` tracking to only attempt auto-start once per app lifetime
  3. Fires `ollama serve` via `Task.start` (fire-and-forget, non-blocking)
  4. Sleeps 3s, then retries once
  
  Uses `:persistent_term` for the flag (`{__MODULE__, :auto_start}`) so the one-attempt constraint persists across processes but resets on app restart. This prevents hammering `ollama serve` on every search while still retrying if the user restarts the app.
  
