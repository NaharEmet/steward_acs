content: When checking for running processes on Linux systems, `pgrep` is often used but might not be installed on minimal environments. Always wrap `System.cmd("pgrep", ...)` in a `try-rescue` block to handle `ENOENT` or other errors gracefully. Fallback to assuming the process is not running and attempting to start it.
