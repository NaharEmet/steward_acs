content: |
  # ACS Memory Cleanup — June 20, 2026
  
  Cleaned up the ACS Agent Knowledge Memory system to improve signal-to-noise ratio.
  
  ## Actions Taken
  
  ### Phase 1: Test/Harness Data (14 items rejected)
  Rejected memories with test/ and test_app/ scope paths including:
  - test_hybrid_1, test_hybrid_2 (duplicates in cache/release)
  - lifecycle_sync_*, lifecycle_rebuild_* entries
  - guidance_test_pattern, guidance_test_warning, guidance_test_axiom
  - e2e_pipeline_001, sync_all_test_001
  - Various warning_issue_encountered_in_task_* in test scopes
  
  ### Phase 2: Auto-Generated Task Feedback Templates (12 items rejected)
  Rejected templates with no signal value:
  - "Key learning from task *" (4 items)
  - "Issue encountered in task *" (10 items — some caught in phase 1, remaining in phase 2)
  - "Improvement suggestion from task feedback" (1 item)
  - "Guidance rated as useful" (2 items)
  - "Guidance gap identified" (2 items)
  - "Information gap identified in task" (1 item)
  
  ### Phase 3: Fuzzy Duplicate (1 item rejected)
  - `warning_mix_clean_only_filters_by_environment_name_not_app` (elixir/mix scope) — duplicate of `warning_mix_clean_only_filters_by_environment_not_app_name` (mix/clean scope). Kept the mix/clean version.
  
  ### Phase 4: Legitimate Proposed Items Approved (14 items approved)
  - 5 learnings (spec path stripping, PubSub PII, audit staleness, precommit failures, Mimo LLM provider)
  - 1 observation (HubSpot OAuth expiry)
  - 2 decisions (Mimo promotion, ACS org setup tools)
  - 1 bug (HubSpot pagination cursor)
  - 1 pattern (Ecto boolean/integer migration)
  - 3 warnings (Ollama pgrep, SQLite migration, schema primary key)
  - 1 approved earlier (AWDS specs relocated)
  
  ## Summary
  - Total rejected: ~27 items
  - Total approved: ~14 items
  - No YAML files deleted — all changes via set_memory_status
  - 2 stale entries left for human review (org_id audit, 1:1 records-to-claims)
  - 3 deprecated bug entries preserved for history
