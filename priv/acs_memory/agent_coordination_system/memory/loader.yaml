content: Memory YAML files are stored at `priv/acs_memory/{scope_path}/{id}.yaml` instead of the old `priv/acs_memory/{scope_path}.yaml`. This prevents multiple memories with the same scope_path from overwriting each other. Each memory gets its own file based on its unique ID.
