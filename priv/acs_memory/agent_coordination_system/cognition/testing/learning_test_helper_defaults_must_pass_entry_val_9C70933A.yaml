content: "When creating test fixtures for Acs.Cognition.Entry, all field values must pass strict quality validation in Entry.validate/1. Minimum lengths: title >= 10, purpose >= 20, invariants[N] >= 15, workflows[N] >= 20, failure_modes[N] >= 20. Additionally, values must pass `generic_*?` checks — titles like \"Test Module\" (matches `^[\w\s]+ module$` and length < 20) fail. Always use values that are long enough and semantically meaningful to avoid false validation failures in tests."
