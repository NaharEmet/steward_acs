content: "In `Acs.Acs.Sweeper.release_task_lock/1`, the `Acs.broadcast(:agent_removed, ...)` call was inside the `Repo.transaction` block. If the transaction rolls back, a stale broadcast would fire with incorrect state. Moved the broadcast to after the `case result do` block in the `{:ok, {:ok, _updated}}` branch."
