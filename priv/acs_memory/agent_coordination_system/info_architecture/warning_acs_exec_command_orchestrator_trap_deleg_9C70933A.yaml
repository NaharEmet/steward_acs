content: |
  ## Problem
  
  Build orchestrator agents (with `bash: deny`) see `acs_exec_command` as an available MCP tool and use it to run `mix` commands (compile, test, etc.). This bypasses the delegation system.
  
  ## Root Cause
  
  - Build orchestrator has `bash: {"*": "deny"}` — no direct shell access
  - `acs_exec_command` is available as an MCP tool and its description says "Use for running tests, git operations, and build commands"
  - The orchestrator reaches for it because it's the only command-execution tool it has
  - But the orchestrator's prompt says: "You CANNOT run commands directly. For ALL implementation and verification, delegate to coder"
  
  ## Fix
  
  - **NEVER use `acs_exec_command`** — it's available but wrong for orchestrator agents
  - **ALWAYS delegate** command execution to `coder` via `task`
  - **Coder** has full `bash: allow` and should run all mix commands directly
  
  ## Where Rules Live
  
  - `AGENTS.md` → Critical Rules section (visible to all agents at session start)
  - `.opencode/profiles/ws/opencode.jsonc` → Build orchestrator prompt (explicit section)
  - `.opencode/guides/agent-workflow.md` → Key Rules Summary (rule #12)
  
  ## Violation Pattern
  
  Calling `acs_exec_command(command="mix", args=["compile", "--warnings-as-errors"])` or `acs_exec_command(command="mix", args=["test"])` from a build orchestrator.
