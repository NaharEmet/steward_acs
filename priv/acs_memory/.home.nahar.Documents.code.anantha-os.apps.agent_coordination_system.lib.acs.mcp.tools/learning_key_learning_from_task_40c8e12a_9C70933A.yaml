content: "Three safety guards for Port.open in ClusterHandlers: (1) Validate cwd exists with File.dir? before opening port — non-existent dir kills linked process. (2) Coerce args to list — non-list crashes Port.open. (3) Wrap Port.open in try/rescue for ArgumentError/ErlangError — linked port isolation prevents handler process death. These complement the earlier collect_output/safe_close fix for the nested receive pattern bug."
