content: Truthforge.History stores runs as `%Entry{}` structs containing `%ScoreCard{}` with aggregated per-type metrics. LiveView templates should NOT access Entry/ScoreCard fields directly. Instead use `entry_to_display_data/1` to transform into a flat map with percent-scaled pass_rates (* 100), converted per_type map to sorted list, and resolved trend from Summary. This decouples UI from backend data model. The review page shows per-type breakdown (not per-scenario) since individual evaluation results aren't persisted in History. Coverage data (CoverageReport) is NOT stored in History entries — it's only available during the Runner run cycle. For per-scenario review, Runner.evaluation_results would need to be stored separately.
