content: "In `config/runtime.exs`, always wrap env-required config blocks in `if config_env() != :test do ... else :ok end` to prevent test failures when env vars are not set. Test configs should be set in `config/test.exs` instead. This matches the existing pattern used by ENCRYPTION_KEY/HMAC_KEY blocks."
