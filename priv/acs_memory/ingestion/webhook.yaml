content: |
  When ingesting CRM data via the ingestion webhook using unregistered source types (e.g., `safety_connect_deals`), the payload goes through `Payload.parse` directly. The Payload schema's `cast` function only accepts `raw_metadata`, not `metadata`. Using `metadata` as a key will cause the field to be silently dropped.
  
  For source types with registered adapters (like `call_transcripts`), the adapter's `normalize` function handles the key mapping. In that case, `metadata` is correct because the adapter maps it to `raw_metadata` during normalization.
  
