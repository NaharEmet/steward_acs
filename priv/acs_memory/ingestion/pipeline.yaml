content: |
  The `maybe_create_message/2` function in Pipeline requires an actor_id to create a message. For CRM data (safety_connect_companies, etc.), `resolve_or_create_actor` returns `nil` because:
  1. `external_actor_id` is `nil` (CRM records have no sender identifier)
  2. `source_type` is not `"call_transcripts"` (so no speaker extraction)
  
  This causes `maybe_create_message` to skip message creation even though content exists. The fix would be to use `get_or_create_unknown_actor` as a fallback for CRM data with content but no actor.
  
