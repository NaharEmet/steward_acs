content: |
  The Phoenix server is ALREADY running on localhost:4000. Agents MUST NOT start their own application instance for E2E testing.
  
  CORRECT approach: Use scripts/http_e2e_test.sh or send curl requests to POST http://localhost:4000/api/ingestion/webhook with real transcript payloads. This ensures the server captures logs, ACS data, and processes through the real HTTP pipeline.
  
  INCORRECT approach: Running `mix ingestion.test_e2e` which calls Application.ensure_all_started(:anantha_os) internally, bypassing the running server entirely. This means no HTTP flow, no server-side logs, no ACS data captured.
  
  See scripts/http_e2e_test.sh for the correct pattern — it checks the server is running first, sends webhooks via curl against localhost:4000, and queries the DB via mix run for verification.
  
