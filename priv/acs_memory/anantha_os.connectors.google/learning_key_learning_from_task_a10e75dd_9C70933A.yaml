content: When a config function uses Application.get_env with System.get_env fallback per key, it can be safely cached with module attributes. Application.compile_env + System.get_env in module attributes evaluates at compile time, which matches deployment behavior (env vars set before compile). This eliminates repeated runtime config lookups in hot paths like OAuth token exchange. Keep the _org_id parameter even if unused to avoid breaking callers.
