content: "`Anantha.LLM.JsonExtractor.extract/1` returns `\"\"` (empty string) when it cannot find valid JSON in the input content. This is the correct contract because callers check `if extracted == \"\"` to determine if extraction failed. The fallback clause in `do_extract/1` returns `\"\"` (not the original text) when no markdown code block or balanced JSON object is found."
