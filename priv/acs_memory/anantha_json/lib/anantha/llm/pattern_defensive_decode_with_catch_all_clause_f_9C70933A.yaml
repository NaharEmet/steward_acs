content: "When implementing `decode/1` functions that guard with `when is_binary()`, always add a catch-all clause `def decode(_), do: {:error, :invalid_input}` to prevent FunctionClauseError on nil, integers, maps, or other non-binary inputs. This makes the function safe to call with any input type and ensures the error contract is always satisfied."
