content: "RateLimiter.check_rate_limit/1 @spec says :ok | :rate_limited but Agent.get_and_update return value is a tuple for Agent internals ({return_value, new_state}). The return_value is what callers get, so it must match @spec. Changed 3 returns from {{:rate_limited, count}, valid_timestamps} to {:rate_limited, valid_timestamps} so callers matching on bare :rate_limited atom don't get CaseClauseError."
