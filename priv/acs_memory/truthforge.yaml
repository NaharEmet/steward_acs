content: |
  ## Pattern: Pipeline Adapter (Composable, Non-Invasive)
  
  When adding new analysis capabilities to an existing extraction/testing pipeline, use an **Adapter** pattern:
  
  1. Let the existing pipeline run as-is (complete with its own evaluation)
  2. Post-process the pipeline results with new analysis
  3. Keep old and new results side-by-side
  
  ### Benefits:
  - Zero risk of breaking existing pipeline
  - Can be enabled/disabled with a flag (`--truthforge`)
  - Old results still available for comparison
  - Clean separation of concerns
  
  ### Implementation:
  ```elixir
  defmodule NewSystem.Adapter do
    def run(opts \\ []) do
      # 1. Run existing pipeline
      pipeline_result = ExistingPipeline.run(opts)
      
      # 2. Post-process with new analysis
      new_analysis = analyze(pipeline_result, opts)
      
      # 3. Merge results
      Map.merge(pipeline_result, new_analysis)
    end
  end
  ```
  
  ### Used in: Truthforge.Adapter wrapping MemoryTesting.Runner
  
