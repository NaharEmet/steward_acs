content: "Phase 4 added `link_synthesis_to_entities` which creates LayerRelationship rows referencing Synthesis IDs. Test cleanup blocks that delete HypothesisSynthesis, Hypothesis, and Synthesis but NOT LayerRelationships cause FK violations when Org cleanup cascades. Always add `Repo.delete_all(from(l in Anantha.Core.LayerRelationship, select: l))` after Synthesis cleanup in any setup block that deletes syntheses."
