content: "The 678 \"could not lookup Ecto repo\" test failures are caused by a cascading crash: 1) SyncEngineTest's linked Task crashes with EXIT → 2) MessageQueue (background GenServer) crashes with OwnershipError in :manual sandbox mode 3 times → 3) Anantha.Supervisor exceeds restart threshold → 4) ALL children (including Repo) terminate → 5) Repo unregistered from Ecto Repo Registry → 6) All subsequent tests fail. Also: migration 20260609000004 drops observations table but schema still references it."
