content: |
  ## SyncEngineTest uses Task.async_stream which creates linked tasks
  
  `Anantha.CRM.SyncEngine.sync/3` uses `Task.async_stream` which creates linked Tasks (monitored). When a Task crashes (e.g., "HubSpot API key not configured"), the EXIT signal propagates to the calling process.
  
  `test "hubspot sync raises when no API key in config"` uses `assert_raise RuntimeError, fn -> SyncEngine.sync(org.id, "hubspot", %{}) end` but this does NOT catch linked Task EXITs - EXIT signals kill the process regardless of try/rescue.
  
  Fix: Use `Task.Supervisor.async_stream_nolink` or handle exits with `Process.flag(:trap_exit, true)` in the test, or return errors from the sync function without using linked tasks.
