content: "The Observation schema and context have been removed. Tests that used `observation_fixture` must be updated. The replacement is `signal_claim_fixture` which creates a Claim with `claim_type: \"signal\"` using `Anantha.Core.create_claim/2`. Signal claim maps from ObservationExtractor now include `claim_type: \"signal\"` and `actor_name: <speaker>` in addition to the existing fields (`semantic_types`, `extraction_confidence`, `speaker`, `content`, `entity_mentions`). The Claim schema requires S-P-O fields (`subject`, `predicate`, `object`) as NOT NULL in the database - signal claim fixtures must provide these with sensible defaults."
