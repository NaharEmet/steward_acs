content: |
  When adding @moduledoc to modules that previously had @moduledoc false:
  - Public API modules (compilers, handlers, core logic) should get real `@moduledoc` with ## Purpose and ## Key Functions sections
  - Standard OTP Application modules should keep `@moduledoc false` with a brief inline comment explaining the module's role
  - Internal utilities with significant logic should get real docs even if called only internally
  - Each doc should follow the project's existing documentation style: one-line summary, ## Purpose section, ## Key Functions list
