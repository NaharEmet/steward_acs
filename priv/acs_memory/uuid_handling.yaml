content: "Ecto.UUID.encode/1 is undefined in this Elixir/Ecto version. When converting a 16-byte binary UUID to a standard UUID string with hyphens, use manual bit syntax: `<<a::64, b::32, c::32, d::32, e::96>> = v` then `:io_lib.format(\"~16.16.0b-~8.8.0b-~8.8.0b-~8.8.0b-~24.24.0b\", [a, b, c, d, e]) |> IO.iodata_to_binary()`."
