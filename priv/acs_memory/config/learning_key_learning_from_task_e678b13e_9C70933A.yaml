content: "CRM ResourceGovernor was mis-namespaced (Anantha.ResourceGovernor vs Anantha.CRM.ResourceGovernor). File path and module namespace must match. Always check that module declarations follow directory structure. Also, Integer.parse/1 returns :error on non-numeric input — elem/2 on :error crashes the VM. Always use case/2 pattern matching for safe parsing. For crm_gov_opts, use config[:key] || default pattern instead of Application.get_env — the config map already contains merged CRM values."
