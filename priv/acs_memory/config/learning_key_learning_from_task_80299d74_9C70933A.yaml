content: "CRM sync resource governance uses two layers: configurable limits via Application.get_env and Memory Resource Governor via :erlang.memory checks. When adding patterns from Application.compile_env to module attributes, ensure all code references use the new attribute names (e.g., @default_page_size vs @page_size). Private functions with defaults that are always called explicitly will trigger 'defaults never used' warnings."
