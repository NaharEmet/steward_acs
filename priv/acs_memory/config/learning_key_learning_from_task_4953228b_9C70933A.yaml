content: "CRM ResourceGovernor must use configured max_memory_mb, not BEAM :erlang.memory(:system_limit) which returns address space. Page size must be fixed config (no per-sync override) to avoid string vs atom key mismatches. Integer.parse is safer than String.to_integer for env vars. Post-batch memory check must explicitly handle {:stop, reason} with error logging."
