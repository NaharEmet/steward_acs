content: "Rate limit values should have a single source of truth in `config/config.exs`. The `runtime.exs` should only provide env var *overrides* (no defaults). Fallback values should only exist in one place — `config/config.exs` — and use `Application.get_env(:anantha_os, :llm, [])` with no fallback keyword default in `Keyword.get/3`. The `Keyword.get/3` fallback in rate_limiter.ex should match config.exs as a safety net."
