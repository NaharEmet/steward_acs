content: |
  When parsing integer env vars in `config/runtime.exs`, NEVER use `elem(Integer.parse(val), 0) || default` — `Integer.parse/1` returns `:error` on invalid input and `elem(:error, 0)` crashes with ArgumentError. Use proper pattern matching:
  
  ```elixir
  case Integer.parse(val) do
    {num, _} -> num
    :error -> default_value
  end
  ```
