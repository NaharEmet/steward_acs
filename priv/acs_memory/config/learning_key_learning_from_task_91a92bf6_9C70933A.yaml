content: "CRM Resource Governance implementation: Two-layer approach works well. Layer 1: configurable limits via Application.get_env(:anantha_os, :crm) with env var overrides. Layer 2: Anantha.ResourceGovernor checks Erlang VM memory (:erlang.memory) before sync operations. Key design decisions: stateless library module (not GenServer), O(1) memory checks, compile_env for module attributes vs get_env for runtime values. Memory thresholds: <70% normal, 70-85% reduce batches, 85-95% backoff, >95% refuse."
