content: "`:crypto.hash(:sha256, data)` takes algorithm as first arg and data as second. Using pipe syntax (`data |> :crypto.hash(:sha256)`) puts data as FIRST arg, which causes \"not an iodata term\" errors. Always call `:crypto.hash` directly: `:crypto.hash(:sha256, data)`, or wrap with `then` when piping: `data |> then(&:crypto.hash(:sha256, &1))`."
