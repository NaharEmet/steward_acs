content: |
  ## Problem
  In Phoenix's default esbuild IIFE mode, `import Chart from "chart.js"` (default import) wraps the default export into a module namespace object. When `new Chart(...)` is called, it calls `new module_namespace_object(...)` instead of `new Chart_constructor(...)`, causing `chart_1.default is not a constructor` errors silently.
  
  ## Solution
  Use named import with explicit component registration:
  
  ```javascript
  // ❌ Wrong (esbuild IIFE mode)
  import Chart from "chart.js"
  
  // ✅ Correct (esbuild IIFE mode)
  import {Chart, registerables} from 'chart.js'
  Chart.register(...registerables)
  ```
  
  The named import `{Chart}` resolves directly to `chart_exports.Chart` — the actual constructor function — bypassing the esbuild IIFE module namespace wrapping.
  
  ## Key Points
  - This only applies to esbuild IIFE output format (Phoenix's default asset pipeline)
  - With Vite or other ESM-based bundlers, the default import works fine
  - `Chart.register(...registerables)` registers all chart components (controllers, elements, plugins, scales) in one call
  - No `animation: false` override conflicts with registration
  
  ## Files
  - assets/js/app.js (top-level imports)
  
