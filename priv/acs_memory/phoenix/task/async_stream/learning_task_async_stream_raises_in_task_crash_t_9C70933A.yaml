content: |
  When using Task.async_stream, exceptions raised inside the stream function crash the task process. While async_stream yields {:exit, reason} for task exits, the safest pattern is to wrap the stream function body in try/rescue so that exceptions become {:ok, {:error, e}} tuples instead of {:exit, reason}. This prevents linked-process EXIT signals from propagating to the caller.
  
  ```elixir
  |> Task.async_stream(fn arg ->
    try do
      result = risky_call(arg)
      {:ok, result}
    rescue
      e -> {:error, e}
    end
  end)
  ```
  
  This pattern was applied to SyncEngine.sync/3's async_stream to prevent HubSpot provider exceptions from crashing the test process.
