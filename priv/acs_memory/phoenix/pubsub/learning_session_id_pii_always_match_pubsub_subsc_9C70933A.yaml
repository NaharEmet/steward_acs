content: "When replacing PII (phone/email) in session IDs with HMAC hashed actor_id, the PubSub subscribe topic in LiveView mount (chat_live/index.ex:26) and the broadcast topic (line 444) must use the same identifier. If subscribe uses `actor.phone` while broadcast uses `full_message.session_id` (= `actor.actor_id`), LiveView silently never receives outbound messages — errors, clarifications, tool responses all lost with zero errors."
