content: "In Phoenix router, you can have both `POST /ingestion/webhook` and `POST /ingestion/webhook/:provider` in the same scope. Phoenix differentiates them by the number of path segments. The first matches exactly `/ingestion/webhook` with no trailing segment, while the second matches `/ingestion/webhook/{anything}`. There is no conflict because the path patterns have different segment counts."
