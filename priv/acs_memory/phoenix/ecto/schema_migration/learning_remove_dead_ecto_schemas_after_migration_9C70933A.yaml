content: |
  When a migration drops a database table, the corresponding Ecto schema module becomes dead code (if no production code creates structs or queries via that schema). The schema file must be deleted to prevent test failures with 'relation "X" does not exist'. Search for all references in lib/ (production code) — if none exist, the schema is safe to delete. Also update test files that alias or query the deleted schema.
  
  Pattern: migration drops table → check lib/ for struct usage → if dead, remove schema file + update test imports/queries.
