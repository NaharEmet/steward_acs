content: "Running all 2250+ tests via `mix test` in this codebase causes ~740 cascade failures. Root cause: test processes spawn `Task.Supervised`/`Task` processes that use Ecto connections without proper `Ecto.Adapters.SQL.Sandbox.allow()` calls. When parent test process exits while spawned task holds a connection, the DB pool connection is orphaned. All subsequent tests in the same sandbox fail with `could not lookup Ecto repo`. Fix: ensure all tests that spawn async work use `Ecto.Adapters.SQL.Sandbox.allow(Repo, self(), task_pid)` before the task accesses the DB. Individual test groups pass when run separately (31 groups verified, 0 failures each)."
