content: |
  MessageQueue GenServer calls Repo.get/2 in handle_call handlers for enqueue and requeue. When running in test with :manual sandbox mode, calls from a non-sandbox-owner process raise DBConnection.OwnershipError. Unhandled, this crashes the GenServer 3x → supervisor collapse → Repo lost → hundreds of test failures.
  
  Fix: Wrap all Repo calls in MessageQueue handle_call handlers with try/rescue for DBConnection.OwnershipError. Return {:reply, {:error, :ownership_error}, state} on catch. This prevents the crash cascade even when the GenServer is called from outside the sandbox owner process.
