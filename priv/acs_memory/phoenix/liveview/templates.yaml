content: |
  In Phoenix HEEx templates (~H"""..."""), the @ prefix only accesses socket assigns, not module attributes. If you define a module attribute like @provider_info and want to use it in a HEEx template, you must either:
  1. Pass the data as a socket assign (socket |> assign(:provider_info, @provider_info))
  2. Use a helper function that the template calls (which can access module attributes)
  
  Module attributes referenced in HEEx with @ will silently resolve to nil (since they look for an assign that doesn't exist), and the compiler will warn about the unused module attribute.
  
