content: |
  The SynthesisClusterBuilder replaces ClaimClusterer as the primary clustering entry point in CognitionProcessor.generate_for_org/2. It produces three cluster types: :topic (subject+predicate grouping), :company (grouped by company_id with company name as subject), and :cross_company (same predicate across 2+ companies). Each cluster includes cluster_type and entity_context fields alongside standard fields (subject, predicate, claims, sentiment, certainty, timestamps).
  
  After synthesis creation or strengthening, link_synthesis_to_entities/3 creates LayerRelationships (relationship_type: "references") from synthesis to companies and actors referenced in the cluster claims. This enables company-filtered synthesis queries via list_current_syntheses/2 with company_id option.
  
  The relationship type "references" was added to LayerRelationship's @relationship_types to support entity linking without being a derived_from/supports/contradicts relationship.
