content: |
  The `MemoryExtractor` in `lib/anantha_os/memory/pipeline/memory_extractor.ex` was using `"epistemic_state" => :proposed` when creating Claim records. However, the `Claim` schema's `Ecto.Enum` only accepts: `[:extracted, :low_confidence, :verified, :contradicted, :resolved, :expired, :superseded, :hallucinated]`. The value `:proposed` is valid only for **Synthesis** and **Hypothesis** schemas, not for Claim.
  
  This caused ALL Layer 2 (observation-derived) claims from the memory extractor to be silently dropped — the changeset validation failed, `Core.create_claim/2` returned `{:error, changeset}`, and `Enum.reject(&is_nil/1)` swallowed the errors.
  
  **Rule**: When creating Claims, always use `:extracted` as the initial `epistemic_state`. Reserve `:proposed` for Synthesis/Hypothesis records only.
  
  **Affected locations**: Lines 363 and 582 of `memory_extractor.ex`.
  
