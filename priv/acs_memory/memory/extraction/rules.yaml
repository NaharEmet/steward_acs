content: |
  RuleExtractor uses a YAML-first architecture for configurable extraction rules. Rules are defined in `priv/rules/memory_extraction_rules.yml` and loaded at runtime via `YamlElixir.read_from_file/1`. The file is re-read on every call, so agents can edit rules without restarting.
  
  Architecture: Rules → RuleLoader (compiles regex) → RuleExtractor (applies rules to content) → build record attrs → Pipeline creates Record.
  
  For each memory_type (cash_flow, inventory_movement), the highest-priority matching rule per target_field wins. If YAML rules produce no data, hardcoded heuristic fallback kicks in.
  
  Key patterns:
  - Each rule has: id, memory_type, target_field, patterns (regex list), capture_group, transform (decimal/integer), static_value (for keyword matches), priority
  - Single-quoted YAML strings preserve regex backslashes literally
  - `Regex.compile!(pattern, "i")` for case-insensitive matching
  - Decimal transform: `raw |> String.replace(\",\", \"\") |> Decimal.new()`
  - Integer transform: `String.to_integer(raw)`
  - Static value rules: when matched, use the static_value instead of captured group
  - Rules sorted by priority DESC; first match per target_field wins (like Enum.reduce)
  
