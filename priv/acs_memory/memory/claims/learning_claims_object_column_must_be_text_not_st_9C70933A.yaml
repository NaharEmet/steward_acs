content: "The `claims.object` column was defined as `:string` (= varchar(255)) in the schema, but ClaimExtractor.create_claims_batch/4 inserts email body text which can be thousands of characters. This causes a database error when inserting. Always use `:text` for columns that store variable-length content like email bodies, transcripts, or descriptions. Migration 20260622000001 changed this column to `:text`."
