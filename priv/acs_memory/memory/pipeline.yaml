content: |
  Created `Anantha.Memory.RuleExtractor` — a pure module with deterministic heuristic parsers for extracting structured Records from message content. Key design points:
  
  1. Two memory_type paths: cash_flow (amount, currency, direction, actor) and inventory_movement (item_name, quantity, direction, actor).
  2. Returns `{:ok, [record_attrs]}` or `{:ok, []}` — empty list means "no structured data found, use LLM fallback".
  3. All heuristic parsers are private functions (extract_amount, extract_item_and_quantity, extract_direction, extract_actor_name, extract_currency).
  4. Heuristics use regex patterns adapted from extraction_worker/sanitization.ex.
  5. Pure functions — no side effects, no DB calls.
  
  Usage in Pipeline.handle_claim: rules first, LLM fallback.
  
