content: |
  CognitionProcessor.generate_for_org/1 runs the claim clustering → LLM synthesis pipeline for a single organization. Clusters claims via ClaimClusterer.cluster_claims(org_id, min_cluster_size: 2), generates syntheses via SynthesisExtractor, and persists them with provenance tracking (synthesis_claims + layer relationships). Returns {:ok, count, superseded}. Safe no-op if org has no claims or no clusters.
  
  Used by:
  1. `generate_syntheses_from_clusters/1` (the full nightly cycle iterates all orgs via this)
  2. `org_create` in ToolController (fire-and-forget Task.start after org creation)
  3. `trigger_synthesis` tool endpoint (manual per-org or full cycle trigger)
  
  The `trigger_synthesis` ACS tool (level 2, category dev) calls POST /api/tools/trigger_synthesis with optional org_id. If org_id provided, runs generate_for_org. If omitted, triggers full nightly cycle (trigger_now).
