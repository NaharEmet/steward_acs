content: The `apply_linear_decay/0` function in CognitionProcessor applies an effective_score formula (`reinforcement_count * temporal_relevance + LN(1 + supporting_claim_count)`) to mark syntheses as stale. Newly created syntheses have `reinforcement_count = 0` and `supporting_claim_count = 0` by default, giving an effective_score of 0. Without a grace period, they'd be immediately marked stale. Always include `inserted_at < now - 7 days` condition in the stale-marking SQL to prevent this.
