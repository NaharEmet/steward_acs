content: "The IngestionSource schema has separate `config` and `secrets` fields. All code paths consuming IngestionSource structs MUST merge secrets into config before passing downstream. The CRM scheduler and ToolController already do this, but the Ingestion scheduler was missing this. Pattern: `Map.put(source.config || %{}, \"secrets\", source.secrets)`. When debugging \"API key not configured\" errors for HubSpot (or any secrets-backed source), always check the caller is merging secrets into config."
