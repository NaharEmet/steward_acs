content: "Application.get_env in hot paths should be cached at init/compile time. Decision tree: use Application.compile_env for truly static config, store in GenServer state for per-process config, pass as opts for caller-dependent config. Also removed 2 try/rescue blocks in storage.ex that were swallowing ExAws error tuples."
