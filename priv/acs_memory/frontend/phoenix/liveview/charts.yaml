content: |
  When removing `phx-update="ignore"` from a LiveView container with Chart.js charts, the JS hook's `updated()` callback must check whether each Chart.js canvas was replaced by LiveView DOM patching. The pattern is:
  
  ```javascript
  updated() {
    const canvas = this.el.querySelector('#my-chart')
    if (this.charts.myChart && canvas !== this.charts.myChart.canvas) {
      this.charts.myChart.destroy()
      delete this.charts.myChart
    }
    if (!this.charts.myChart) {
      this.initCharts() // or create chart directly
    }
    this.updateCharts()
  }
  ```
  
  This is necessary because without `phx-update="ignore"`, LiveView replaces DOM nodes, invalidating Canvas references that Chart.js holds internally. Without this guard, Chart.js crashes silently and charts remain blank.
  
