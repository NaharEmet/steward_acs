content: "Three bugs cause agents to not appear in present_status: (1) ETS cache not repopulated from DB on restart - need Cache.warmup() called from Application.start with a Process.sleep(100) delay to let Repo become available, guarded by Mix.env() != :test to avoid Ecto sandbox conflicts. (2) agent not registered on acs_sleep - register in AgentStatus with purpose \"sleeping\" before entering sleep mode. (3) agent not registered on first get_present_status call - after rotating name assignment, check if agent exists and register with purpose \"active\" if not."
