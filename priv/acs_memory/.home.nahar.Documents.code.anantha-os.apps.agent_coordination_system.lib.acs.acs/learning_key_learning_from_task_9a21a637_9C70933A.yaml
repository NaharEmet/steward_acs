content: "Two features added to ACS: (1) Auto-register agents on ANY tool call with agent_id at dispatch layer in call_tool/2 — new agents register via Cache.put_agent_status (ETS-only, lightweight), existing agents get touch_agent_status (ETS-only updated_at stamp). (2) Stale agent sweeper in Cache GenServer — runs every 30s via Process.send_after, removes agents inactive >60s from both ETS and DB using updated_at timestamp. Key design: touch_agent_status is ETS-only (no DB write per tool call), put_agent_status stamps updated_at automatically. Cache module needs alias Acs.Repo and import Ecto.Query for sweeper's from macro."
