content: "ACS active agents bug was caused by 3 interlocking issues: (1) no ETS warmup on restart, (2) no agent registration on sleep/first connect, (3) two diverging get_present_status implementations (ETS vs DB). Fix: Cache.warmup/0 loads DB into ETS on boot, auto-registration in tools.ex dispatch and core_handlers.ex, stale sweeper removes inactive agents every 30s. Key lesson: any state that survives restart must be warmable from DB, and agent identity should be established on first tool call not first task claim."
