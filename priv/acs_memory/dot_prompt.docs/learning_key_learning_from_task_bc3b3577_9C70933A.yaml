content: dot_prompt is a git submodule — docs changes are safe, code changes should go upstream. When running tests in the submodule, test artifacts (github_poller_meta.json) may be modified. Submodule commits need to be done inside lib/dot_prompt/, then parent repo sees new HEAD.
