content: |
  In Phoenix LiveView, the `phx-change` binding must be placed on a `<form>` element, not directly on an `<input>` or `<select>` element. Placing `phx-change` directly on an input element causes a browser console error: "Uncaught Error: form events require the input to be inside a form".
  
  Always wrap inputs/selects using `phx-change` in a `<form phx-change="...">` tag, even if there's no submit button. The `<select>` or `<input>` just needs a `name` attribute so the form data is correctly serialized.
  
