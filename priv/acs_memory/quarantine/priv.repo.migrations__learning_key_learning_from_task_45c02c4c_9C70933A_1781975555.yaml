content: "Phase 2 of adaptive synthesis grouping is implemented: (1) supporting_claim_count column added to syntheses migration, (2) DedupCache GenServer for two-tier content dedup caching, (3) SynthesisDedup module with pgvector cosine search + LLM fallback, (4) CognitionProcessor integration hooks embedding dedup into generate_and_persist_syntheses before creation, (5) DedupCache added to application supervision tree. Key gotchas: raw SQL with Postgrex requires binary UUID (16-byte) not string; Ecto from(s in \\"table_name\\") doesn't auto-apply binary_id type - use the Ecto schema instead; put_in/3 fails on nil intermediate keys in nested maps."
