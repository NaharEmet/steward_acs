content: "acs.ex: release_task/2 used Repo.get (no lock) inside a transaction, creating a check-then-act race. In PostgreSQL READ COMMITTED, concurrent transactions could see stale data and overwrite another agent's claim. Fix: use Repo.get!(AcsTask, task_id, lock: \\"FOR UPDATE\\"). Also added Ecto.NoResultsError rescue for idempotent nil return. Applies to SQLite dev where serialized writes mask the bug."
