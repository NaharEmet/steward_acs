content: In Phoenix LiveView HEEx templates, you cannot use double quotes (`"`) inside EEx interpolation (`<%= %>`) within double-quoted HTML attributes. The parser confuses them with attribute delimiters. Use the `class={"..."}` syntax with string interpolation (`#{}`) instead, or use single quotes/sigils inside the interpolation.
