content: "Fixed fetch_pipelines/2 in hub_spot.ex. Root cause: `with` block chained deals+tickets pipeline fetches — if tickets returned 403, deals pipelines were lost too. Fix: iterate over pipeline_object_types() with Enum.map, handle each fetch independently, merge successes. If both fail, return {:error, :all_pipeline_fetches_failed}. Added 4 Bypass-based tests covering: both succeed, one fails (403), both fail, missing API key. Also fixed pre-existing test bug: search_date_property for engagement types returns \\"hs_createdate\\" not \\"createdate\\"."
