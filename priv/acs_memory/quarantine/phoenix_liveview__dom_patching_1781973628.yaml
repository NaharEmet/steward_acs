content: "When `phx-update=\"ignore\"` is on the same element that carries a `data-*` attribute being updated by LiveView, the attribute update is silently dropped. The `phx-update=\"ignore\"` directive tells LiveView to skip DOM diffing for that element entirely — including attribute changes. Always nest: put `phx-update=\"ignore\"` on an inner wrapper that contains only elements that need ignore behavior, while the outer element (with dynamic attributes) gets normal LiveView patching."
