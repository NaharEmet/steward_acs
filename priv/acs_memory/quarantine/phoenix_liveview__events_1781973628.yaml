content: In Phoenix LiveView, `pushEvent` from JavaScript dispatches to `handle_event/3`, NOT `handle_info/2`. Using `handle_info` for server-side polling responses silently drops every event — the client never gets a reply and the socket assign never updates. Always use `handle_event` for JS-initiated events (via `pushEvent` or `handle` in hooks).
