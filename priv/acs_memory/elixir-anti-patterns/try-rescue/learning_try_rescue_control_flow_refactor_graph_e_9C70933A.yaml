content: |
  ## Pattern: try/rescue → case/with for expected errors
  
  ### Files changed:
  - `lib/anantha_os/engine/graph_executor.ex`: 12→8 try blocks (remaining 8 are GenServer callbacks)
  - `lib/anantha_os/engine/graph_executor/node_execution.ex`: 4→0 try blocks
  - `lib/anantha_os/engine/graph_executor/state_manager.ex`: 3→0 try blocks
  - `lib/anantha_os/crm.ex`: 6→0 try blocks
  - `lib/anantha_os/memory/cognition_processor.ex`: 4→0 try blocks
  
  ### Key technique: function-level rescue for GenServer safety
  
  When a GenServer callback (handle_call/handle_info) calls internal functions that might raise, wrap the internal call in a private function with rescue, not the callback itself:
  
  ```elixir
  # Good — function-level rescue, callback stays clean
  def handle_call(:work, _from, state) do
    {:reply, safe_do_work(), state}
  end
  
  defp safe_do_work do
    do_work()
  rescue
    e -> {:error, e}
  end
  ```
  
  ### Verification: 64 tests pass, 0 failures
