content: |
  ## Pattern: Cache Application.get_env at boundary
  
  ### Decision tree:
  1. **Static config**: `@attr Application.compile_env(:app, :key, :default)`
     - Used in: orchestrator.ex, message_queue.ex, server.ex (ACS)
  2. **Per-process config**: read in init/1, store in state
     - Used in: scheduler.ex (audio_processing_enabled)
  3. **Config via opts**: caller passes config as function parameter with fallback
     - Used in: storage.ex
  
  ### Files changed: 5 files, 2308 tests pass
