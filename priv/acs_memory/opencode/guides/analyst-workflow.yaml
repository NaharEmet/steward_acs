content: The analyst workflow guide at `.opencode/guides/analyst-workflow.md` is the primary reference for the 9 analyst MCP tools (ant_search_memory, ant_get_synthesis, ant_get_claim, ant_get_observation, ant_get_source_excerpt, ant_get_entity, ant_execute_query, ant_export_dataset, ant_drilldown). All are level 2, category `analyst`, use POST method, and require org_id. The guide covers tool reference tables, four analysis workflows (search-first, query-based, entity-centric, provenance traversal), full dataset schemas for syntheses/claims/observations/ontology_nodes, three worked examples, anti-patterns, and related guide links.
