content: |
  Opencode.json uses glob pattern `"curl http://localhost:*": "allow"` for bash permissions. This only matches when `curl` is immediately followed by the URL. Commands like `curl -s http://localhost:4000/api/...` with flags between curl and URL are rejected.
  
  The glob `*` in opencode.json bash patterns matches shell globs, not regex. A pattern like `"curl *http://localhost:*": "allow"` would allow flags between curl and the URL.
  
  File: `.opencode/opencode.json`, analyst agent section.
