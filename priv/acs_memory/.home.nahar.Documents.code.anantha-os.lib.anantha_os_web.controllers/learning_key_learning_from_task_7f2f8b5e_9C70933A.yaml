content: "Three bugs were fixed in tool_controller.ex: (1) list_memory_records was calling list_claims(org_id) without the limit option, loading all claims into memory and causing DB timeouts — now passes limit: limit as opts. (2) crm_list_sources, list_contacts, and list_memory_records were returning Ecto schema structs directly through json(), which crashes because schemas don't implement Jason.Encoder — fixed by converting to maps with explicit field selection before serialization, plus added sanitize_config/1 to strip sensitive fields. (3) crm_get_scheduler_status was pattern matching on {:ok, status} but Anantha.CRM.Scheduler.status() returns the map directly (not wrapped in :ok tuple) — confirmed by checking scheduler.ex handle_call(:get_status) which returns %{...} directly."
