content: |
  Several modules call `to_atom(key)` without a `String.` prefix or without having a `defp to_atom/1` defined locally. This causes a compilation error.
  
  Files affected:
  - `lib/anantha_os/engine/tools/argument_normalizer.ex` line 40 - needed `String.to_existing_atom(key)` 
  - `lib/anantha_os/query/query_engine.ex` line 350 - needed `String.to_atom(field)`
  
  The `to_atom` function should be called as `String.to_atom/1` or `String.to_existing_atom/1` in these locations. Some modules (like query_engine.ex and evaluator.ex) define their own private `defp to_atom/1` helper, which works fine.
  
