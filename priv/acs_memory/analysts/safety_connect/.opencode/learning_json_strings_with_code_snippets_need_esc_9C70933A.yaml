content: "When embedding code/backtick examples in JSON string values (opencode.json prompts), any double quotes inside the string must be escaped as `\\"`. Even though the double quotes are inside backticks (markdown code syntax), JSON doesn't understand markdown — it still requires proper escaping. Example: `mode: \\"count\\"` instead of `mode: \"count\"`."
