content: Developer identity for memory creation flows from ACS_DEVELOPER_NAME env var -> config -> Acs.Cluster.developer_name/0 -> memory_handlers created_by map. Cluster attribution added alongside developer name. The created_by field now uses type "developer" instead of "agent" and includes cluster name. list_memories and search_memories expose created_by by decoding created_by_json field from schema. The decode_created_by helper handles nil, binary JSON, and unexpected types safely.
