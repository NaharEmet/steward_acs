content: |
  The `write_tool` MCP tool allows agents to dynamically register new tools by writing YAML definition files to the acstools/ directory and hot-reloading via ToolRegistry.refresh/0. Key implementation details:
  
  - New tool definitions are written as `<name>.yaml` files in the first writable tools path (MCP_TOOLS_PATH env → configured tools_paths → default `_build/acs/acstools/`)
  - The YAML encoder produces block-style YAML with correct indentation for nested maps and lists, matching the format expected by ToolLoader
  - Endpoint URLs are parsed with URI.parse to extract base_url + endpoint_path for Bridge dispatch
  - The tool supports both handler-based (Elixir module) and endpoint-based (HTTP URL) tools
  - After writing, ToolRegistry.refresh/0 is called to hot-reload without BEAM recompile
  - Validation requires: name, description, inputSchema, and at least one of handler or endpoint
  - The generated YAML only includes fields relevant to the handler type (no empty endpoint/method for handler-based tools) to pass ToolLoader validation
  - Path: apps/agent_coordination_system/lib/acs/mcp/tools/dynamic_tools.ex
