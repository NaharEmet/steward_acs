content: |
  CRM tool handlers in ACS app must route calls via HTTP to Anantha API (localhost:4000/api/tools/...) instead of calling Anantha.CRM.* functions directly. The ACS app and Anantha app run in separate BEAM VMs (different Mix apps), so direct function calls fail.
  
  Pattern:
  1. ACS handler (`CRMHandlers`) strips "crm_" prefix, then uses `Req` to POST to `/api/tools/crm_*` with Bearer auth from config
  2. Anantha router (`router.ex`) maps `/api/tools/crm_*` routes to `ToolController` actions
  3. ToolController actions call the actual `Anantha.CRM.*` functions
  
  Same pattern as OrgSetupHandlers.
