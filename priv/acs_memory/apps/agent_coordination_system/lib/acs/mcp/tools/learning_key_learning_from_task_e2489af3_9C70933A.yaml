content: "File.exists?/1 is not the right predicate for PATH resolution before spawn_executable. Use File.executable?/1 instead. Non-executable asdf shims (664 permissions) in PATH cause :eacces crashes on Port.open({:spawn_executable, path}). ToolRegistry crashing cascades to timeouts on all MCP tools until auto-restart."
