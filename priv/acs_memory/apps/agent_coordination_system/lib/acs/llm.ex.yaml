content: "LLM providers in Acs.LLM are controlled via whitelist through the `:enabled_llm_providers` app env config. This takes a list of provider ID strings (e.g., `[\"mimo\"]`). The `provider_enabled?/1` helper checks this list — if the list is empty, all providers with configured API keys are enabled. If non-empty, only listed providers are tried. Both `evaluate_with_providers/2` and `providers_configured?/0` respect the enabled list. The config is set from `ENABLED_LLM_PROVIDERS` env var (comma-separated) in runtime.exs. This is a whitelist approach — new providers aren't tried by surprise; user must explicitly opt in."
