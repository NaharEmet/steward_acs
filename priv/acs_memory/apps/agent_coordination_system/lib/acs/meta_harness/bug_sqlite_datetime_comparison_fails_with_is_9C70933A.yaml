content: |
  SQLite's `datetime()` function returns space-separated format (`"2026-06-23 12:00:00"`). When comparing with ISO8601 strings (`"2026-06-23T12:00:00.000Z"`), TEXT comparison fails at position 10 because 'T' (84) > ' ' (32). This caused MetaHarness Analyzer to return zero data.
  
  **Fix**: Two-pronged approach:
  1. **Analyzer**: Wrap `created_at` column refs in `datetime()` — e.g., `WHERE datetime(created_at) >= datetime('...')` — so SQLite normalizes both sides before comparing.
  2. **OperationLogger**: Store timestamps in space-separated SQLite-native format using `Calendar.strftime("%Y-%m-%d %H:%M:%S")` instead of `DateTime.to_iso8601/1`.
  
  **Scope**: `apps/agent_coordination_system/lib/acs/meta_harness/`
