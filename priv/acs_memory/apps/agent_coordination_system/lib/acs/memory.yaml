content: "Elixir `System.cmd/3` signature is `System.cmd(command, args_list, opts)`. The second argument must be a list of strings, not separate string arguments. Writing `System.cmd(\"pgrep\", \"-f\", \"ollama serve\", opts)` creates a call to the nonexistent `/4` arity. Correct: `System.cmd(\"pgrep\", [\"-f\", \"ollama serve\"], opts)`."
