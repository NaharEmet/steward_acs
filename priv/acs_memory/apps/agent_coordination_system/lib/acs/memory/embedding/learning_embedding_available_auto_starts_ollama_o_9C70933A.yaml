content: "`Acs.Memory.Embedding.available?/0` now auto-starts Ollama via `System.cmd(\"ollama\", [\"serve\"])` when it detects Ollama is not running. Uses `:persistent_term` to track the attempt so it only tries once per session. After starting, sleeps 3s and retries the health check. Returns false if still down after retry. The `ollama serve` is run in a fire-and-forget `Task.start` to avoid blocking the caller."
