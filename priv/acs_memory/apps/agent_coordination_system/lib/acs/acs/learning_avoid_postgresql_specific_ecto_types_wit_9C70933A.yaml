content: |
  ## Problem
  Using `:boolean` and `{:array, :string}` Ecto field types with the `ecto_sqlite3` adapter causes `Exqlite.Error datatype mismatch` (`SQLITE_MISMATCH`) on INSERT. The `:boolean` type creates an `INTEGER` column but the dumper binding can cause edge-case failures. The `{:array, :string}` type uses JSON encoding which works in loading but can cause issues.
  
  ## Fix
  Replace PostgreSQL-specific Ecto types with SQLite-compatible alternatives:
  - `:boolean` → `:integer` (store 1/0)
  - `{:array, :string}` → `:string` (JSON-encode in the handler before passing to changeset)
  
  No migration needed because ecto_sqlite3 already maps `:boolean` → `"INTEGER"` and `{:array, :string}` → `"TEXT"` in the SQL schema. The existing database columns are already the correct type.
  
  Convert values at the parsing boundary (in the handler function) before building the Ecto changeset:
  - `true`/`false` → `1`/`0` using `if(val, do: 1, else: 0)`
  - Arrays → JSON string using `Jason.encode!/1`
  
