content: "LLM providers in Acs.LLM can be disabled via config without removing their API key. The `:disabled_llm_providers` app env config takes a list of provider ID strings (e.g., `[\"minimax\"]`). The `provider_enabled?/1` helper checks this list. Both `evaluate_with_providers/2` and `providers_configured?/0` respect the disabled list — if a provider is disabled, it's treated as if it's not configured. The config is set from `DISABLED_LLM_PROVIDERS` env var (comma-separated) in runtime.exs."
