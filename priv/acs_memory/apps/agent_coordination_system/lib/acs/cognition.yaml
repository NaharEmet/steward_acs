content: When validating lists of strings in cognition specs (invariants, workflows, failure_modes), YAML round-trip corruption can insert non-string values. Always check `is_binary(item)` before calling `String.length/1` to avoid FunctionClauseError crashes. For helper functions that call String.length, add a `when is_binary` guard clause and a catch-all clause returning false.
