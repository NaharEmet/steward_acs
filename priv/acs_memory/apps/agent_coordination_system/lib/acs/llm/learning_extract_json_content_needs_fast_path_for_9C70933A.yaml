content: |
  The `extract_json_content/1` function in Acs.LLM had a complex multi-layer fallback that re-processed content through `extract_balanced_json()` and `extract_any_json()` even when the input was already valid JSON. This caused double-closing-braces corruption (`}}` at end) because `find_balanced/4` returned `""` on end-of-input instead of accumulated content.
  
  **Fix:**
  1. Added fast-path: try `Jason.decode(cleaned)` first — returns cleaned content immediately if valid JSON
  2. Simplified fallback chain: markdown blocks → balanced extraction → regex (no redundant passes)
  3. Fixed `find_balanced/4` base case to return `acc` instead of `""` — preserves accumulated content even on unbalanced input
  4. Added raw content debug logging in `try_extract_json/1` failure path for future debugging
