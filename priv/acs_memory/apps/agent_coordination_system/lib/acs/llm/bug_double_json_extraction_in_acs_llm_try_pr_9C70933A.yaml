content: |
  Bug: `try_providers/4` in `Acs.LLM` calls `try_extract_json(response)` on an already-decoded map. `call_provider/3` (via `extract_json_from_message/1`) already parses the JSON and returns `{:ok, decoded_map}`. The second extraction passes a non-string map to `extract_json_content/1`, which hits the catch-all clause returning `""`, causing extraction to fail as `:error`.
  
  Fix: Remove `try_extract_json` wrapper in `try_providers/4`. Use the decoded map directly from `call_provider`'s `{:ok, response}` as the evaluation result.
