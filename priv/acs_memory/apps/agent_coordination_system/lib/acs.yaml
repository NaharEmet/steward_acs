content: "The `acs_dev_` prefix for developer API keys was hardcoded in two places: `Acs.Developers.generate_raw_key/0` and `Acs.MCP.Plugs.Strategies.Developer.authenticate/2`. Extracted to a `@key_prefix` module attribute in both modules to ensure single source of truth and prevent drift if the prefix changes."
