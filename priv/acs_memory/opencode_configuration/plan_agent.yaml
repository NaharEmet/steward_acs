content: The `plan` agent in `.opencode/opencode.json` has been configured with a prompt that instructs it to write implementation plans to the `plans/` directory using `plans/<topic>_plan.md` naming convention. The plan agent cannot write files directly — it delegates file writing to `scribe` via the `task` tool. The plan-protocol and plan-review skills were updated to reference `plans/` instead of `PLAN.md`.
