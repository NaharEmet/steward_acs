content: HubSpot search API fails with 400 for emails/tasks (missing searchable property) and 5xx for transient errors. The fix adds retry with exponential backoff for all non-429 errors (max 3 retries) and falls back to the list API when search API fails after retries. This prevents CRM sync from crashing on emails/tasks sync.
