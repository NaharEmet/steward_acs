content: "HubSpot API v3 has different page size limits: GET list API caps at 100, POST search API allows up to 200. Need separate constants. Search API uses offset-based pagination (integer `after`), not cursor-based, so pages CAN be parallelized if needed. Keep `@page_size 100` for list API, add `@search_page_size 200` for search API."
