content: "HubSpot rate limiting fix: added exponential backoff (500ms base, 10s cap) using process dictionary to track consecutive rate limit hits per org_id. Also added 300ms pacing delay between page fetches to smooth request rate. The 429 handlers now use max(Retry-After, exponential backoff). Counter resets on success."
