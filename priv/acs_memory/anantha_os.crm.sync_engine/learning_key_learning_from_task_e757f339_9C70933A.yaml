content: "HubSpot CRM: (1) Association query param `?associations=contacts,companies,deals` works for ALL CRM object types including emails/calls/meetings/notes/tasks — not just deals. (2) extract_associations/2 needs 3 case blocks (contacts, companies, deals) each pattern-matching on associations.<type>.results. (3) join_config.ex @engagement_joins maps cleanly with same 3 join defs reused across 5 engagement types. (4) S3 storage for large text follows existing store_audio/store_transcript pattern — store_large_text/4 with guard clause, key prefix `content/{org_id}/`. (5) Email body S3 URL substitution must happen AFTER envelope creation in process_crm_records_batch so claim extractor reads `hs_email_text` naturally after URL replacement. (6) hubspot_fields.yaml for engagement types needs `communication` claim_type with metadata fields and suppressed operational fields."
