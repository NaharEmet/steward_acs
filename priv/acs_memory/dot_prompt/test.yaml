content: |
  The DotPrompt OTP application is registered as `:dot_prompt` in `lib/dot_prompt/mix.exs`:
  ```elixir
  def project do
    [app: :dot_prompt, ...]
  end
  ```
  
  All configuration is done under `:dot_prompt`:
  ```elixir
  config :dot_prompt, prompts_dir: Path.expand("../prompts", __DIR__)
  ```
  
  The `prompts_dir/0` function reads from `Application.get_env(:dot_prompt, :prompts_dir)`.
  
  Some test files incorrectly used `:dot_prompt` which caused prompts_dir overrides to be silently ignored, leading to all prompt_not_found errors in the dot_prompt test suite.
  
