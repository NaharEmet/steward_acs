content: |
  When creating local DotPrompt fixture files for tests, all `@var` references in the body text must be declared in the `params:` section of the `init` block. Even runtime-only variables (passed to `render/4`'s third argument) must be declared — use `@var_name: str` format which defaults to `:runtime` lifecycle, allowing the compiler to pass validation while leaving the variable untouched for the injector step.
  
  Key points:
  - `str` params default to `:runtime` lifecycle — they don't require a value at compile time
  - Runtime params are left as `@var_name` in the compiled output and replaced by `Injector.inject/2` later
  - The Lexer's `{{...}}` syntax creates dynamic fragment tokens that require compile-time resolution — use `@var` syntax instead for runtime values
  - Fragment references use single braces `{name}` where `name` matches `[\w\-\.\/]+` (no wildcards, dots, slashes, and word chars only)
  - The `_index.prompt` `fragments:` block keys and body references must use names that pass the Lexer's fragment_static regex: `~r/^\{[\w\-\.\/]+\}$/`
  
