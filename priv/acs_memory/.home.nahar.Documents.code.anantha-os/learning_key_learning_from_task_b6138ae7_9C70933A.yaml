content: "Critical rule \"ALWAYS save learnings BEFORE calling acs_release_work\" caused agents to miss release. It was an ordering constraint disguised as a mandate. Fix: split into two standalone rules — one for release mandate, one for ordering. Any mandatory completion step needs its OWN critical rule, not a compound instruction. Also moved release to top of Important Rules and added ⚠️ MANDATORY tag in Quick Reference."
