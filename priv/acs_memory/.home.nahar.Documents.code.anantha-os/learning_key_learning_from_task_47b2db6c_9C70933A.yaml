content: "Ollama docker-compose service uses `sh -c \"ollama serve & sleep 2 && ollama pull nomic-embed-text && wait\"` pattern to pre-load model on startup. Healthcheck uses `ollama list`. acs depends_on ollama with condition: service_healthy for startup ordering. OLLAMA_URL env in acs should point to http://ollama:11434 (docker DNS, not localhost)."
