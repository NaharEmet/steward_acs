content: When converting file paths to cognition spec paths, the function must strip both the `lib/` prefix AND the app name segment. For example, `lib/anantha_os/awds/task.ex` should produce `awds/task`, not `anantha_os/awds/task` or just `task`. The previous implementation used `Path.relative_to/2` which only removed the prefix matching the scanned directory (`dir` parameter), but when `dir` is an app subdirectory like `lib/anantha_os/awds`, the relative path becomes just `task` (no prefix). The fix splits on `lib/`, then drops the first segment (the app name).
