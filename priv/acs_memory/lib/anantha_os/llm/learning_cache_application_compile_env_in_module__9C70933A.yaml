content: |
  In Anantha.LLM.RateLimiter, `Application.get_env(:anantha_os, :llm, [])` was called on every `start_rate_limiter/0` invocation, which ran on every `check_rate_limit/1` call. Since the Agent is only started once (subsequent calls hit `{:already_started}`), the `Application.get_env` was wasted work on every rate limit check.
  
  Fix: moved the config read to module attributes (`@llm_config`) using `Application.compile_env/3`, which caches at compile time. Also changed `Application.get_env` → `Application.compile_env` per Elixir best practices.
  
  See `lib/anantha_os/llm/rate_limiter.ex` for the pattern.
