content: |
  SynthesisDedup's `call_llm_equivalence_check` uses a 2-second timeout for LLM calls. This is intentional because:
  - The dedup path is latency-tolerant — if LLM fails, we degrade to `:different` (no match)
  - Without a short timeout, circuit breaker retries (3× with exponential backoff) can hang for 60+ seconds
  - A 2s timeout ensures fast fallback in both test and production when LLM is unavailable
