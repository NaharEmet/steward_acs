content: "DedupCache's `compute_key/2` uses length-prefixed encoding (`#{byte_size(a)}|#{a}|#{byte_size(b)}|#{b}`) before SHA-256 hashing. This prevents collision attacks where \"ab\"+\"cd\" and \"abc\"+\"d\" would produce the same hash with simple concatenation. The positive cache now also uses TTL (7 days) to prevent unbounded growth, matching the negative cache pattern (24h TTL)."
