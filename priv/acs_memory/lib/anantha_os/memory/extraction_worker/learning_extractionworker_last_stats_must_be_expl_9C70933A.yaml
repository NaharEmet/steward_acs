content: "`ExtractionWorker` GenServer state's `last_stats` field is only updated by the synchronous `handle_call(:trigger)` path. The async path (`process_org_async`) calls `GenServer.cast` to mark completion but was not passing the processed/failed/skipped counts. The handler must accept and accumulate these stats into `state.last_stats` so that `status()` returns accurate data after async processing."
