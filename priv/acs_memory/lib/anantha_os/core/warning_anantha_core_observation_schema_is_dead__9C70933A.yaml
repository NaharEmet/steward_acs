content: |
  Migration `20260609000004` migrated observations to claims and dropped the `observations` table.
  
  The `Anantha.Core.Observation` Ecto schema (`lib/anantha_os/core/observation.ex`) was deleted — it is dead code that referenced the dropped `observations` table.
  
  **Do NOT recreate this module** — observations were migrated to the `claims` table. All observation data now lives in `Anantha.Core.Claim`.
  
  **Affected priv scripts** (not compiled, but will fail if run):
  - `priv/repo/seed_memory.exs` — queries `Anantha.Core.Observation`
  - `priv/repo/trigger_extraction.exs` — queries `Anantha.Core.Observation`
  - `priv/analyze_pipeline.exs` — aliases `Anantha.Core.Observation`
  
  These need updating if someone runs them manually.
  
