content: |
  The IngestionSource schema has two separate fields: `config` (plaintext, non-sensitive) and `secrets` (encrypted via Cloak). When the Ingestion.Scheduler polls adapters, it was passing only `source.config` to `adapter.poll()`, dropping `source.secrets`. This caused the HubSpot SyncEngine to crash with "HubSpot API key not configured" because the API key was stored in secrets.
  
  The CRM scheduler (`crm/scheduler.ex`) already had the correct pattern: merge secrets into config before calling sync. The same pattern must be applied in the Ingestion scheduler.
  
  **Fix pattern** (mirror `crm/scheduler.ex` L216-224):
  ```elixir
  config = source.config || %{}
  config =
    if source.secrets do
      Map.put(config, "secrets", source.secrets)
    else
      config
    end
  adapter.poll(source.org_id, config)
  ```
  
  **Affected files**: `lib/anantha_os/ingestion/scheduler.ex`
  **Check list**: All code paths that consume `IngestionSource` must merge secrets into config. CRM scheduler ✅ (was already correct), ToolController ✅ (was already correct), Ingestion scheduler ❌ (was buggy, now fixed).
