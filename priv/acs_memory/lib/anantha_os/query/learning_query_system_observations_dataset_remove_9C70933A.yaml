content: |
  The `Anantha.Core.Observation` module was deleted (table dropped). Its dataset entry, description, and default columns were removed from DatasetRegistry and QueryEngine. Querying "observations" now returns clean "Unknown dataset" error instead of crash.
  
  `apply_field_conditions/3` had infinite recursion bug: `to_atom` returns string (not atom) for unknown fields, causing `is_binary` guard to match the same clause. Fixed by checking `is_binary(field_atom)` after conversion and skipping with warning.
  
  Count mode response in QueryController was missing `query_id`. All other modes include it. Fixed by `Map.put(result, :query_id, query_id)`.
  
  `describe/1` leaked `schema_module` and `preload_paths` internal fields. Removed from response map. Prefixed `preload_paths` with underscore in destructure to avoid unused variable warning.
