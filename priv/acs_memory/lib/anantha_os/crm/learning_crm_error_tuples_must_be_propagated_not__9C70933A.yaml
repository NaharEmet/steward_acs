content: |
  CRM claim extraction had 3 layers of error swallowing:
  1. `safe_batch_extract_and_store` returned `{[claims: inspect(e)], :error}` — caller destructured as `{claim_errors, _}` discarding `:error` status
  2. `batch_extract_and_store` always returned `{:ok, all_stored}` — per-group errors buried in result
  3. Sync engine only matched `{:ok, result}` — any non-ok tuple caused `CaseClauseError`
  
  Fix: Use `case` pattern matching to propagate `{:error, reason}` tuples consistently through all layers. Never use `_` to discard error status when the tuple carries meaningful failure information.
