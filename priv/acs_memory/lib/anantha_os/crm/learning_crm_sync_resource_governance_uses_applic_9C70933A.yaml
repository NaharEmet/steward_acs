content: |
  CRM sync now uses a two-layer resource governance system:
  
  1. **Configurable limits** via `Application.get_env(:anantha_os, :crm)` with defaults in `config/config.exs` and env var overrides in `config/runtime.exs` (ANANTHA_CRM_* env vars).
  
  2. **Memory Resource Governor** (`Anantha.ResourceGovernor`) checks Erlang VM memory before sync operations proceed. Thresholds: <70% normal, 70-85% reduce batches, 85-95% backoff, >95% refuse work.
  
  Key patterns:
  - Use `Application.compile_env` for module attributes (compile-time)
  - Use `Application.get_env` inside functions (runtime)
  - Governor is stateless library module, not a GenServer
  - All defaults match existing hardcoded values exactly
  - `merge_crm_config/1` helper in `Anantha.CRM` merges app config into per-sync config map
