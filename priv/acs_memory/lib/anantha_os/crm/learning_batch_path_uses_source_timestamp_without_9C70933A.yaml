content: In ClaimExtractor.store_claims_batch/create_claims_batch, the batch path now queries which (subject, predicate) pairs have active claims before inserting. For first-time claims (no active claim exists), valid_from is set from the claim_spec's source_timestamp (preserving full microsecond precision via DateTime.to_iso8601/1 without truncation). For updates (active claim exists), valid_from is set to now_iso. This ensures initial claim timestamps reflect the actual source data creation time rather than the ingestion time.
