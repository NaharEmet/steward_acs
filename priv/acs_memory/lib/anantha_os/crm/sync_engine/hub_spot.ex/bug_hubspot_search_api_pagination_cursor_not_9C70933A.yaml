content: |
  fetch_page/4 in HubSpot sync engine dispatched to search API only when cursor was nil (`if since && is_nil(cursor) do`). After first search API call returned `next_cursor`, subsequent calls fell through to list API which received an incompatible search API offset cursor.
  
  Fix: Dispatch to search API whenever `:since` is present in config (`if since do`). Pass cursor to `fetch_page_search_api` as `after` parameter in the request body (converted to integer). Search API pagination uses `after` as integer offset (0-based).
  
