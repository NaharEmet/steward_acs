content: |
  CRM SyncEngine now limits first-ever sync to last 5 months of data. Pattern:
  
  1. SyncEngine checks if cursor is nil AND synced_at is nil (first sync)
  2. If so, it adds `:since` (unix ms timestamp, 5 months ago) to config
  3. HubSpot provider checks for `:since` in fetch_page/4 - dispatches to search API (POST) with lastmodifieddate GTE filter
  4. After search API sync completes, cursor=nil is stored (same as before via atom key) but synced_at is set, preventing re-application of date filter
  5. `first_sync_complete: true` metadata flag is stored for future cycles
  
  HubSpot Search API: POST /crm/v3/objects/{type}/search with filterGroups containing lastmodifieddate GTE filter. Response format same as list API (results + paging).
