content: "LLMJudge had `@default_provider \"sarvam\"` but Sarvam API key isn't configured in any environment. The app-wide default in `Client` is `\"nim\"`. Changed LLMJudge default to `\"nim\"` and added a `providers_available?/0` guard that checks the resolved provider has an API key before calling `Client.chat_completion`. This prevents the `{:error, :missing_api_key}` crash and returns `{:error, :no_provider_configured}` with a clear log message instead."
