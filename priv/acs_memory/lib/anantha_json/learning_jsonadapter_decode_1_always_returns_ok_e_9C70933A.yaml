content: |
  `JsonAdapter.decode/1` has a consistent return contract:
  
  - `{:ok, decoded}` — valid JSON decoded (possibly repaired by JsonRemedy)
  - `{:error, reason}` — invalid JSON (both repair and Jason.decode failed)
  - `{:error, :invalid_input}` — non-binary input (nil, int, map, etc.)
  
  Three-layer exposure in ACS `llm.ex`'s `try_extract_json/1`:
  1. `JsonExtractor.extract/1` — extracts JSON string from LLM response (markdown blocks, brace matching, etc.)
  2. `escape_newlines_in_strings/1` — ACS-specific sanitization
  3. `JsonAdapter.decode/1` — tries JsonRemedy repair, falls back to Jason.decode
  
  `decode!/1` raises `RuntimeError` with `"JsonAdapter failed: #{inspect(reason)}"` on failure.
  
  The guard `when is_binary(json_string)` with a catch-all `def decode(_)` means ALL input types are handled — never a `FunctionClauseError`.
