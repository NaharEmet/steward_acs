content: |
  `JsonRemedy.repair/1` returns `{:ok, decoded_map, repairs}` or `{:ok, decoded_map}`, where `decoded_map` is an **already-decoded Elixir term** (map, list, etc.), NOT a JSON binary string.
  
  This means:
  1. Do NOT call `Jason.decode(result)` on the return value — it's already decoded
  2. The old `JsonAdapter.decode/1` `with` block was fundamentally broken: it took the result of `JsonRemedy.repair`, wrapped it in `{:repair, ...}` for tagging, then tried `Jason.decode` on the already-decoded map — which always crashed with `WithClauseError`
  3. The correct pattern is:
     - `try_json_remedy` returns `{:ok, decoded_map}` → return `{:ok, decoded_map}` directly
     - `try_json_remedy` returns `:fallback` (JsonRemedy unavailable) → use `Jason.decode`
     - `try_json_remedy` returns `{:error, reason}` → use `Jason.decode`
  
  Fix verified in `JsonAdapter.decode/1` using `case try_json_remedy(json_string)` instead of the broken `with` block.
