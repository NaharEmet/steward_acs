content: |
  When `org_setup_discover_pipelines` returns a warning about multiple deal pipelines (or multiple ticket pipelines), do NOT immediately ask the user which to include. First, check which pipelines actually have active deals/tickets by querying the synced data or the CRM API.
  
  For HubSpot: fetch deal counts per pipeline using the search API with a pipeline filter. Only present pipelines that have active records to the user. This avoids overwhelming them with empty or discontinued pipelines.
  
  If no deals have been synced yet (0 records), you can either:
  1. Run a quick HubSpot API call to count deals per pipeline (GET /crm/v3/objects/deals with pipeline property grouping)
  2. Default to "all pipelines" and let the user trim later
  
  Only ask the user about pipeline selection when there are genuinely multiple active pipelines with data.
