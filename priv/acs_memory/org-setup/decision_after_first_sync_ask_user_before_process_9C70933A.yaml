content: |
  After initial CRM sync completes, ALWAYS ask the user before triggering LLM-based extraction on historical data. Do not auto-process.
  
  Question to ask: "Historical data synced: [X contacts, Y deals, Z emails, etc]. Process via LLM extraction? This costs ~N LLM calls (~$cost). Or skip and only process new data going forward?"
  
  Options:
  - Yes → trigger `acs_ant_trigger_extraction(org_id: "...")`
  - No → proceed without LLM processing. New data will be processed incrementally.
  
  This applies to ALL non-contact object types (emails, calls, meetings, notes, tasks) that need LLM extraction for semantic content analysis. 
  
  Rule-based extraction (FieldClassifier) always runs — no user choice needed for that. It's free and extracts structured fields.
