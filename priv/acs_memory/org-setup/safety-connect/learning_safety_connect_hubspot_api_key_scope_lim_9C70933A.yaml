content: |
  # HubSpot API Key Scope Limitations for Safety Connect
  
  The API key `REDACTED` has:
  
  ## Working Scopes
  - crm.objects.contacts.read ✅
  - crm.objects.companies.read ✅
  - crm.objects.deals.read ✅
  - crm.objects.notes.read ✅
  - crm.objects.calls.read ✅
  - crm.objects.emails.read ✅
  - crm.objects.meetings.read ✅
  - crm.objects.tasks.read ✅
  - crm.objects.quotes.read ✅
  - crm.pipelines.orders.read (user confirmed given)
  
  ## Missing Scopes (Pipeline discovery failed 403)
  - crm.schemas.pipelines.read — needed for pipeline discovery API
  - crm.objects.tickets.read — forbidden (user chose to skip)
  - crm.objects.line_items.read — forbidden (user chose to skip)
  
  ## Key Learning
  Pipeline discovery calls `/crm/v3/pipelines/{object_type}` endpoints which require `crm.schemas.pipelines.read` scope, NOT the per-object scopes. Even with deals/tickets read scopes, if `crm.schemas.pipelines.read` is missing, pipeline discovery will 403.
