content: |
  After pipeline discovery stores pipeline schemas in the DB, all subsequent CRM syncs automatically:
  1. Fetch deals and tickets with their pipeline context (pipeline_id, pipeline_label, stage labels)
  2. Generate pipeline-qualified entity IDs (e.g., hubspot:deals:sales_pipeline:12345 instead of hubspot:deals:12345)
  3. Attach pipeline provenance metadata to every claim (pipeline_id, pipeline_label, dealstage in metadata)
  4. Track pipeline as a state field so pipeline moves generate transformation events
  
  This enables pipeline-filtered analytics queries. No additional configuration is needed — pipeline awareness is built into the CRM ingestion pipeline end-to-end after `discover_pipelines` is called during setup.
