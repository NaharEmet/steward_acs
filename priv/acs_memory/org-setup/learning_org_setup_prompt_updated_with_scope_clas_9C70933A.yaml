content: |
  Updated `.opencode/agents/org-setup.md` Phase 3 (Scope Probe) to classify HubSpot object types as **required** vs **optional**:
  
  - **Required** (contacts, companies, deals) — if missing, ABORT with message to user about updating HubSpot private app token scopes
  - **Optional** (notes, calls, emails, meetings, tasks, quotes, tickets, line_items) — if missing, ASK user: "add scopes or skip?"
  - Updated Critical Rules (rule #3 added), Output Format (shows classification), and Core Responsibilities description
  - Required scopes must be present for CRM sync to proceed; optional scopes can be skipped with user consent
