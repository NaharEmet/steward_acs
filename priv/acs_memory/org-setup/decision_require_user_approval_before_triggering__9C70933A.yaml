content: After initial CRM sync completes, do NOT automatically trigger synthesis (acs_ant_trigger_synthesis). Wait for explicit user confirmation. Add a summary line "Synthesis ready — user must approve before triggering" to the setup output. The user must review sync results before committing to synthesis processing.
