content: |
  HubSpot private app tokens (pat-* keys) cannot access the `crm/v3/pipelines` API. This API requires OAuth scopes including `settings.users.teams.read`, which is NOT available for private app tokens. When `fetch_pipelines/2` is called with a private app token, HubSpot returns HTTP 403 with message: "The scope needed for this API call isn't available for public use."
  
  Impact on pipeline-aware CRM:
  1. Pipeline discovery fails — no pipeline names/stages stored in DB
  2. Pipeline cache empty → `enrich_deal_records/4` falls back to DB-based lookup which returns empty
  3. Entity IDs stay in OLD format (`hubspot:deals:{deal_id}`) — no pipeline qualifier
  4. `pipeline_label` and `dealstage_label` unable to resolve to display names
  5. Claim metadata still includes raw `pipeline_pipeline` and `pipeline_dealstage` IDs from the raw payload (via `extract_pipeline_context/1`)
  
  Workarounds:
  - Use OAuth with `settings.users.teams.read` scope for full pipeline discovery
  - Or accept partial pipeline context (raw IDs in metadata without resolved names)
  
