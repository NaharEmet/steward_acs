content: |
  After registering a HubSpot CRM source with `org_setup_source_register`, call `org_setup_discover_pipelines(org_id, source_id)` to fetch pipeline schemas for deals and tickets. This stores pipeline definitions in the CRM pipeline database and returns structured pipeline info. Pipeline discovery validates the HubSpot API key and should be done before scope probing — if it fails with an auth error, the key is invalid. Pipeline discovery is NOT blocking; if it fails, log the error, check config, and proceed with setup.
  
  The ACS tool name is `org_setup_discover_pipelines` (namespace: org_setup). Params: org_id (string, required), source_id (string, required). The source_id comes from the `org_setup_source_register` response.
  
