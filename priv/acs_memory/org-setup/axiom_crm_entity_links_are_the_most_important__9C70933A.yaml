content: |
  CRM entity associations (links between emailsâ†”contactsâ†”companiesâ†”dealsâ†”callsâ†”meetingsâ†”notesâ†”tasks) are the critical data for insight gathering. Without links, entities are isolated facts. With links, the analyst can traverse a graph: "show me all emails from this contact", "what deals is this company associated with?", "who from our team emailed this contact about this deal?"
  
  Every CRM sync must:
  1. Request ALL possible associations from HubSpot API for EVERY object type (not just deals)
  2. Extract and persist every association as a relationship in the DB
  3. Store team member names from email metadata (hs_email_from_firstname, hs_email_from_lastname)
  4. Enable bidsirectional traversal: contactâ†’emailâ†’dealâ†’company, etc.
  
  Missing a link = invisible insight. Links are the #1 priority over individual field extraction.
