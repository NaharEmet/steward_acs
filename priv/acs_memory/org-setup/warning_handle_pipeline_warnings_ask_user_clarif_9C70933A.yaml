content: |
  When `org_setup_discover_pipelines` returns warnings about multiple pipelines of the same object type (e.g., "Multiple deal pipelines detected: Sales Pipeline, Custom Deal Pipeline"), the agent MUST present these to the user and ask clarifying questions before proceeding. Example questions:
  
  - For multiple deal pipelines: "Your HubSpot has multiple deal pipelines (e.g., Sales Pipeline, Custom Pipeline). Which should we import data from? All, or a specific one?"
  - For multiple ticket pipelines: similar question for ticket pipelines
  
  Record the user's decision about which pipelines to use. This can be passed to a coder agent later for pipeline filtering configuration. Do NOT silently proceed with ambiguous pipeline configurations — the user needs to decide.
  
  If no warnings (status: "discovered", warnings: []), proceed normally — pipeline data is stored in DB and claims will be pipeline-provenanced automatically.
  
