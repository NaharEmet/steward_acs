content: HubSpot engagement types (notes, calls, emails, meetings, tasks) require `hs_createdate` as the search API date filter property, not `createdate`. Using `createdate` in the search API returns 400 Bad Request. The fix is in `lib/anantha_os/crm/sync_engine/hub_spot.ex` line 55 - changed `"createdate"` to `"hs_createdate"` for these types. The list API (GET /crm/v3/objects/{type}) works fine for all engagement types. Also discovered that tickets and line_items are forbidden (403) for this particular API key.
