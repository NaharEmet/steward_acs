content: "ETS agent status maps can be partial (e.g. `%{purpose: \"active\"}` from heartbeat registrations). Always use `Map.get/2` instead of dot notation for fields that may be absent — `current_task_id`, `application`, `component`. Dot notation raises `KeyError` when the key doesn't exist."
