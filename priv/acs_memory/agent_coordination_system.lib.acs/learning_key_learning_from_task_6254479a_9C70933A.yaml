content: "When adding optional dependency function calls, use `apply(Module, :function, [args])` to avoid compile-time warnings about undefined modules. Also, always place private functions AFTER all clauses of the same function/arity to avoid Elixir's \"clauses with same name and arity must be grouped together\" warning."
