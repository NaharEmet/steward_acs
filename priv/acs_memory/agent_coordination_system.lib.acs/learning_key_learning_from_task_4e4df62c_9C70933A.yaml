content: "ResponseParser.parse/1 handles all the edge cases that the manual 3-attempt cascade in try_extract_json handled: markdown code fences, unescaped newlines, malformed JSON, text-before-JSON. The JsonRemedy library (used internally by ResponseParser) has a MultipleJsonDetector preprocessing step that skips non-JSON characters to find JSON objects in prose text. The escape_newlines_in_strings function and JsonAdapter are no longer needed by Acs.LLM — they're fully replaced."
