content: "When modifying Req.post calls that talk to external APIs, always verify that auth headers, timeouts, and body params (like temperature) are preserved. The shared lib refactor dropped the Authorization header causing 401 errors. Pattern: check call_provider for API key lookup + do_call_provider for headers/receive_timeout + build_request_body for temperature/suppress_thinking."
