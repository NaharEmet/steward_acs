content: "MiMo v2.5 supports json_object response format via `supports_json_mode: true` in the API call. The ACS copy had this incorrectly set to `false`, causing `:invalid_json_response` errors. Always check that `supports_json_mode` matches the actual model's capability — verify by checking the main app's provider config for the same model. Also ensure env var names match what the code checks: `NIM_API_KEY` not `NVIDIA_NIM_API_KEY`."
