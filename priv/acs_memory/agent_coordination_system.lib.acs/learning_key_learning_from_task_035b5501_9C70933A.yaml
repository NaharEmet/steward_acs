content: "MiMo (Xiaomi) v2.5 reasoning model does NOT support JSON mode despite documentation suggesting so. It returns free-form text even with response_format set to json_object. When adding NIM as fallback provider, ensure ENABLED_LLM_PROVIDERS env var includes both providers in priority order. The provider iteration in try_providers/4 will fall through to NIM when mimo returns :invalid_json_response."
