content: Linear decay formula uses raw SQL with GREATEST(0, 1 - days/90) for temporal_relevance. Fresh syntheses get ~0.999999874 not exactly 1.0 due to time delta between insertion and SQL execution. Use assert_in_delta in tests. Stale marking requires effective_score < 0.1 AND inserted_at < now - 7 days (stale_grace_days). Effective_score = reinforcement_count * temporal_relevance + LN(1 + supporting_claim_count). Syntheses need reinforcement_count >= 1 to avoid being marked stale when older than 14 days (via determine_operational_transition's reinforcement_count == 0 and age > 14 check).
