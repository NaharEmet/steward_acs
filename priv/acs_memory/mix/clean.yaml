content: |
  The `mix clean --only` flag filters by environment (dev/test/prod), NOT by application name. `mix clean --only anantha_os` silently does nothing because there's no environment called "anantha_os". To force a full rebuild of the anantha_os app, use `mix clean` (without --only) or manually delete `_build/<env>/lib/anantha_os/ebin/`.
  
  This caused a stale BEAM cache issue where the `DotPrompt.Application` module was compiled into `anantha_os/ebin` but the `dot_prompt` app's `.app` resource file expected it in its own ebin. After full `mix clean && mix compile`, both the `dot_prompt` app starts successfully and `Anantha.Truthforge.History` (registered as `:truthforge_history`) works correctly.
  
