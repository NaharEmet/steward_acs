content: "Replaced DB-backed API key lookups with static :service_api_key config for internal ACS-to-Anantha auth. All ACS tools (crm_handlers, org_setup_handlers, bridge, anantha_extension) now use config :steward_acs, :service_api_key instead of the old [:anantha, :api_key] pattern. The EnsureApiKey plug checks service key first (no DB lookup), then falls back to DB-backed keys. Pre-existing ACS compile error in lib/acs.ex:156 (undefined variable task) unrelated to this change."
