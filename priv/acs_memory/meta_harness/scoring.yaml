content: MetaHarness.Scoring.build_scorecard/1 uses a SQL query that JOINs claims with extraction_evaluations on evidence_cluster_id, requiring claims.claim_type IS NOT NULL AND claims.claim_type != ''. If existing evaluations are linked to claims without a claim_type (e.g., unclassified), the scoring query returns no rows, producing a zero-score ScoreCard. The Coverage.analyze/1 shows claim_type_coverage with unclassified count = 1 in such cases, which explains the gap.
