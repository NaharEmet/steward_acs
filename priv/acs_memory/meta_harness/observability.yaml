content: |
  The `mix observability.run` task crashes at lib/mix/tasks/observability.ex:68 with a `KeyError: key :collected not found` because the ObservabilityRunner returns a map with keys `:summary` and `:report_path` but the Mix task expects a `:collected` key. The task should use `Map.get(result, :collected, 0)` or the runner should return the `:collected` count.
  
