content: "Broadcasts and side effects must go OUTSIDE Repo.transaction blocks. If they fire inside, LiveViews that query Postgres won't see the committed data. Also: inside a transaction, return bare values not wrapped tuples — Repo.transaction/1 already wraps the result in {:ok, result}."
