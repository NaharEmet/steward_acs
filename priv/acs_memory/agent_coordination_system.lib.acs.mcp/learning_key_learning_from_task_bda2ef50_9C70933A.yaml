content: "Fixed nil params crash in Bridge.health_check/1. Root cause: request_with_opts called Req.get with params: nil when no :params key in opts. Fix: extract params upfront and guard with if params do. Also cleaned up 14 stale ACS error traces — 8 from same crash (already resolved), 6 newly acknowledged (ToolRegistry crashes from hours ago, non-recurring). Key pattern: distinguish ACS-side bugs (fixable in bridge/tool_registry) from Anantha-side bugs (CRM auth, query engine) that ACS merely relays."
