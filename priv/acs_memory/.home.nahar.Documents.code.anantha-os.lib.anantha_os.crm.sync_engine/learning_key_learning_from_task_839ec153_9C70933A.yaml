content: HubSpot Search API for engagement objects (emails, tasks, notes, calls, meetings) does not support `hs_lastmodifieddate` as a filter property despite it being available in list API responses. Use `createdate` instead for initial sync date filtering. Also, log the full response body when debugging 400 errors — the error message alone often doesn't reveal the invalid field name.
