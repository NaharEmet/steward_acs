content: "`build_stage_mapping/1` in hub_spot.ex must guard against nil `stage[\"id\"]` from malformed HubSpot API responses. Using `Enum.reduce` with `if stage_id = stage[\"id\"]` skips bad stages gracefully. Without this guard, `to_string(nil)` raises `Protocol.UndefinedError` at runtime, crashing the entire sync. Always guard before calling `to_string/1` on data from external APIs."
