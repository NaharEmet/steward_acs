content: "1) `acs_create_work` now defaults to self-claim — use `claim: true` to go directly to in_progress. 2) Sleeping agent dispatch mode removed — agents no longer sleep/wake via ACS. 3) Hand-off mode removed — agents own tasks from creation to release. 4) User-directed delegation is the only exception (omit claim:true and let user assign). 5) dispatch.md, sleep.md, pending.md commands deprecated with disable-model-invocation. 6) All agent instruction files updated to use claim:true pattern."
