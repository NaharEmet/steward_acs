content: |
  In `ClaimExtractor.store_claims_batch/2`, the relationship specs built for `LayerRelationships.create_relationships_batch/2` are missing the `:metadata` key. The function builds spec maps with keys `[:source_type, :source_id, :target_type, :target_id, :relationship_type]` but `LayerRelationships.create_relationships_batch/2` uses `spec.metadata` (Access behaviour) which raises `KeyError` if the key doesn't exist.
  
  The fix is to add `metadata: %{}` to the relationship spec maps at lib/anantha_os/crm/claim_extractor.ex around line 594.
  
  This bug does NOT prevent claim insertion — claims are committed via `Repo.insert_all` with `returning: true` before the relationship step. But the derived_from relationships between claims and records are lost.
