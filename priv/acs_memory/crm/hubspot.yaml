content: |
  HubSpot CRM sync uses either a legacy API key (hapikey) or OAuth token. The provided key was an OAuth token that expired 20623 days ago. SyncEngine handles 401 errors gracefully - logs error, skips the object type, continues to next. SyncState records error status for each object type. Fix: generate fresh HubSpot OAuth token or API key.
  
  HubSpot tokens expire after a default of 30 days (unless extended). The token format was `CiRuYTIt...` (base64-encoded). The search API (crm/v3/objects/{type}/search) uses the same auth as the list API (crm/v3/objects/{type}). Both returned 401.
