content: "The CRM config system (`lib/anantha_os/crm.ex`, `merge_crm_config/1`) has inconsistent key type handling that causes caller-provided config overrides to be silently ignored. The problem: `merge_crm_config` uses `Map.put_new` with atom keys from `Application.get_env(:anantha_os, :crm, [])`, but config from web API params (tool_controller.ex) has string keys from JSON deserialization. Since `\"page_size\" != :page_size`, both keys exist in the merged map. Downstream providers (HubSpot, SyncEngine) read config with atom keys (`config[:page_size]`), so the atom-keyed app defaults always win over the caller's string-keyed overrides. Only `api_key` and `api_base` have dual-key checking. This affects the web API endpoint (`/tools/crm/sync`) where users pass config overrides via `params[\"config\"]`. Same issue affects `CRM.sync_object_type` path which skips `merge_crm_config` entirely."
