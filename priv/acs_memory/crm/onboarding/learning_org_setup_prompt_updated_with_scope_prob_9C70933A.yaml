content: |
  Updated `.opencode/agents/org-setup.md` with three improvements for HubSpot CRM sync:
  
  1. **Scope probing (Phase 3)**: Before syncing, make lightweight `GET /crm/v3/objects/{type}?limit=1` for each of 11 object types. Classify as accessible or forbidden (403). Store result in sync state metadata as `scope_probe` so future scheduler runs can skip them.
  
  2. **Server-side ingestion (Phase 4)**: Never use `mix run` for CRM sync — script timeouts (3-10min) are too short for large HubSpot datasets (1000s+ records, 15+ min). Always use ACS tools (`acs_crm_sync`, `acs_crm_sync_object_type`) or trigger scheduler GenServer (`Anantha.CRM.Scheduler.trigger_now/0`). These run on the BEAM VM with no timeout.
  
  3. **Efficiency**: Sync accessible types in parallel batches of 3. Skip forbidden types immediately. Poll sync state every 30s to track progress (don't hang on mix run). Added deferral note: scheduler still iterates all 11 types — needs `coder` to filter based on scope_probe metadata.
  
  Files: `.opencode/agents/org-setup.md` (was 208 lines, now 326 lines)
