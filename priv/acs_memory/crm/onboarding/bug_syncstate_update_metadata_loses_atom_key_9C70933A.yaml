content: |
  Anantha.CRM.SyncState.update_metadata/4 does a direct Map.merge/2 which replaces the entire metadata map. If the existing metadata has atom keys (e.g. :record_count => 1398 inserted by SyncEngine) and the new metadata has string keys (e.g. "deals_synced_at"), the merge replaces the atom-keyed values, causing record_count to appear as 0 in subsequent reads.
  
  This is a cosmetic bug — the actual count IS stored in the sync state (in the `metadata` JSONB column), but after a merge, reading via `get_state` may show `record_count: 0` because the atom key `:record_count` was replaced by `"record_count"` or vice versa, depending on how the merge happens.
  
  Fix: update_metadata should do a deep merge or preserve existing keys not being overwritten, rather than full replacement. Currently it uses `Map.merge(state, new_meta) or %{}` which replaces all keys.
