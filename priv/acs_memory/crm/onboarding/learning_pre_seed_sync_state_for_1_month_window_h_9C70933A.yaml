content: |
  To sync only the past N days of HubSpot data on the first sync (instead of all historical data), pre-seed the sync state's `synced_at` to N days ago BEFORE triggering the sync. This makes the SyncEngine's search API use a date range filter of [synced_at, now].
  
  For example, to sync only the past 1 month of deals:
  1. Create the sync state record: `Anantha.CRM.SyncState.update_metadata(org_id, "hubspot", "deals", %{})` 
  2. Set synced_at to 30 days ago: use `Repo.update_all` with a raw Ecto query to set `synced_at = DateTime.add(DateTime.utc_now(), -30, :day)`
  3. Then trigger sync: `acs_crm_sync_object_type(org_id, "hubspot", "deals")` — the SyncEngine will search for deals modified after that date
  
  The search date property differs by type: contacts use `lastmodifieddate`, all other types use `hs_lastmodifieddate`.
