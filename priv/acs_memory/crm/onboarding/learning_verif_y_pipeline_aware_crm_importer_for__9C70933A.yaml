content: "Test HubSpot integration verified for org 2ec02a09-eeaa-468c-ae57-9bdf270c2bbe. Pipeline discovery API returns 403 because HubSpot private app tokens need `settings.users.teams.read` scope for the Pipelines API - standard CRM scopes don't cover it. However pipeline data still flows into claims via deal field mappings: `belongs_to_pipeline`, `has_deal_stage_id`, `has_hs_pipeline_id`, `has_hs_pipeline_stage_id`. The CRM field config defines `dealstage_label` -> `has_deal_stage` for human-readable stage names but it's marked low importance. 16,674 claims extracted with pipeline context. 3 unique pipeline IDs found across sampled deals."
