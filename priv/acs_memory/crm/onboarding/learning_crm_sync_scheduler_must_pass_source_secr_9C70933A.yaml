content: |
  The CRM Scheduler (Anantha.CRM.Scheduler) only passes `source.config` to `CRM.sync()`, but the HubSpot provider's `get_api_key/1` checks `config.secrets.api_key` first, then `config.api_key`. When API keys are stored via `IngestionSources.update_source_secrets/2` (which stores in the encrypted `secrets` field), the scheduler fails to find them.
  
  Fix: In `sync_crm_source/2` in `lib/anantha_os/crm/scheduler.ex`, merge `source.secrets` into config as `%{"secrets" => source.secrets}` before passing to `CRM.sync`.
