content: |
  ## HubSpot emails/tasks search_api_error 400
  
  ### Symptoms
  - `Anantha.CRM.SyncEngine.sync_object_type(org_id, "hubspot", "emails", config)` returns `{:error, {:search_api_error, 400, "There was a problem with the request."}}`
  - Same for "tasks"
  - Other 4 engagement types (notes, calls, meetings, quotes) work fine
  - Core types (contacts, companies, deals) work fine
  - **Direct call to `fetch_page` with `:since` filter WORKS**:
    - `HubSpot.fetch_page(org_id, "emails", nil, config_with_since)` → `{:ok, %{records: 200, next_cursor: "200"}}`
    - Pagination also works (page 2 returns OK)
  
  ### Debugging Actions Taken
  - Tested `fetch_page_search_api` directly — works
  - Tested `rate_limited_post` directly — works
  - Tested with both `:since` and without — both work when called directly
  - Tested with atom keys vs string keys in body map — both work
  - Verified state is nil (fresh) so `:since` IS added by sync_object_type
  - Verified `config` map has both `"secrets"` and `:since` when passed to `fetch_page`
  
  ### Inconsistency
  The SAME `config` map that works with `fetch_page` fails with `sync_object_type`. The function calls `fetch_all_pages` which calls `provider.fetch_page` — same code path.
  
  ### Possible Causes (unconfirmed)
  1. Some side effect in `SyncState.get_entity_states` before the fetch call
  2. A phantom DB process that interferes with Ecto Repo access in the mix run context
  3. The `Req` library maintaining some stale connection state
  4. The `config` map being modified by some intermediate step
  5. A race condition between the rate limiter and the search API call
  
  ### Next Steps Needed
  - Add Logger.debug to `fetch_page_search_api` to log the EXACT request body before `rate_limited_post`
  - Check if `check_rate_limit` is interfering
  - Test in a Phoenix server context (not mix run) to see if it's an environment issue
  - Test with different object types to see if it's property/field specific
