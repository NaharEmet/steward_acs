content: "To avoid syncing noise contacts from HubSpot, the SyncEngine can be configured to only sync contacts that are associated with deals. The approach is two-phase: (1) sync non-contact types (deals, companies) first, (2) collect `associated_contact_ids` from deal records, (3) use HubSpot's batch read API (`POST /crm/v3/objects/contacts/batch/read` with 100-ID chunks) to fetch only those contacts. Implemented in SyncEngine.sync/3 with `extract_associated_contact_ids/1` and HubSpot adapter's `fetch_contacts_by_ids/4`. When no associated contacts exist (no deals or no associations), falls back to full contact sync."
