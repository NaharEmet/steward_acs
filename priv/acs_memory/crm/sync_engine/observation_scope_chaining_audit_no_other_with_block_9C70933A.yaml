content: |
  Audited all scope-chaining patterns across the CRM sync engine (sync_engine.ex, hub_spot.ex). Only `fetch_pipelines/2` has the with-block chaining bug where one scope's 403 propagates as total failure. All other API calls handle 403s gracefully per-type — each object type syncs independently with its own error handling in `sync_object_type/4` and `fetch_page_search_api/7`.
  
  Pattern is: each object type has its own sync state tracking, so one type failing doesn't block others. Pipeline discovery was the exception because it used `with` to chain multiple pipeline types into a single function.
