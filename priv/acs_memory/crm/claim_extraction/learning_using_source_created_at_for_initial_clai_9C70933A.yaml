content: |
  When ingesting historical CRM data (e.g., deals from HubSpot), claims for new field values should use the record's `created_at` timestamp as `valid_from` instead of `DateTime.utc_now()`. This enables correct temporal queries on historical data. The pattern is:
  
  1. Extract ISO 8601 `created_at` from raw_payload in `build_claim_specs/7`
  2. Parse it with `DateTime.from_iso8601/1`, falling back to `nil`
  3. In `store_claim_with_temporal/2`, use `close_active_claim/4` returning a boolean:
     - `true` (an active claim was closed → update) → use `now`
     - `false` (no active claim → first-time) → use `source_timestamp` from claim_spec
  4. Access `source_timestamp` via `claim_spec[:source_timestamp]` (keyword access with default nil)
