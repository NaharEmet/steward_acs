content: "CRM JoinConfig has two layers: a YAML file at config/crm/joins/default.yaml and a module attribute @default_joins. The YAML loads at runtime on first call (cached in Application env). YAML takes precedence over module defaults. source_fields in both locations must be kept in sync. The YAML file is the SOURCE OF TRUTH - edits to @default_joins alone won't take effect if the YAML loads successfully."
