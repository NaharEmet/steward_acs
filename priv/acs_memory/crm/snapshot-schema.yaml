content: |
  In `CrmEntitySnapshot` schema, `previous_snapshot_id` uses `belongs_to :previous_snapshot, __MODULE__, define_field: false` but has NO explicit `field :previous_snapshot_id, :binary_id` declaration. This means the field does not exist in the Ecto schema at all. It is also absent from the `cast/3` allowed list. Any value passed (e.g., from `crm.ex:839`) is silently dropped during `cast`. The chain link is never persisted.
  
  The established project pattern (see `IngestionAuditLog`) is:
  ```elixir
  belongs_to :org, Anantha.Core.Org, type: :binary_id, define_field: false
  field :org_id, :binary_id  # explicit field declaration
  # and then include :org_id in cast list
  ```
  
  Fix: add `field :previous_snapshot_id, :binary_id` to the schema and `:previous_snapshot_id` to the cast list.
  
