content: |
  CRM ResourceGovernor must use configured max_memory_mb from config/env vars, not `:erlang.memory(:system_limit)`. The BEAM's `:system_limit` returns virtual address space (256 TB on x86_64) not physical RAM, making ratios meaningless. All three threshold checks (check_memory, suggested_batch_size, memory_metrics) use `resolve_max_memory/1` which reads from opts or Application config, falling back to 2048 MB.
  
  Similarly, page_size must be fixed config (not per-sync overrideable) to avoid config key-type mismatches where web API callers pass string keys but downstream reads atom keys.
