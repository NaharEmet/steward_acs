content: |
  The hardcoded relationship extraction logic in build_relationship_maps/1 (crm.ex) and extract_relationships/3 (relationship_extractor.ex) has been replaced with generic calls to JoinConfig.get_joins/2 + JoinResolver.resolve/2. This means adding new relationship types for any CRM object type only requires updating the join config (YAML or @default_joins) — no code changes needed.
  
  The `"company"` name-string fallback in tests was removed — it was storing a company NAME as object_id (a bug). Tests now use `associated_company_id` which is a proper CRM ID field that maps to the existing join definition.
