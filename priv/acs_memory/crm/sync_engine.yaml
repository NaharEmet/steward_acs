content: |
  ## State Transition Tracking Pattern
  
  When implementing state transition detection in a sync engine:
  
  1. **Define tracked fields in the provider module** as internal string constants (e.g., `state_fields("contacts") -> ["hs_lead_status", "hs_lifecyclestage"]`). Never derive state field names from external input.
  
  2. **Store entity snapshots in SyncState** using `get_entity_states/3` and `update_entity_states/4`. Store a map of entity_id => state_values for comparison on next sync.
  
  3. **Compare current vs previous state** in `detect_transformations/5` after fetching records. Generate transformation records when tracked field values differ.
  
  4. **Transformation record format**:
     ```elixir
     %{
       type: "transformation",
       entity_type: "contacts",
       entity_id: "hubspot_contact_id",
       source: "hubspot",
       from_state: "lead",
       to_state: "customer",
       field: "hs_lifecyclestage",
       timestamp: DateTime.utc_now()
     }
     ```
  
  5. **Graceful degradation**: If database queries fail (e.g., invalid org_id format), return empty results rather than propagating errors. Use try/rescue only for truly exceptional cases.
  
