content: HubSpot's Search API (`/crm/v3/objects/{object_type}/search`) returns 400 errors when filtering by `hs_lastmodifieddate` for engagement objects (emails, tasks, notes, calls, meetings). The `hs_lastmodifieddate` property exists on these objects (and can be fetched in list API responses), but is not supported as a search filter property in the Search API. Use `createdate` instead for date-based search filtering on engagement objects, or skip the Search API entirely and use the List API with cursor pagination.
