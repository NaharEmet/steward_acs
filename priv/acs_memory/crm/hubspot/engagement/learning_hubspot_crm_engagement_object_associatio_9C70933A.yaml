content: HubSpot engagement objects (emails, calls, meetings, notes, tasks) support associations with contacts, companies, and deals via the `associations` query parameter in both the list API and search API. The `extract_associations/2` function in `Anantha.CRM.SyncEngine.HubSpot` extracts `associated_contact_ids`, `associated_company_id`, and `associated_deal_ids` from the API response. Join definitions in `Anantha.CRM.JoinConfig` and `config/crm/joins/default.yaml` map these to `associated_with_contact`, `associated_with_company`, and `associated_with_deal` predicates for engagement types. Field classifications in `priv/crm/hubspot_fields.yaml` define semantic predicates for engagement object fields.
