content: "The CRM ResourceGovernor (`lib/anantha_os/crm/resource_governor.ex`) uses `:erlang.memory(:system_limit)` to calculate memory pressure ratios. On Linux (and all OS with MMU), this returns the process address space limit (e.g., 2^48 ≈ 256 TB on x86_64), NOT the physical RAM limit. Result: `total / system_limit` ≈ 0, so the governor never activates. The governor only works correctly when the VM is started with `+MMmcs <max_memory_in_mb>` to set an explicit memory limit. Without `+MMmcs`, the `:ok` path is always returned. Similarly, `suggested_batch_size` always returns `max_batch`. Future fixes should either document the `+MMmcs` requirement or use OS-level memory info (e.g., reading cgroup or /proc/meminfo)."
