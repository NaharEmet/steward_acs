content: |
  HubSpot has 11 object types but only 3 are high-value for initial sync: contacts, companies, deals. Strategy: implement core_object_types/0 optional callback. On initial sync, only sync core types. Config flag include_engagement: true forces all types. Detect initial sync via SyncState.source_has_any_state?/2.
  
  ---
  Improvements: Consider adding a brief note on how this optimization interacts with the async background task pattern (e.g., whether the core_object_types callback should be invoked within the async task). Also, a code snippet showing the SyncState.source_has_any_state?/2 usage would enhance clarity.
