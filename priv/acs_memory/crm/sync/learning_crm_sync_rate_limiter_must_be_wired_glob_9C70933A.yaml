content: When parallelizing CRM object type syncs, the rate limiter must use a GLOBAL key scoped to (org_id, source_type). HubSpot API limit is per API key (10 req/sec total), not per object type. Implement both preventive (check before request) and reactive (handle 429 with record_failure) rate limiting layers.
