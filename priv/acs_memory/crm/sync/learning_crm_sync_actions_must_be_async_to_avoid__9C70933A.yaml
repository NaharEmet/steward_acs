content: |
  CRM sync actions (crm_sync, crm_sync_object_type) in ToolController sync 11 HubSpot object types sequentially. Each HubSpot API call has 30s timeout → total sync takes up to 5.5 minutes. Bandit default request timeout is 15s, causing connection kill → 500 error.
  
  Fix: Use `Task.Supervisor.start_child(Anantha.TaskSupervisor, fn -> ... end)` pattern to run sync in background task. Return 202 Accepted immediately. Log results/errors in background task.
  
  Same pattern found in ToolController.trigger_extraction/2. Both crm_sync and crm_sync_object_type must use this async pattern.
