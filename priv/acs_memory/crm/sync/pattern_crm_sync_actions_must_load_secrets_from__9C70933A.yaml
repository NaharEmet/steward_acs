content: |
  When implementing or fixing CRM sync actions (crm_sync, crm_sync_object_type) in ToolController, always load the source's secrets from the DB before calling Anantha.CRM.sync/3 or Anantha.CRM.sync_object_type/4. The HubSpot sync engine's get_api_key/1 reads config["secrets"]["api_key"], but the raw params from the MCP gateway only contain the config as-is — secrets must be enriched from the persisted IngestionSource record.
  
  Pattern: Query IngestionSource by org_id + source_type, grab source.secrets, and merge into config_map under the "secrets" key.
