content: |
  Three key learnings:
  1. Task.async_stream creates LINKED tasks - raising inside a task crashes the caller. Wrap task bodies in try/rescue to handle errors gracefully.
  2. GenServer handle_call with Repo.get crashes the GenServer on DBConnection.OwnershipError in sandbox mode. Always wrap Repo calls in try/rescue for OwnershipError to avoid cascading supervisor crashes.
  3. When a migration drops a table, also delete the corresponding Ecto schema module to prevent dead code compilation and test failures. Check for all references in tests and priv scripts.
