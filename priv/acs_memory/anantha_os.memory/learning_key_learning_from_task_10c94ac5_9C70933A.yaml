content: "SynthesisDedup LLM fallback tests need short timeout (2s) because circuit breaker retries (3x with exponential backoff) can cause 60s+ hangs when LLM is unavailable. Added timeout: 2_000 to opts for synthesis_dedup call type. DedupCache compute_key needs length-prefixed encoding to prevent hash collisions from concatenation ambiguity."
