content: Pipeline.create_record_from_rules_or_llm merges extraction structured_claim into rule result. When RuleExtractor returns a partial match (e.g., quantity but not item_name), the extraction's data fills gaps because extraction values take precedence in Map.merge. This prevents partial rule results from overriding complete mock/LLM data.
