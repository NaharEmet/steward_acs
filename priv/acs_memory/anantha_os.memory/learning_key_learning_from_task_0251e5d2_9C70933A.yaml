content: "ExtractionWorker periodic timer was restored. The timer is set via Process.send_after in init/1 and reschedules itself in handle_info(:run_periodic, state). It queries the DB for orgs with unprocessed messages and calls trigger_org/1 for each. Default interval is 5 min. The handle_info(:run_periodic, state) handler replaces the old stale :run_extraction handler that was ignoring stale timer messages. Need to mark the old memory 'ExtractionWorker is event-driven, not periodic' as stale since it's now outdated."
