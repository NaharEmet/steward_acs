content: |
  Several test files in Anantha OS fail in the full `mix precommit` suite because they query database tables without org/scope filtering. Data created by one test file leaks into another test file's queries. The fix pattern is to add `setup` blocks that clean up the affected tables using `Repo.delete_all` before each test. This is safe because `DataCase` wraps each test in a transaction (for `async: false`) which is rolled back after the test, so cleanup only affects the current test.
  
  Tables affected: ExtractionEvaluation (queried by ObservabilityReportGenerator.generate/1 and ObservabilityRunner.last_evaluated_at/1 without org filter), Synthesis and Hypothesis (queried by CognitionProcessor.transition_synthesis_states/1 and generate_hypotheses_from_syntheses/1 without org filter), LlmCallMetric and ExecutionStep (queried by ToolStatsAggregator.run/1).
  
  Also, when using `trigger_workflow`, always pass `sandbox_owner: self()` to avoid DBConnection.OwnershipError in tests.
  
