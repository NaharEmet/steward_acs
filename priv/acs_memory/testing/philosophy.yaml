content: "When testing that an optional behaviour callback raises UndefinedFunctionError on a module that doesn't implement it, use `apply(Module, :function, [args])` instead of `Module.function(args)` to avoid compile-time warnings about the function being undefined. Direct calls to optional callbacks that aren't implemented trigger Elixir compiler warnings, even though the test expects the error."
