content: The claims table is a LOGICAL unification. Physical separation (sharding by claim_family, dedicated vector store, graph DB) is permitted without changing the logical model. Design for this possibility from the start. Current implementation assumes single-table works at expected volumes; if transactional workloads compete with semantic retrieval, shard by claim_family.
