content: When updating plan markdown files after a module rename, use replaceAll for both PascalCase (CognitionProcessor) and snake_case (cognition_processor) patterns. Some plan files may have description text that also needs updating beyond just the module name (e.g., ingestion-system.md had 'Runs at 4 AM UTC' that needed to become 'Runs hourly').
