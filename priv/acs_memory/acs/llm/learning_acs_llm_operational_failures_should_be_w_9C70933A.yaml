content: "When all LLM providers are unavailable (rate-limited or down), Acs.LLM.try_providers logs \"All providers failed\" and Acs.Memory.Auditor logs \"Max retries exceeded\". These are expected operational conditions — not code bugs. They were logged at Logger.error, generating unnecessary error traces. Downgraded both to Logger.warning. General principle: use error level for bugs/surprises, warning for expected operational failures."
