content: "MCP YAML tools that go through `/api/query/*/batch` endpoints should NOT have a `handler` field — they route through the Bridge which POSTs to the endpoint with `api_key` as Bearer token (`Authorization: Bearer`). Only tools that need `agent_id` for session lookup via `Acs.MCP.Tools.call_tool/2` should have `handler: Acs.MCP.Tools`. Adding `handler` when no `agent_id` param exists causes a \"Missing agent_id\" error."
