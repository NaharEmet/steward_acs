content: "When writing cognition specs in YAML format, avoid Elixir tuple syntax like {:error, ...} or %{map, ...} in YAML values. The YAML parser interprets curly braces as flow mapping syntax and colons as key-value separators, causing parse errors. Always use plain English descriptions instead. This affects the failure_modes, workflows, and invariants sections of spec files."
