content: "In Anantha.LLM.RateLimiter, Application.get_env was called on every start_rate_limiter/0 invocation (which runs on every check_rate_limit/1 call). Since the Agent is only started once, this was wasted work. Fix: use `Application.compile_env/3` in module attributes (`@llm_config` at line 20) to cache config at compile time. This also eliminates the Elixir compiler warning about using get_env in module body."
