content: |
  Nested packages in `lib/*/` with their own `mix.exs` (git subtree or submodule) are published to Hex for the Elixir community. They MUST NOT depend on project internals (`Anantha.*`, `Acs.*`, project configs, internal modules). Every such dependency ties the package to this project and breaks standalone consumers.
  
  Before adding anything to a nested package, ask: "Would this make sense if someone pulled this from Hex without the Anantha OS project?"
  
  Violations include: importing `Anantha.Repo`, calling `Anantha.LLM.*` functions, referencing project structs, depending on app-level config.
