content: |
  Changed weighted_transcript_sampler.py from linear weights (f[\"count\"]) to log-scale weights (math.log(f[\"count\"])) for picking 10 test transcripts. Linear weights caused the 100k-row 02_b2b_saas_sales dataset to dominate picks (~95% weight). Log-scale balances this: largest dataset gets ~24% weight, smallest ~8%, with all folders in 8-24% range. This ensures diverse transcript representation in memory test scenarios.
  
  Key changes:
  - Added import math
  - Changed weights dict to use math.log(f[\"count\"]) / total_log
  - Changed folder_weights for random.choices to use math.log(f[\"count\"])
  - Updated display to show log(w) column
  
