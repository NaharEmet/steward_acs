content: |
  NimbleCSV.RFC4180's `parse_string/1` and `parse_stream/1` strip the first row (header) by default via the `skip_headers: true` option. This means:
  
  1. `NimbleCSV.RFC4180.parse_string(content)` returns ONLY data rows, not including the header
  2. To also get the header, pass `skip_headers: false`: `NimbleCSV.RFC4180.parse_string(content, skip_headers: false)`
  3. Common bug: calling `parse_string` and splitting into `[headers | data_rows]` fails because headers are already stripped — the first "headers" are actually the first data row
  4. Fix: Read the first line separately with `File.read!/1` + `String.split(content, "\n", parts: 2)`, then parse the header line with `skip_headers: false`, and parse data rows normally (with skip_headers: true, the default)
  
