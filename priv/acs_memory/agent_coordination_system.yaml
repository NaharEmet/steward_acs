content: "Modules that pattern-match on %Exqlite.Error{} or %Exqlite.Result{} structs need the ecto_sqlite3 package compiled regardless of runtime environment. Using `only: [:dev, :test]` on ecto_sqlite3 causes compile errors in prod because the struct definitions don't exist. The dep must be unconditional so struct modules are available at compile time, even if unused at runtime."
