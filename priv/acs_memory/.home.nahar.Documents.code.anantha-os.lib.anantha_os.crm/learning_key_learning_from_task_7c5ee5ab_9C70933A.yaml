content: "Use Repo.transaction with lock(\"FOR UPDATE\") on IngestionSource reads when performing concurrent writes to sync state. Plain find_source/2 is fine for reads. lock_source!/2 rolls back the transaction if no source is found, preserving the {:error, :source_not_found} return contract."
