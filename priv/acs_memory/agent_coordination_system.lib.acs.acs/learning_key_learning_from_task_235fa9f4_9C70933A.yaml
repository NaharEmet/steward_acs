content: ETS cache warmup from DB is essential after server restart. Cache.init/1 creates empty ETS tables but doesn't reload. Add Cache.warmup/0 called after supervisor starts via Task. Also register agents on acs_sleep and auto-register on acs_get_present_status to ensure sleeping/new agents appear in present_status.
