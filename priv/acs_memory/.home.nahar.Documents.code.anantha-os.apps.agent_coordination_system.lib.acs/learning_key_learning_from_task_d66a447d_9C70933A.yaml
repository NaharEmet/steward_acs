content: "escape_newlines_in_strings/1 must escape ALL control chars (0x00-0x1F) inside JSON strings, not just \n. MiMo/NIM models embed \r, \t in reasoning text inside JSON. Added clause `when c < 0x20 and c != 0x0a` with true literal param before catch-all. Uses \uXXXX format for universal JSON compatibility. Pattern order critical: must precede generic <<c::utf8>> catch-all."
