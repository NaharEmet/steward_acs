content: |
  Root cause of all :invalid_json_response failures in Memory Auditor LLM evaluation was `extract_balanced_json/1` double-closing-brace bug. `find_balanced/4` already includes closing `}` in its return, but `extract_balanced_json` wrapped result with `{#{result}}` producing `}}` at end. This made ALL providers fail (mimo, nim) because extracted JSON was always malformed. Fix: use `"{" <> find_balanced(...)` instead of `"{#{find_balanced(...)}}"`.
  
  Also added early return in `try_extract_json` for empty extraction to avoid confusing `Jason.decode("")` errors. Exposed `extract_json_content/1` and `escape_newlines_in_strings/1` as `def @doc false` for testability.
  
  Key debugging signal: extracted JSON ending with `}}` and Jason.decode error at position `byte_size - 1` with token `nil`.
