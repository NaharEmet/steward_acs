content: All 9 analyst tools (`ant_search_memory`, `ant_get_synthesis`, `ant_get_claim`, `ant_get_observation`, `ant_get_source_excerpt`, `ant_get_entity`, `ant_execute_query`, `ant_export_dataset`, `ant_drilldown`) require `org_id` as a required parameter in every call. The `org_id` is passed as a POST body parameter. Code examples and documentation must always include `org_id`. This applies to all calls — both single-line and multi-line Elixir syntax.
