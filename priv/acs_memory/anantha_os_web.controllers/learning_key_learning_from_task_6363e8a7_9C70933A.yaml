content: CRM sync must be async. Bandit default HTTP timeout is 15s. HubSpot sync takes 5+ min for 11 object types. Use Task.Supervisor.start_child to run in background, return 202 immediately. The enrich_config_with_secrets fix was already applied but didn't solve the root cause (sync is synchronous, not API key missing).
