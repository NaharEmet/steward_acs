content: string_keys_to_atoms in query_controller.ex needs to recursively handle nested maps for filter conditions to work. The apply_field_conditions function pattern-matches on atom keys for operators (like, eq, gt, etc.), but nested maps from JSON params have string keys. Without recursion, nested operators are silently dropped by the catch-all clause.
