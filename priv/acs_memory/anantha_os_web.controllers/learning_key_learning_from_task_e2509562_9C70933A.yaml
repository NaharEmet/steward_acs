content: "When fixing filter query bugs, always check whether string_keys_to_atoms recurses into nested maps. Filter conditions are nested maps like %{subject: %{like: value}} — if only top-level keys are atomized, the nested operator keys (like, eq, gt) stay as strings and get silently dropped by pattern matching in apply_field_conditions."
