content: "When adding new Query API features, always update 3 layers: 1) QueryEngine for execution logic, 2) QueryController for HTTP handling, 3) ant_analyst.yaml + anantha_query.ex for ACS tool definitions. The controller handles mode-specific response formatting (compact, count) while QueryEngine handles the data. The router needs a new route for completely new endpoints like /api/query/describe."
