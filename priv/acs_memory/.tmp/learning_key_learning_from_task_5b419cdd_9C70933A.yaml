content: "1. CRM email raw payloads are stored in crm_entity_snapshots.state_snapshot, not in events. Events for batch sync only store (crm_source, crm_object_type, crm_external_id) in raw_metadata, not the full raw_payload. 2. The btree index on claims(subject, predicate, object) cannot handle email body text (>2704 bytes for btree index). Use hash indexes or drop the object column from the index. 3. claims.content is still varchar(255) — needs migration to text for long claim values that embed the full object text. 4. ClaimExtractor.store_claims_batch has a bug: relationship_specs missing :metadata key, causing KeyError after successful claim insertion. 5. Repo.insert_all with returning: true commits immediately — claims are persisted even if subsequent steps (like relationship creation) fail."
