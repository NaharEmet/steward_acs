content: "opencode curl bash permission pattern uses glob-style matching. Pattern \"curl http://localhost:*\" only matches curl immediately followed by the URL. To match curl with flags like -s or -X POST, use \"curl*http://localhost:*\" — the wildcard between curl and http://localhost: matches any intermediate args."
