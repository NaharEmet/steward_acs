content: "Two-phase sync pattern: SyncEngine now separates contacts from other types, syncs deals/companies first, collects associated contact IDs, then batch-reads only those contacts via HubSpot batch read API. Key changes: extract_associated_contact_ids/1 collects from deal record `associated_contact_ids`, fetch_contacts_by_ids/4 uses POST /batch/read with 100-chunk batching, and fetch_page/4 checks config[:allowed_contact_ids] to decide which path to take."
