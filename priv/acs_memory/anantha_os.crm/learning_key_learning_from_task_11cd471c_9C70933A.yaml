content: "In Ecto, when a subquery with a `select` clause is used as a source in another query, it must be wrapped in `subquery()`. Otherwise Ecto raises \"only one select expression is allowed in query\". This is because Ecto treats the `select` on the inner query as conflicting with the outer `select`. Fix: `from s in subquery(inner_query)` instead of `from s in inner_query`."
