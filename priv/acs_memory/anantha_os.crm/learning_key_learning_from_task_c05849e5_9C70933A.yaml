content: "CRM SyncEngine cond blocks must use string keys for state access since JSONB deserializes with string keys. state[:cursor] always returns nil. State synced_at field is an ISO8601 string when read from DB, not a DateTime struct. The HubSpot fetch_page checks config[:since] to decide between Search API and List API -- always setting since means always using Search API, which means cursor resets each cycle."
