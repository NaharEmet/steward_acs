content: The claim_extractor.ex batch path (store_claims_batch → create_claims_batch) now queries active (subject, predicate) pairs before inserting. First-time claims use source_timestamp without truncation for their valid_from, while updates use now_iso. The file at HEAD was truncated to 15 lines; the full implementation (566 lines) was restored from commit 03adafab with the fix that source_timestamp should NOT be truncated (DateTime.to_iso8601/1 preserves full precision).
