content: "The batch path in ClaimExtractor now uses source_timestamp for first-time claims (not just now_iso). The key insight: query active (subject, predicate) pairs BEFORE the bulk close, build a MapSet, then use it in create_claims_batch to decide valid_from. Preserve full microsecond precision with DateTime.to_iso8601/1 without truncation."
