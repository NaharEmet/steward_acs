content: "When implementing a filtered contact sync for HubSpot CRM, the two-phase approach works well: sync deals/companies first, collect associated_contact_ids, then use HubSpot's batch read API (POST /crm/v3/objects/contacts/batch/read with 100-ID chunks) to fetch only those contacts. Key pitfalls: (1) batch read error handling must propagate failures, not silently swallow them; (2) rate limiting (check_rate_limit + 429 retry) must apply to batch reads too; (3) when no associated contacts exist, the filter must be set to empty list (not skipped) to prevent importing all contacts; (4) 401 from batch read must be fatal like the regular API path."
