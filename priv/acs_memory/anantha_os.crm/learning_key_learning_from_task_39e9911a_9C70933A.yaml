content: "CRM ResourceGovernor should use configured max_memory_bytes from opts or Application config, never :erlang.memory(:system_limit) which returns VM limit not configured limit. Use Keyword.get(opts, :max_memory_bytes) with fallback to Application.get_env(:anantha_os, :crm, []) |> Keyword.get(:max_memory_mb, 2048) |> Kernel.*(1_048_576). {:stop, reason, wait_ms} tuple is unused pattern; {:stop, reason} is sufficient. All CRM env vars in runtime.exs require Integer.parse pattern, never String.to_integer on raw input."
