content: The claim_extractor uses close_active_claim returning a boolean to distinguish between first-time claims (use created_at) and updates (use now). The source_timestamp is extracted from raw_payload["created_at"] in build_claim_specs and parsed via DateTime.from_iso8601/1 with nil fallback.
