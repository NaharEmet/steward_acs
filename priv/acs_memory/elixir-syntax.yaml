content: |
  In Elixir, `cond` blocks cannot be used directly inside map literals because the `->` operator is ambiguous in that context. To use conditional logic in map literals, either:
  1. Use `if`/`unless` expressions wrapped in parentheses: `embed: (if cond, do: :warning, else: :ok)`
  2. Extract the conditional logic to a helper function that returns the value
  3. Use `case` with pattern matching instead
  
  Attempting to use `cond do ... end` directly inside `%{...}` causes a syntax error: "unexpected operator ->"
  
