content: Migration 20260609000003 drops claim_ontology_nodes, observation_ontology_nodes, and synthesis_ontology_nodes, replacing them with a single polymorphic entity_ontology_links table (id, entity_type, entity_id, ontology_node_id). All code referencing the old join tables must be updated to use the new table with the appropriate entity_type ('claim', 'observation', 'synthesis').
