content: "Never use `_` to discard the second element of an error tuple when the first element contains error details. This creates silent error swallowing that cascades through 3 layers. Always use `case` to match both `{:ok, _}` and `{:error, _}` patterns, even if type specs claim only `:ok` is possible at compile time."
