content: |
  When renaming a source_type string from "audio_transcriber" to "call_transcripts", backward-compatible checks must be added so existing DB records with the old source_type still work. This is done by checking both old and new values in the guard clause:
  
  ```elixir
  if (source.source_type == "call_transcripts" or source.source_type == "audio_transcriber") and ...
  ```
  
  Also, any pipeline normalization functions that map source_type strings need the old value preserved as a fallback:
  
  ```elixir
  defp normalize_source_type("audio_transcriber"), do: "sales_call"
  ```
  
  And ACS cognition spec files should be renamed from the old name to the new name to match the module/file renaming.
  
