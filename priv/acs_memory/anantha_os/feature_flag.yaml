content: In `lib/anantha_os/feature_flag.ex`, the `now/0` function (defined as `defp`) is used inside guard clauses on lines 125 and 145. Elixir guards only allow macros and built-in guard-safe expressions — regular function calls are not allowed. This causes a compilation error that blocks all Ecto tasks (migrations, compile, etc.). The fix is to either make `now/0` a macro (`defmacrop`) defined before its usage, or pre-compute the threshold outside the guard.
