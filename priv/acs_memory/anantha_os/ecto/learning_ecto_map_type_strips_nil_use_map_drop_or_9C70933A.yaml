content: |
  Ecto's `:map` type silently strips keys with nil values when persisting. `Map.merge(changeset, %{field: nil})` won't persist nil into the database — the key is dropped entirely. This causes subtle bugs with first-sync detection (setting `synced_at: nil` on a map doesn't work) and field clearing.
  
  **Fix patterns:**
  - To clear a key from a `:map` field: use `Map.drop(state, [:key])` instead of `Map.put(state, :key, nil)`
  - To set a nil value on a schema field: use `Ecto.Changeset.put_change/3` if the field isn't in `cast`
  - For SyncState `synced_at` first-sync detection: `Map.drop(state, [:synced_at])` removes the key entirely, which can be checked with `Map.has_key?`
  
