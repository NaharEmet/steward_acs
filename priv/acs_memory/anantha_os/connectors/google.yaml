content: |
  Google Meet integration requires two registration points:
  1. Add the OAuth scope `https://www.googleapis.com/auth/meetings.space.readonly` to `Anantha.Connectors.Google.Auth.default_scopes/0`
  2. Add `"google_meet" => Anantha.Ingestion.Sources.GoogleMeet` to `Anantha.Ingestion.@source_adapters`
  
  The scope is `meetings.space.readonly` (not `meeting.*`) — Google's naming uses `meetings` plural, and `space` (singular) for the resource level, matching the Google Meet API v2 conventions.
  
