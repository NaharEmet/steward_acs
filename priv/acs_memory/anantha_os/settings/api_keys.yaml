content: |
  The API Key management UI follows the same pattern as other settings LiveViews in Anantha:
  
  1. LiveView at `lib/anantha_os_web/live/settings_live/api_keys_live.ex`
  2. Mount checks session auth, loads org via `Core.get_org_from_session/1`
  3. Uses `{AnanthaWeb.Layouts, :admin}` layout
  4. Events: generate, list, revoke — all go through `Anantha.ApiKeys` context
  5. Generated key is displayed ONCE in a modal with copy button, then cleared
  6. Role is set after key creation via changeset + Repo.update (generate_key/2 doesn't set role)
  7. Route added inside the existing admin `live_session` block
  8. Nav link follows the exact pattern with `@current_scope` conditional styling
  
