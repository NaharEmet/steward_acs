content: "The skip_llm flag in SyncEngine (set to true by default) incorrectly skips ClaimExtractor.batch_extract_and_store which is purely rule-based (no LLM). The fix: move batch_extract_and_store outside the skip_llm gate so it always runs during CRM syncs. Only fire_event_extraction should remain gated since it calls MemoryExtractor (LLM-based)."
