content: |
  Truthforge.History stores run evaluations in two layers:
  1. ETS table `:truthforge_history` for fast in-memory read/write during a session
  2. JSON files in `truthforge_data/history/{run_id}.json` for durable cross-session persistence
  
  On init, it scans the history directory and loads all JSON files into ETS. On save, it writes to ETS AND to disk. This matches the PatternStore pattern used elsewhere in the project.
  
  ScoreCard and ScoreTrend structs are currently defined inline within History (as sub-modules) but should be extracted to Anantha.Truthforge.Scoring when that module needs them.
  
