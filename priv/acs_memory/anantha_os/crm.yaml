content: |
  `batch_resolve_identities` in `lib/anantha_os/crm.ex` (line 523) processes all envelopes in a `Enum.each` without per-item error handling. If any single contact has an invalid email (e.g., containing an apostrophe like `d'souza` which fails the Actors email regex), the entire identity resolution batch crashes silently (caught by the pipeline's try/rescue), resulting in 0 identities persisted.
  
  The root cause is that the `Actors.create_actor/2` function validates email format using a regex that doesn't include apostrophes. Many legitimate international surnames contain apostrophes.
  
  **Fix**: Wrap each identity resolution in a try/rescue so one bad contact doesn't kill the entire batch. Log the error and continue for the failed item.
  
