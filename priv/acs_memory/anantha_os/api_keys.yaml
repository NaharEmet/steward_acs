content: |
  `ApiKeys.generate_key/3` now accepts a `role` parameter (default "analyst") and sets permissions via `role_permissions/1`:
  
  - `"admin"` — read, write, memory.read, memory.search, analytics.query, analytics.export, admin
  - `"dev"` — read, write, memory.read, memory.search, analytics.query, analytics.export
  - `"analyst"` — memory.read, memory.search, analytics.query, analytics.export
  - any other — `["read"]` only (fallback)
  
  The `role` is also stored directly on the ApiKey record, so callers no longer need a separate role update after key creation. Both `AuthController.generate_key` and the `mix generate_api_key` task were updated to pass the role directly.
  
