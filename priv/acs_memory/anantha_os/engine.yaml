content: The events table cannot have a unique index on (org_id, entity_type, entity_id) because multiple events can be created for the same entity (e.g., workflow execution progress generates node_started, node_completed, etc. for the same node). When adding indexes for efficient event lookups, always use non-unique indexes. Unique enforcement of event deduplication (if needed) must be handled at the application layer, not the database layer.
