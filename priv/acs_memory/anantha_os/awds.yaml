content: |
  When integrating with ACS from another OTP app (like AWDS):
  1. Start ACS dynamically: `Application.ensure_all_started(:steward_acs)`
  2. Use `Code.ensure_loaded?(Acs)` to check if ACS module is available at runtime
  3. Call `Acs.create_task(attrs, agent_id)` to create tasks - this is the underlying function the MCP tool wrappers use
  4. No need to add ACS as compile-time dependency - call it dynamically at runtime
  
