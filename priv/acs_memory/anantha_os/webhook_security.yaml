content: |
  When implementing webhook endpoints that require provider-specific secrets (e.g., HMAC-SHA256 signing keys for Fireflies.ai, Read.ai), the secret storage strategy must account for multi-tenancy:
  
  1. **Org-level secrets (primary)**: Store provider secrets in `org.settings["meeting_webhooks"]` as a nested map. This allows each org to configure their own webhook integration credentials independently.
  
  2. **App config fallback**: Use `Application.get_env(:anantha_os, :webhook_secrets)` as a fallback for development or single-tenant deployments. The controller checks org settings first, then app config.
  
  3. **URL design**: Include `org_id` in the webhook URL path (`POST /api/ingestion/webhook/:org_id/:provider`) so the controller can look up the correct org's settings without relying on query params or body parsing.
  
  4. **Provider validation**: Always validate provider values against a known allowlist (`@known_providers ~w(fireflies read_ai sales_trail)`) before converting to atoms, preventing atom table exhaustion attacks from tampered input.
  
  This pattern was implemented for meeting transcript webhook providers (Fireflies.ai, Read.ai, Sales Trail) in AnanthaOS. The `MeetingWebhookController` resolves secrets via `get_org_webhook_secret/2` → `get_app_config_secret/1`, and the admin settings LiveView persists to org settings with correct URL generation.
  
