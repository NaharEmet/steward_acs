content: "When fetching messages by ID for pending message processing, use batch_get_messages/2 that queries with `where: m.id in ^ids` instead of calling get_message/2 per ID. This reduces N individual queries to 1 batch query per org. Follow this pattern for any other bulk-ID lookups."
