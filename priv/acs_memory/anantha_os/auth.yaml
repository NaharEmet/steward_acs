content: |
  Admin email authorization uses `Application.get_env(:anantha_os, :admin_email)` at runtime instead of a hardcoded `@admin_emails` list.
  
  Config values set in:
  - config/runtime.exs (from ADMIN_EMAIL env var, raises if unset when not test)
  - config/test.exs (set to "admin@test.com" for tests)
  
  The authenticate_admin/1 function checks `admin_email && email == admin_email` where admin_email comes from Application config. If nil (unconfigured), all auth fails with {:error, :unauthorized} — fail-safe by default.
  
  This was changed from a hardcoded `@admin_emails ["naharemete@gmail.com"]` attribute to fix CRIT-3.
