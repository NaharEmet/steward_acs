content: |
  To create an API endpoint that only works in development:
  
  1. Add a guard at the top of the controller action:
     ```elixir
     if Application.get_env(:anantha_os, :dev_key_endpoint, false) || Mix.env() == :dev do
       # dev logic
     else
       send_resp(conn, 404, ~s/{"error":"not_found"}/)
     end
     ```
  2. Register the route normally in `router.ex` — it just returns 404 in production
  3. The `Mix.env() == :dev` check makes it available in dev without configuration
  4. The `Application.get_env(:anantha_os, :dev_key_endpoint, false)` allows explicit enabling in other environments if needed
  
