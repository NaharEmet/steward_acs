content: |
  `Anantha.CRM.process_crm_records_batch/2` now accepts optional `config` map with `:skip_llm` key. When `config[:skip_llm]` is true, the function skips `fire_event_extraction/3` and `ClaimExtractor.batch_extract_and_store/5` — both make LLM calls via LLMLedger. This prevents Task.async_stream timeouts during bulk CRM syncs with thousands of records.
  
  The `Anantha.CRM.SyncEngine` sets `config[:skip_llm] = true` by default via `Map.put_new/3`, so callers can override with `skip_llm: false` if LLM processing is needed.
  
  Non-LLM steps (event creation, snapshot creation, cluster creation, relationship extraction, identity resolution) still run as normal.
