content: "CRM identity resolution follows a cascading fallback pattern: (1) lookup by email_hash, (2) lookup by phone_hash via actor_id, (3) in-memory case-insensitive name match, (4) auto-create new Actor. This enables cross-provider identity unification (same email in HubSpot and Zoho resolves to same Actor). Uses existing Actors.get_actor_by_email/2 and Actors.get_actor_by_phone/2 functions for consistency."
