content: "FieldClassifier.classify_field/3 returns maps with string keys from YAML config (e.g., %{\"predicate\" => \"has_email\"}) for configured fields, but returns maps with atom keys (e.g., %{predicate: \"has_field\"}) for fallback auto-classification. Tests must use the appropriate key type depending on the code path."
