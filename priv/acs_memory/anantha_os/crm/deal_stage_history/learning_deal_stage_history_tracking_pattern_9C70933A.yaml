content: CRM deal stage history uses append-only linked-list pattern per deal. Each entry represent a stage entry. When a deal moves to a new stage, the previous entry gets `exited_at` and `duration_seconds` computed. The `record_transition/2` function wraps both operations in a transaction. `create_initial/5` handles first-time syncs. Linked-list chain via `previous_history_id` enables forward/backward traversal of stage timeline.
