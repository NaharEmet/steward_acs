content: HubSpot CRM API v3 uses cursor-based pagination with an `after` parameter. The HubSpot provider implementation in Anantha.CRM.SyncEngine.HubSpot uses Req for HTTP requests and extracts the next cursor from the paging.next.after field in API responses. The pagination limit is 100 records per page.
