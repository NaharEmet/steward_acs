content: The CRM ResourceGovernor module was defined as `Anantha.ResourceGovernor` at `lib/anantha_os/crm/resource_governor.ex`, violating the convention that module namespaces follow directory structure. Renamed to `Anantha.CRM.ResourceGovernor` to match the file path `lib/anantha_os/crm/`. All references in `sync_engine.ex` updated accordingly.
