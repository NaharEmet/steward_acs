content: |
  To limit CRM first-fetch to last 5 months:
  
  1. **SyncEngine** (`sync_engine.ex`): When cursor==nil AND no `synced_at` in state, add `:since` (5 months ago in ms) to config. After initial search-API sync, store cursor=nil + `first_sync_complete` flag.
  
  2. **HubSpot provider** (`hub_spot.ex`): When `:since` in config AND cursor=nil, use search API (POST /crm/v3/objects/{type}/search) with filter `lastmodifieddate >= since_ms`. Paginate same way as list API. Reuse `extract_records/2` and `get_next_cursor/1`.
  
  3. **Scheduler is already 1 hour** - no changes needed.
  
  Key constraint: search API uses offset-based `after` (numeric), list API uses opaque cursor. Not compatible. So after search API sync, reset cursor to nil and set `first_sync_complete: true` in metadata. Subsequent syncs: cursor=nil but `first_sync_complete=true` → no `since` → list API used normally.
  
