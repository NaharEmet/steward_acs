content: |
  Verified via direct API calls: HubSpot search API engagement objects (notes, calls, emails, meetings, tasks) reject `createdate` as a search filter property with HTTP 400. Must use `hs_lastmodifieddate` instead.
  
  Working filters:
  - `hs_lastmodifieddate` works on ALL engagement types
  - `lastmodifieddate` works on contacts
  - `hs_lastmodifieddate` works on companies, deals, quotes, notes, calls, emails, meetings, tasks
  
  Breaking filter:
  - `createdate` returns 400 for ALL engagement types (notes, calls, emails, meetings, tasks)
