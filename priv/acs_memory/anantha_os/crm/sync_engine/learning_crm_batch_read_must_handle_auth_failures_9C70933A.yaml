content: |
  HubSpot batch read API (fetch_contacts_by_ids) must:
  1. Call check_rate_limit(org_id) before and during chunk processing to respect rate limits
  2. Handle 429 responses with backoff + single retry inside the chunk loop
  3. Short-circuit on 401 with {:error, :authentication_failed} immediately (don't accumulate)
  4. Distinguish between partial failure (records + errors → warn + return OK) and total failure (no records + errors → {:error, {:batch_read_failed, errors}})
  5. When contact_ids list is empty, the empty chunk_every/2 naturally produces zero records via the reduce, which is correct
