content: "When using `Repo.update_all/3` with `set: [metadata: fragment(...)]`, the fragment cannot reference query bindings (e.g., `c.metadata`) or use the `^` pin operator directly. To reference a query column in the SET value, use `dynamic([c], fragment(\"col_name || jsonb_build_object('key', ?)\", ^value))` where `col_name` is the raw SQL column name as a string in the fragment template, not a binding reference. For PostgreSQL JSONB updates, use `dynamic([c], fragment(\"metadata || jsonb_build_object('valid_to', ?)\", ^value))`."
