content: "The `IngestionCRMRecord` struct is placed inside `raw_metadata` in the pipeline payload, which gets serialized to JSON when stored in the event's payload (a `:map` Ecto type). The struct must derive `Jason.Encoder` to be serializable. Without it, `Jason.encode!` crashes when the pipeline's `maybe_store_large_content` function or Ecto's JSON serialization tries to encode the payload."
