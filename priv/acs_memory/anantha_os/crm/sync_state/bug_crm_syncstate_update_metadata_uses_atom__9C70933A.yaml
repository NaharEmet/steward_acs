content: |
  `SyncState.update_metadata/4` receives metadata with atom keys (`%{record_count: 4992, status: "success"}`). But `Map.merge(current, merged_metadata)` where current has string keys from DB (`%{"record_count" => 0}`) keeps BOTH key types. The atom-keyed value never overwrites the string-keyed value. After JSON serialization, the string key (0) may persist, making the DB show `record_count: 0` even when records were synced.
  
  Fix: convert metadata keys to strings before merging: `Map.new(metadata, fn {k, v} -> {to_string(k), v} end)` then merge with current.
