content: |
  Anantha.LLM.Client and Anantha.LLM.ResponseParser previously referenced dead stub modules (Anantha.LLM.JsonExtractor, Anantha.LLM.JsonAdapter). These have been migrated to delegate to the standalone `:llm_utils` package (AnanthaJson.*). Order matters: fix aliases before deleting stub files to avoid compile errors.
  
  Key pattern: `Anantha.LLM.ResponseParser` now delegates all parsing functions to `AnanthaJson.ResponseParser` via `defdelegate`, keeping only the project-specific `ant_ir?/1` function. `Anantha.LLM.Client` aliases `AnanthaJson.JsonExtractor` instead of `Anantha.LLM.JsonExtractor`.
