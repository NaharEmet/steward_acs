content: |
  MIMO rate limit consolidated to single source of truth in `config/config.exs` with env var override. No more value duplication across 3 files.
  
  Architecture:
  - `config/config.exs`: `mimo_rate_limit: 100` — single source of truth
  - `config/runtime.exs`: conditional override via `ANANTHA_MIMO_RATE_LIMIT` env var — only sets if env var present, no hardcoded default
  - `lib/anantha_os/llm/rate_limiter.ex`: reads from Application config with fallback matching config.exs (100)
  
  NIM stays at 40 RPM.
