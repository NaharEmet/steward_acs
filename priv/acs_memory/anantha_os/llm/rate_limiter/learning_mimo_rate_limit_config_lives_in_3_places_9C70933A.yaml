content: |
  The MIMO rate limit configuration is spread across 3 files:
  1. `config/config.exs` — base defaults (should be single source of truth)
  2. `config/runtime.exs` — env var overrides (should be conditional-only, no fallback defaults)
  3. `lib/anantha_os/llm/rate_limiter.ex` — code fallback values in private functions
  
  **Best practice:** Keep default values only in `config/config.exs`. Make `runtime.exs` conditional (only apply if env var is set). Have the code (`rate_limiter.ex`) read purely from `Application.get_env` without hardcoded fallback values — the config should always have a default.
