content: |
  MIMO (Xiaomi MiMo) LLM provider rate limit increased from 40 to 150 requests per minute. NIM (NVIDIA) stays at 40 RPM. Changes made in:
  
  - `config/config.exs`: `mimo_rate_limit: 40` → `mimo_rate_limit: 150`
  - `config/runtime.exs`: default for `ANANTHA_MIMO_RATE_LIMIT` env var changed from 40 to 150
  - `lib/anantha_os/llm/rate_limiter.ex`: updated moduledoc, doc, and default fallback from 40 to 150
  
  The rate limiter uses a sliding window algorithm via Agent. The config reads from Application env `:anantha_os, :llm` with the runtime.exs overriding via `ANANTHA_MIMO_RATE_LIMIT` env var, which itself falls back to the config.exs default of 150.
