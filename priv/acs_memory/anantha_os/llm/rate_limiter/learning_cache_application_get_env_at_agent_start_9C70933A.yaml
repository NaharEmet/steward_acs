content: When using Agent-based rate limiters or similar hot-path modules, read `Application.get_env` **once** at startup in the `start_link/start_rate_limiter` function (the init closure) and store config values in the Agent state map. Access them via `state.field` inside `Agent.get_and_update` closures. This avoids the `Application.get_env` OTP application controller call on every request, which can be 2-5x slower than map field access.
