content: "The client.ex fallback chain (nim → minimax → groq → sarvam) only triggers on :service_unavailable and :timeout errors from request_with_module/3. A 429 rate limit is caught earlier in do_chat_completion(\"nim\", ...) and returns {:error, :rate_limited} directly without going through the fallback. This means during the memory test pipeline, when NIM returns 429, the scenario fails immediately rather than falling back to minimax."
