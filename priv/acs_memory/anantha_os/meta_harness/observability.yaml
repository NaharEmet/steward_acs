content: "The ObservabilityScheduler.trigger/0 and ObservabilityRunner.run/1 support a `mock_responses` option that bypasses real LLM API calls. When `mock_responses: %{...}` is passed in opts, the Evaluator module returns a pre-built response instead of calling the LLM. Use this to avoid rate-limiting and timeouts in tests."
