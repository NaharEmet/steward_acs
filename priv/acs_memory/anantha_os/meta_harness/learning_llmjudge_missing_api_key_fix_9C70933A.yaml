content: "LLMJudge default provider was 'sarvam' but Sarvam API key not configured. Changed default to 'nim' (app standard). Added providers_available?/0 guard that checks Provider.get_api_key/1 before attempting judge LLM call, returning {:error, :no_provider_configured} early instead of letting the error propagate from deep in the Client."
