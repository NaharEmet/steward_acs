content: |
  Stub modules in anantha_os have different retention reasons:
  
  1. `Anantha.MCP.LogStore` (log_store_stub.ex) - Used in tests via `Anantha.MCP.LogStore.store_log/4` calls in error_monitor_test.exs. Kept because tests rely on it.
  
  2. `Anantha.MCP.Tools` (tools_stub.ex) - Used by `lib/anantha_os/agent_simulation/tools.ex` which calls `Anantha.MCP.Tools.call_tool/2` for workflow simulation. Kept because agent_simulation depends on it.
  
  3. `Anantha.Core.CoreCompat` — **DELETED**. The CoreCompat module and its stub functions (list_cash_flows, list_inventory_movements, etc.) have been removed. All legacy table access now routes through the unified `list_claims/2` API with `claim_type` filters. The migration is complete.
  
