content: |
  Users need to discover what predicates (e.g. "belongs_to_pipeline"), claim_types, and metadata keys exist in the dataset. Currently must query blindly.
  
  `DatasetRegistry.describe/1` already exists at `lib/anantha_os/query/dataset_registry.ex` line 49 but has no HTTP endpoint mapping.
  
  Suggested additions:
  1. `GET /api/query/schema/{dataset}` or `POST /api/query/describe` endpoint returning field info
  2. `GET /api/query/distinct/{field}` for listing distinct predicate values, claim_types, etc.
  3. MCP tool: `ant_describe_dataset` wrapping `DatasetRegistry.describe/1`
