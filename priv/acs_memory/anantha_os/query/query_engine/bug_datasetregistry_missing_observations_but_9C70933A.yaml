content: |
  `DatasetRegistry` at `lib/anantha_os/query/dataset_registry.ex` maps dataset names to schemas for: syntheses, claims, entities, source_excerpts. There is NO "observations" entry.
  
  However, `QueryEngine.build_default_columns/1` at line 668 has a clause for "observations". And the router at line 188 has an observation endpoint. But calling `execute_query(dataset: "observations")` would fail at `validate_dataset` because `DatasetRegistry.get("observations")` returns nil.
  
  This is a missing registration — the dataset name is recognized by some code paths but not by the registry, causing hard-to-diagnose "Unknown dataset" errors.
