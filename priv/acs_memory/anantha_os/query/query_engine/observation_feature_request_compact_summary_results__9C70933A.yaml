content: |
  Users need:
  1. Compact results format — query returning 1K rows with 15+ fields each blows up context. A count-only mode or summary format (key fields only) would help.
  2. Working `select` field support — the `select` parameter is accepted but `execute_rows_query` doesn't properly limit fields when `select` is non-empty.
  3. Native `SELECT COUNT(*)` mode without `GROUP BY` — for quick counts.
  
  The `select` param is validated and passed to Ecto `select: map(q, ^fields)`, but when `select` is empty, it falls back to selecting all fields. The fix would be to ensure select works as expected.
