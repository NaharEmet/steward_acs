content: |
  Bug 1: In `QueryEngine.run_query` (line 126), the condition `has_agg = length(group_by) > 0 and map_size(aggregates) > 0` uses AND. Passing only `aggregates: %{predicate: "count"}` without `group_by` falls through to rows query, ignoring aggregates entirely.
  
  Bug 2: `execute_aggregate_sql` builds raw SQL but `string_keys_to_atoms` converts aggregate field keys to atoms. The `build_agg_sql_columns` function interpolates atoms into SQL as `:predicate` instead of `predicate`, producing invalid SQL like `SUM(:predicate)`.
  
  Bug 3: ACS tool handler defaults `aggregates: []` instead of `%{}`.
  
  File: `lib/anantha_os/query/query_engine.ex`, lines 126, 239-308.
  File: `apps/agent_coordination_system/lib/acs/mcp/tools/anantha_query.ex`, line 109.
