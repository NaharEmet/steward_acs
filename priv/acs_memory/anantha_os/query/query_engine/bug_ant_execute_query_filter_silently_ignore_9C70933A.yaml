content: |
  The `apply_filter_clauses/3` in QueryEngine requires filter values to be maps with operator keys (e.g. `{"predicate": {"eq": "belongs_to_pipeline"}}`). Simple `{"predicate": "belongs_to_pipeline"}` silently matches the catch-all `_, acc -> acc` and returns unfiltered results. No error, no log warning.
  
  File: `lib/anantha_os/query/query_engine.ex`, lines 314-324.
  
  Fix options:
  1. Auto-wrap bare string values as `%{eq: value}` before matching
  2. Return `{:error, ...}` for invalid filter format instead of silently ignoring
  3. Log a warning when a filter is dropped
  
  Also, the ACS tool handler (`anantha_query.ex` line 107) defaults filters to `[]` instead of `%{}`, which also hits the catch-all map guard.
