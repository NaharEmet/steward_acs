content: The query layer's DatasetRegistry must register every dataset that has a build_default_columns/1 clause in QueryEngine. If a dataset like "observations" exists in query_engine.ex's build_default_columns/1 but is missing from DatasetRegistry's @datasets map, queries for that dataset fail with "Unknown dataset". Always add both the @datasets entry AND the dataset_description/1 clause together.
