content: "When using ETS tables in a Phoenix web application where multiple processes (request handlers) need to write to the table via a GenServer API, the ETS table must be created with `:public` access. The default `:protected` access only allows the owning process to write. `Anantha.Query.RateLimiter` at `lib/anantha_os/query/rate_limiter.ex:80` was creating the `:rate_limits` table with default access, causing \"insufficient access rights\" errors when Phoenix request handlers called `RateLimiter.check_rate/1`. Fixed by passing `[:set, :public, :named_table]` to `:ets.new/2`."
