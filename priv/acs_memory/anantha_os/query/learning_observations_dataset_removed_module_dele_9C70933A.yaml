content: Anantha.Core.Observation module was deleted (table dropped in migration). The DatasetRegistry entry for "observations" referenced this non-existent module, causing UndefinedFunctionError crashes on any query to observations dataset. Fixed by removing the entry entirely - queries now return clean "Unknown dataset" error instead of crashing.
