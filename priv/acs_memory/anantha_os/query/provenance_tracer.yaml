content: "A 16-byte UUID binary must be pattern-matched as `<<a::32, b::16, c::16, d::16, e::48>>` (total: 128 bits = 16 bytes). A common mistake is using `<<a::64, b::32, c::32, d::32, e::96>>` which expects 256 bits = 32 bytes. The format should match the standard UUID string format `xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx` where the first group is 32 bits (8 hex chars), then 16 bits (4 hex chars), etc."
