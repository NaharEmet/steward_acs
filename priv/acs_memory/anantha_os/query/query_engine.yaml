content: "`NimbleOptions.validate/2` (v1.1.1) has two function clauses: one that accepts `%NimbleOptions{}` struct as second arg (any options), and one that accepts keyword list schema but requires options to also be a keyword list (`is_list(options)` guard). Maps are NOT directly supported for options. When passing a map, convert to keyword list first with `Enum.into(map, [])`. Also strip unknown keys (like `:mode`) to avoid unknown key validation errors."
