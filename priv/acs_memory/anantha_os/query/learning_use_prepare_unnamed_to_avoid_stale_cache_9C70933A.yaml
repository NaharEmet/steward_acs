content: |
  PostgreSQL cached prepared statements throw "cached plan must not change result type" when schema changes between plan creation and execution. Ecto/Postgrex uses named prepared statements by default. Pass `prepare: :unnamed` to `Repo.all/2`, `Repo.one/2`, etc. to force fresh planning per-operation. This is available in Postgrex v0.21+.
  
  Affected functions: Repo.all/2, Repo.one/2, Repo.get/3, etc. — any Ecto query operation that accepts options.
  
  Usage:
  ```elixir
  Repo.all(query, prepare: :unnamed)
  ```
