content: "The `string_keys_to_atoms/1` function in `query_controller.ex` must recursively convert ALL nested map keys to atoms, not just top-level keys. Filter conditions like `%{\"subject\" => %{\"like\" => \"hubspot:deals:%\"}}` become `%{subject: %{\"like\" => \"value\"}}` with inner key `\"like\"` still a string. `apply_field_conditions` pattern-matches on `{:like, value}` (atom key) but gets `{\"like\" => value}` (string key), so the catch-all `{_, _}` silently drops conditions — making all query filters silently no-op except org_id. The fix: add recursive `string_keys_to_atoms(value)` calls in both map reduce clauses, and a list clause that maps over lists."
