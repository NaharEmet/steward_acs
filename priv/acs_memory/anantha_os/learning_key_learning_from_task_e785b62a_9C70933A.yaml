content: "Non-assertive map access using Access behaviour (map[:key]) silently returns nil for missing keys. For required keys: use dot access (map.key) or pattern matching to fail fast. For config loading: use Application.fetch_env/2 + Keyword.fetch/2 with descriptive raise messages instead of Application.get_env/2 + [:key] which crashes with confusing KeyError on nil."
