content: |
  Full `mix compile` (460 .ex files) succeeds with exit code 0 but has 4 warnings:
  1. Unused `org_id` variable in `Anantha.Core.Records.create_record/2`
  2. Unused default args on private `persist_observations!/4` in MemoryExtractor
  3. Unused default args on private `persist_claims_dedup!/6` in MemoryExtractor
  4. Unused default args on private `extract_claims_from_content/7` in MemoryExtractor
  
  With `--warnings-as-errors`, exit code is 1 (fails).
  
