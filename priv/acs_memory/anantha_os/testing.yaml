content: "`mix test` often shows ~700 failures like \"could not lookup Ecto repo Anantha.Repo because it was not started\". These are intermittent Ecto sandbox connection pool exhaustion issues from running all ~900 tests concurrently. They are NOT real failures. Rerunning often shows a different count. Always check targeted test groups (mix test:*) rather than full suite when investigating actual regressions."
