content: "`Anantha.Core.Memory.Decisions.create_decision/3` now validates that the creating actor is internal before proceeding. An actor is considered internal if `external_actor_id` is nil (not set). Actors with an `external_actor_id` come from CRM/ingestion and cannot create decisions. Returns `{:error, :actor_not_found}` for nonexistent actors and `{:error, :external_actor}` for external ones. After successful decision creation, a Claim record is also created in the Claims system with claim_type \"decision\" and the decision_id stored in metadata. This integrates decisions into the claims-first memory architecture."
