content: "In Anantha OS projects, when using Ecto's join in pipe-style (`|>`) queries, use `join(:left, [binding], assoc in Schema, on: ...)` instead of `left_join([binding], ...)`. The `left_join` macro causes compilation errors (undefined variable) when used in pipe chains with Ecto.Query imports. The `join(:qualifier, ...)` form works reliably."
