content: |
  The Conversation schema now supports both WhatsApp (via JID hashing) and other platforms (via platform + platform_conversation_id). 
  
  Key design decisions:
  - `conversation_jid_hash` was made nullable to support non-WhatsApp conversations
  - The old unique index was replaced with a partial unique index `WHERE conversation_jid_hash IS NOT NULL`
  - A new unique index `idx_conversations_org_platform` covers `(org_id, platform, platform_conversation_id)` with `WHERE platform IS NOT NULL AND platform_conversation_id IS NOT NULL`
  - `validate_inclusion(:platform, @platforms)` enforces the controlled vocabulary at the changeset level
  - New context functions: `upsert_by_platform/2`, `list_conversations/2` (with platform filter), `get_conversation_by_platform/3`
  
  This means messages from different platforms can map to the same conversation structure without JID hashing, enabling a unified pipeline for WhatsApp, Google Chat, Slack, Telegram, Gmail, CRM, audio transcripts, and web.
  
