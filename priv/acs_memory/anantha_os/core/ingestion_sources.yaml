content: "In `IngestionSources.create_source/2`, the `attrs` parameter may use string keys. Using `Map.put(attrs, :org_id, org_id)` creates a map with mixed atom and string keys, which causes `Ecto.CastError` because Ecto's `cast/6` expects all keys to be the same type. Always use `Map.put(attrs, \"org_id\", org_id)` to maintain key type consistency."
