content: |
  QuerySearch provides text-based search across syntheses, claims, and observations using ILIKE queries as a pgvector fallback.  
  
  Key patterns:
  - Relevance scoring: exact match (1.0) > prefix match (0.8) > substring match (0.5)
  - ILIKE patterns must escape `%` and `_` to prevent SQL injection — use `escape_ilike/1` before building the pattern
  - Content is truncated to 200 chars in results via `truncate_content/1`
  - Sorting is by relevance desc then inserted_at desc
  - Guard clauses raise `ArgumentError` for empty/non-binary query strings (Early Exit, Fail Fast)
  - The `cursor` option is reserved for future pagination — not yet implemented
  
