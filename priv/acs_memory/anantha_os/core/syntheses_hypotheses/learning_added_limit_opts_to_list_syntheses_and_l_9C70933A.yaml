content: "Syntheses.list_syntheses/1 and Hypotheses.list_hypotheses/1 both originally did Repo.all() with no limit. Added optional opts parameter with :limit key (default 50) to both functions. The pattern follows Claims.list_claims/2 and Records.list_records/2 which already supported limit. All support default arg \\[] so existing callers continue to work unchanged."
