content: "`Claims.create_claim/2` adds `\"org_id\"` as a string key via `Map.put(attrs, \"org_id\", org_id)`. If you pass atom-keyed attrs, the resulting map has mixed keys (atoms + string), which causes `Ecto.CastError` because Ecto changesets require consistent key types. Always pass string-keyed attrs to `Claims.create_claim/2`."
