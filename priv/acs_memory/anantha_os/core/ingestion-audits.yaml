content: "When querying per-org ingestion stats from ingestion_audit_logs, use a left join with Anantha.Core.Org schema on org_id. The org_name falls back to org_id if NULL. Use `join(:left, [binding], o in Org, on: bind.org_id == o.id)` syntax in Ecto pipe-style queries. For conditional counts, use `sum(fragment(\"CASE WHEN ? = 'event_type' THEN 1 ELSE 0 END\", field))` pattern already established in the stats/2 function."
