content: |
  When calling `Map.put(attrs, "org_id", org_id)` where `attrs` has atom keys (e.g. `%{name: "Foo", type: "bar"}`), the resulting map has mixed key types (atom and string). Ecto's `cast/3` rejects mixed key types with `Ecto.CastError`. This was fixed in `Anantha.Core.Companies.create/2` by normalizing attrs to string keys before adding the org_id.
  
  Fix: Convert all keys to strings upfront:
  ```elixir
  attrs = attrs |> Map.new(fn {key, val} -> {to_string(key), val} end) |> Map.put("org_id", org_id)
  ```
  
