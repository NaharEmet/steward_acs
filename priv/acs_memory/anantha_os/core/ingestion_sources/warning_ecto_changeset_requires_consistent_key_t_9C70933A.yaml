content: When calling Ecto changeset functions that cast/3, all keys in the attrs map must be the same type (all atoms or all strings). Mixing atom and string keys causes Ecto.CastError. If a function internally adds a string key like Map.put(attrs, "org_id", org_id), then all keys passed to that function must also be string keys. Either unify the callee to use atom keys or unify the caller to use string keys — never mix.
