content: "The `external_actor_id` field on the Actor schema is NOT included in `cast/3` in `Actor.changeset/2`. It is set exclusively via `Ecto.Changeset.put_change/3` by `Actors.create_actor_with_external_id/3`. This means you cannot set it through `actor_fixture(%{external_actor_id: \"value\"})` — the field will silently remain nil. Use `Actors.create_actor_with_external_id(org_id, external_id)` instead for tests that need external actors."
