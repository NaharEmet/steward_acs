content: |
  The claim extraction pipeline creates a 1:1 relationship between Records and Claims via `structured_record_id`. This is by design - every Record produces exactly one Claim. Key fields: `structured_record_id` (links to source record), `source_observation_id` (links to source observation, may be nil). Claims from observations (51) are separate from record-derived claims (211). The 1:1 ratio where 211 records = 211 claims is NOT a bug - it's the expected pipeline behavior.
  
  ---
  Improvements: 1) Add a brief note explaining the rationale for the 1:1 design (e.g., simplicity, traceability). 2) Include example query or code reference to locate this behavior. 3) Mention any edge cases or scenarios where the ratio might differ. 4) Add metadata about when this was discovered/confirmed.
  
