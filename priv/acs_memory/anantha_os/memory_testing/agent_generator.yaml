content: "The AgentGenerator.generate_batch/2 function consistently fails to produce valid scenarios. All 20+ LLM-generated scenarios fail validation. The LLM returns valid JSON meeting all hard constraints, but the `validate/1` function rejects every scenario. Root cause unclear from logs — needs investigation of `parse_llm_response` output structure vs `validate` expectations. Possible mismatch between how `normalize_scenario` structures atom-keyed maps and how validation's `get_in` accesses them. This blocks the Truthforge pipeline when using LLM-based generation (--scenarios flag). Workaround: use --seed with a pre-validated JSON seed file."
