content: "When multiple entity types (claim, observation, synthesis, hypothesis) all share many-to-many relationships with ontology nodes, use a single `entity_ontology_links` polymorphic join table instead of N separate join tables. The table uses `entity_type` (string discriminator) + `entity_id` (binary_id) for polymorphic references. Ecto `many_to_many` associations use `join_through: \"entity_ontology_links\"`, `join_keys: [entity_id: :id, ontology_node_id: :ontology_node_id]`, and `where: [entity_type: \"type_name\"]` to scope associations. This eliminates 4 redundant tables and simplifies querying across entity types."
