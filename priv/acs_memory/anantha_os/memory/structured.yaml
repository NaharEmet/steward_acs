content: "Each claim_type has a corresponding `Anantha.Memory.Structured.*` module that implements `from_jsonb/1`, `to_jsonb/1`, and `required_fields/0`. These are plain Elixir structs (not Ecto schemas) that parse the JSONB `structured_claim` column into typed structs. The pattern: use string-keyed fields from the JSONB map, look up known field atoms via the struct's defstruct keys (avoiding `String.to_existing_atom`), validate required fields, and return `{:ok, struct}` or `{:error, reason}`."
