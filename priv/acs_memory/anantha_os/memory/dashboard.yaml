content: |
  The Memory Dashboard in `AnanthaWeb.AdminDashboardLive.Memory` draws data from two independent sources:
  
  1. **`message_status_counts/1`** — counts messages grouped by `extraction_status`. Returns zero-filled buckets: pending, classified, extracted, unclassified, failed, skipped. The `Message` schema has `extraction_status` defaulting to `"pending"`.
  
  2. **`memory_totals_by_org/1`** — counts records, claims, observations, pending_items across their respective database tables. These counts come from completely different tables (records, claims, observations) and are NOT dependent on messages existing.
  
  This means:
  - A dashboard can show zero messages but still show non-zero records/claims/observations if data was ingested through a path that creates records without messages.
  - Both functions accept `nil` (all orgs) or a specific org_id, filtering by `org_id` column.
  - The two datasets diverge in the dashboard. The Pipeline Flow panel shows both together (messages from `message_status_counts`, records/claims/etc from `memory_totals_by_org`), while the Pipeline Overview Metrics panel only uses `message_status_counts`.
  
  When investigating data discrepancies, always check BOTH functions separately to isolate which data source is affected.
  
