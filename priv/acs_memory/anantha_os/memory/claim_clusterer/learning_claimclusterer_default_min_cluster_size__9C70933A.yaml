content: "`Anantha.Memory.ClaimClusterer.cluster_claims/2` uses `@default_min_cluster_size 3` as default. Tests that call `cluster_claims(org.id)` without explicit `min_cluster_size` must create at least 3 claims sharing the same normalized subject+predicate to get any clusters back. The test `groups claims by normalized subject+predicate` was missing the `min_cluster_size: 2` option, causing a failure since only 2 matching claims existed."
