content: "The `apply_linear_decay/0` function in `CognitionProcessor` computes `temporal_relevance` via raw SQL: `GREATEST(0, 1 - EXTRACT(EPOCH FROM ($1 - inserted_at)) / 86400.0 / 90)`. This means even \"fresh\" syntheses created moments ago get temporal_relevance slightly below 1.0 (e.g., 0.999999874) due to the time delta between insertion and the `now` timestamp passed to the SQL query. Tests must use `assert_in_delta` rather than exact equality for fresh syntheses."
