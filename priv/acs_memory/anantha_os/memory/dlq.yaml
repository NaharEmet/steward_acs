content: |
  Anantha.Memory.DLQ uses ETS table :dlq_messages that is created in start_link/init. If DLQ is not included in the application supervision tree, the ETS table is never created and any call to :ets.tab2list(:dlq_messages) causes an ArgumentError crash. Always ensure ETS-dependent GenServers are in the supervision tree.
  
  Pattern: Convert to `use GenServer`, create ETS table in `init/1`, set `:public` access when external processes access the table directly by name (not through GenServer calls).
  
  Reference files:
  - lib/anantha_os/memory/dlq.ex
  - lib/anantha_os/application.ex (line 33: Anantha.Memory.DLQ)
  
