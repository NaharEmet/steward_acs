content: "The claims table has schema definitions for generated stored columns (amount_numeric, quantity_integer, direction_text, currency_text) but these were never actually created in the database via migrations. When modifying QueryConverter to support the claims table, always query structured_claim JSONB directly (e.g., structured_claim->>'direction', (structured_claim->>'amount')::numeric, structured_claim->>'item_name') instead of referencing non-existent generated columns."
