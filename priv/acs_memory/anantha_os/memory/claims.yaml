content: |
  When migrating from per-type tables to a unified claims table, the correct order is:
  1. First: switch all reads/writes to the claims table
  2. Second: update all tests to use claims
  3. Third: remove Core delegations and old code
  4. Fourth: verify no remaining test failures
  5. Fifth: drop old tables
  Doing it out of order causes cascading test failures that must be fixed all at once.
  
