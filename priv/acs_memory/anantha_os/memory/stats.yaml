content: "The `message_counts_by_source/1` function in `Anantha.Memory.Stats` has a bug: it uses `raw_metadata->>'source_type'` which fails because `raw_metadata` is stored as `bytea` not `jsonb`. Need to cast to text first or use a different approach to query the source."
