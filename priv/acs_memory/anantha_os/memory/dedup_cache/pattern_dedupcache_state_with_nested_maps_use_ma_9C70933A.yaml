content: |
  When building GenServer state with two-tier nested maps (e.g., `%{positive: %{org_id => %{key_hash => true}}}`), avoid using `Kernel.put_in/3` with `Access.key` for nested updates. `put_in(state, [:positive, org_id, key], value)` raises `ArgumentError` when `state.positive.org_id` is nil.
  
  Instead, use explicit map operations:
  
  ```elixir
  # Safe pattern for nested map update:
  org_entries = Map.get(state.positive, org_id, %{})
  state = %{state | positive: Map.put(state.positive, org_id, Map.put(org_entries, key, value))}
  ```
  
  The `get_in/2` function is safe with nil intermediate values (returns nil gracefully), but `put_in/3` is not. Always use explicit Map.get + Map.put for writes when intermediate keys may not exist.
