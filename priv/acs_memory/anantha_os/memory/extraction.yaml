content: |
  The ExtractionWorker skips orgs that don't have `process_messages` set to `true` in their settings. To enable extraction for an org, set `%{"process_messages" => true}` in the org's settings JSONB column. This can be done via Ecto:
  
  ```
  org = Repo.one!(from o in Org, where: o.id == ^org_id)
  settings = Map.merge(org.settings || %{}, %{"process_messages" => true})
  Org.changeset(org, %{settings: settings}) |> Repo.update!()
  ```
  
  The extraction worker runs every 60s and uses a global RPM limit (default 40). The message queue is rebuilt on startup from inbound messages with `processed_at IS NULL`. An org having 0 unprocessed messages means the worker will idle until new messages arrive.
  
