content: "`Anantha.MCP.LogStore` (in `lib/anantha_os/mcp/log_store_stub.ex`) is a functional module that lazily creates its ETS table on every function call via `ensure_table_exists/0`. Its `start_link/1` returns `{:ok, self()}` (the caller's PID), which is incorrect for a supervised child since the Supervisor expects the PID of a newly spawned process. The module does not need to be in the supervision tree — it creates its ETS table on first use automatically. Remove it from the children list in `application.ex`."
