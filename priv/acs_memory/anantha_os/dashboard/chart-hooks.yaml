content: |
  When a parent container has `phx-update="ignore"`, LiveView DOM patching will NOT update `data-*` attributes on elements within that container — even if the child elements are targeted by JS hooks. This causes hooks that read `this.el.dataset` in their `updated()` callback to always see stale data.
  
  **Root cause for blank charts on Ingestion Dashboard:**
  The charts container `<div>` had `phx-update="ignore"` to prevent chart flickering. But this also prevented the `data-chart-data` attribute from being updated by LiveView. The ChartMonitor JS hook always read the initial all-zero data.
  
  **Fix:**
  1. Remove `phx-update="ignore"` from the container div to allow `data-chart-data` updates
  2. Add a canvas re-render guard in the hook's `updated()` callback that detects when LiveView DOM patching replaces canvas elements (orphaning the Chart.js instance) and recreates them before updating
  
  **Canvas re-render guard pattern:**
  ```javascript
  updated() {
    const memoryCanvas = this.el.querySelector('#memory-chart');
    if (this.charts.memory && memoryCanvas !== this.charts.memory.canvas) {
      this.charts.memory.destroy();
      delete this.charts.memory;
    }
    // ... same for other charts
    if (!this.charts.memory || !this.charts.process || !this.charts.runQueue) {
      this.initCharts();
    }
    this.updateCharts();
  }
  ```
  
