content: "ObservabilityRunner.build_artifact/3 crashed with KeyError accessing `cluster.observations` because the EvidenceCluster schema never had an `observations` field. The observations table was migrated into claims as \"signal\" type claims (migration 20260609000004) and dropped. The fix replaces `cluster.observations || []` with filtering signal claims from the claims list and mapping them to the observation shape expected by EvaluationArtifact. This preserves the evaluation pipeline while using the correct data source."
