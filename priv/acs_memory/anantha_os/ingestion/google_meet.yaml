content: "Google Meet's \"take notes for me\" (powered by Gemini) generates Smart Notes artifacts accessible via the Meet REST API at v2beta endpoint: GET /v2beta/conferenceRecords/{id}/smartNotes. The SmartNote resource includes a DocsDestination with document ID and export URI. Smart notes require a Google Workspace with Gemini add-on and appropriate admin settings. The google.workspace.meet.smartNote.v2.fileGenerated Pub/Sub event fires when ready. Smart notes are saved as Google Docs in the organizer's Drive."
