content: |
  The Fireflies.ai ingestion source adapter (`Anantha.Ingestion.Sources.Fireflies`) follows the same pattern as the HubSpot adapter: using `use Anantha.Ingestion.Source` (which sets `@behaviour`) instead of the raw `@behaviour` directive used in `AudioTranscriber`. This is the preferred pattern going forward.
  
  Key design decisions:
  - Normalize handles 3 payload shapes: wrapped (event+data), event-only, and direct
  - Transcript extraction tries multiple key names: "transcript", "text", "body", "content" plus fallback to building from segments
  - Source ID from `data.id` or auto-generates `"fireflies_<integer>"`
  - Timestamp parsing uses `DateTime.from_iso8601/1`
  - Config validation is minimal (just checks it's a map) since Fireflies is webhook-only
  
