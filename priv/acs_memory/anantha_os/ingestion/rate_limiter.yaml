content: "RateLimiter.check/3 and record_failure/4 now require org_id as a second argument. The rate limit key is built as \"#{org_id}:#{source_type}\", preventing one org's rate limit from affecting another org. The rate_limiter_test was updated to pass nil org_id for backward compatibility in tests."
