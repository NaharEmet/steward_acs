content: Ingestion retries are now DB-backed via the ingestion_retries table. On pipeline failure, the payload is saved with retry_count, error, and status. Retries use progressive backoff (5s, 30s, 2min). After max_retries (3), status moves to 'dead' (dead letter). The Retry.retry_due/0 function processes pending/failed entries that are due. This replaces fire-and-forget with no recovery.
