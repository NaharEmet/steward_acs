content: "The `Preprocessor.deep_truncate/3` function has three clauses: depth-exceeded, non-map, and map. The map clause matches `%{}` which catches structs too, but then tries `Map.new(map, ...)` which fails because structs don't implement `Enumerable`. Add a clause `defp deep_truncate(%_{} = struct, _depth, _max_depth), do: struct` before the `%{}` clause to handle structs by passing them through unchanged."
