content: |
  The webhook path in `Ingestion.Pipeline.maybe_create_message/2` now calls `ExtractionWorker.trigger_org(payload.org_id)` after successfully creating and enqueueing a message. This ensures the webhook path (which goes through `Ingestion.Pipeline`, not `InboundPipeline`) triggers instant extraction rather than waiting for the periodic timer.
  
  Previously, `ExtractionWorker.trigger_org` was only added to `InboundPipeline`, but the webhook path through `Ingestion.Pipeline` was missed. This caused a delay in extraction for webhook-ingested data.
  
