content: "Audio processing is now disabled by default (config :anantha_os, :audio_processing_enabled, false). The flag guards AudioTranscriber.poll/2, ProviderRouter.transcribe/2, the Scheduler (skips audio_transcriber sources), and the Upload LiveView (shows disabled message). Set AUDIO_PROCESSING_ENABLED=true env var to enable."
