content: When calling adapter.poll() or CRM.sync() with an IngestionSource, always merge source.secrets into config using Map.put(config, "secrets", source.secrets). The HubSpot API key lives in the encrypted secrets field, not in the plaintext config. Without this merge, adapters that read from config["secrets"]["api_key"] will fail with "HubSpot API key not configured". Both crm/scheduler.ex and ingestion/scheduler.ex follow this pattern.
