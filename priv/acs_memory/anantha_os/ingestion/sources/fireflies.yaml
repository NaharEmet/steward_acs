content: |
  Fireflies.ai V2 webhooks are notification-only payloads. They include `meeting_id`, `event`, timestamps, and optional `client_reference_id`, but NEVER the transcript text. The transcript must be fetched separately via their GraphQL API using the `meeting_id`. The adapter normalizes these by setting content to a descriptive string and preserving all fields in `raw_metadata`.
  
  To distinguish V2 from V1 payloads, check for the presence of `"meeting_id"` at the top level. V1 payloads use `"id"` nested inside `"data"`. The V2 `"timestamp"` is a Unix millisecond integer (not ISO8601 like V1).
  
