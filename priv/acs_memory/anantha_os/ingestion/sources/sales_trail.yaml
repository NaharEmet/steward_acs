content: |
  The Sales Trail ingestion source adapter (`Anantha.Ingestion.Sources.SalesTrail`) now handles two payload shapes:
  1. **Legacy transcript-bearing format** (with `"call"` wrapper or flat) — kept unchanged in `normalize_call_payload/1`
  2. **Actual Sales Trail Push API metadata-only format** (detected by presence of `"callId"`) — handled in `normalize_metadata_payload/1`
  
  The dispatch is in `normalize/1` using an early `Map.has_key?(raw_payload, "callId")` check, which ensures backward compatibility. The metadata-only payload generates a descriptive content string since no transcript is provided. The `external_timestamp` is parsed from ISO8601 `startTime` using the `parse_iso8601/1` helper.
  
