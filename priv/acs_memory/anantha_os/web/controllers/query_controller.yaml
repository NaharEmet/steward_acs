content: "All 9 analyst tool API endpoints in QueryController use POST method, not GET with path params. This is because the ACS Bridge (`Acs.MCP.Bridge`) does not support URL path parameter substitution. Endpoints like `get_synthesis`, `get_claim`, `get_observation`, `get_source_excerpt`, and `get_entity` take the resource ID in the POST body as `org_id` and `id` params, not in the URL path. The YAML definitions in `ant_analyst.yaml` reflect this with `method: POST` for all 9 tools."
