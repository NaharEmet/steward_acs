content: |
  The `ingest_test` action in `DebugController` calls `Pipeline.process/1` which returns `{:ok, %{event: event, cluster: cluster}}` where `event` and `cluster` are Ecto schema structs. These cannot be directly passed to `json/2` because Ecto structs contain `__meta__` and association fields (`%Ecto.Association.NotLoaded{}`) that Jason cannot encode.
  
  The fix is to serialize Ecto structs to plain maps before calling `json/2`:
  1. `Map.from_struct(struct)` to convert to map
  2. `Map.drop([:__meta__])` to remove Ecto internals
  3. Recursively convert/stringify remaining structs
  
  See `serialize_result/1`, `serialize_ecto/1`, and `serialize_value/1` in `DebugController`.
  
