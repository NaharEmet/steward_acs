content: "The Phoenix router for Anantha uses hyphens in API auth routes: `/api/auth/generate-key` and `/api/auth/validate-key` (not underscores as in `generate_key`). The controller action names use underscores internally (e.g., `AuthController.generate_key`) but the route paths use hyphens, following Phoenix/Phoenix convention of using hyphens in URL paths."
