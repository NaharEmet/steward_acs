content: "Anantha.Core.Claims.list_claims/2 accepts a limit option but when called without it, loads ALL claims for an org into memory. This causes DB connection pool timeouts and out-of-memory crashes. Always pass `limit: limit` when calling list_claims from ToolController endpoints. The same applies to list_records, list_syntheses, and list_hypotheses."
