content: MCP tool endpoints in ToolController that return Ecto schema structs via Phoenix json/2 must first format them into plain maps. Structs like IngestionSource, Actor, and Claim don't implement Jason.Encoder and will crash with Protocol.UndefinedError. Always call format helpers or Enum.map to extract fields as plain maps before sending the response.
