content: When returning Ecto query results as JSON API responses, Ecto structs can't be serialized by Jason because they contain internal metadata (`__meta__`), unloaded associations (`Ecto.Association.NotLoaded`), and schema metadata values. Convert structs to maps using `Map.from_struct/1` then strip `__meta__`, reject values matching `is_struct(v, Ecto.Association.NotLoaded)` or `%Ecto.Schema.Metadata{}`. Also, Ecto enum values in the database that don't match the schema enum will cause `ArgumentError` during struct loading - use `select` parameter to return only specific fields as maps to bypass this.
