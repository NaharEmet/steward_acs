services:
  steward_acs:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: steward_acs:local
    container_name: steward_acs
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      MIX_ENV: dev
      PORT: "4001"
      ACS_CLUSTER_NAME: default
      ACS_PROJECT_NAME: steward
      DATABASE_PATH: /app/priv/acs.sqlite
      ENABLED_LLM_PROVIDERS: "${ENABLED_LLM_PROVIDERS:-mimo,nim}"
      MCP_AUTH_LOCAL_FALLBACK: "false"

      # Dashboard credentials (default: admin/admin)
      ACS_USERNAME: "${ACS_USERNAME:-admin}"
      ACS_PASSWORD: "${ACS_PASSWORD:-admin}"

      # MCP API key for tool calls (optional in dev, required in prod)
      MCP_API_KEY: "${MCP_API_KEY:-dev-api-key}"

      # MCP tool definitions directory
      # Create YAML tool files in ./acstools/ on the host and point here:
      MCP_TOOLS_PATH: "${MCP_TOOLS_PATH:-/app/acs/acstools}"

      # LLM provider API keys (enable memory auditing and semantic search)
      # At least one provider key is needed for memory features to work:
      NIM_API_KEY: "${NIM_API_KEY:-}"
      MIMO_API_KEY: "${MIMO_API_KEY:-}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
    volumes:
      # Uncomment to mount Obsidian vault:
      # - /path/to/your/vault:/obsidian:ro
      - acs_data:/app/priv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/mcp/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  acs_data:
